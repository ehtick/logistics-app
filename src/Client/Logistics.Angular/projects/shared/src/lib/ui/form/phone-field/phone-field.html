<hlm-input-group>
  <hlm-select
    uiDetachedControl
    class="flex-none"
    [value]="selectedCountry()"
    (valueChange)="onCountryChange($any($event))"
    [itemToString]="countryDialCode"
    [disabled]="disabled()"
  >
    <hlm-select-trigger class="min-w-28 rounded-r-none border-0 shadow-none ring-0 focus:ring-0">
      <hlm-select-value />
    </hlm-select-trigger>
    <hlm-select-content *hlmSelectPortal>
      @for (country of countries; track country.iso) {
        <hlm-select-item [value]="country">
          {{ country.dialCode }} {{ country.name }}
        </hlm-select-item>
      }
    </hlm-select-content>
  </hlm-select>

  <ui-masked-input
    class="flex-1"
    [mask]="currentMask()"
    [value]="phoneNumber()"
    (valueChange)="onPhoneChange($event)"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [dialPrefix]="dialPrefixDigits()"
    (blurred)="onBlur()"
  />
</hlm-input-group>
