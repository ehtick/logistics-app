<ui-dialog
  header="Confirm {{ entityLabel() }} Deletion"
  [modal]="true"
  [(open)]="visible"
  width="28rem"
  [closable]="!deleting()"
>
  <div class="flex flex-col gap-4">
    <p>
      This will permanently delete the {{ entityLabel() | lowercase }}
      <strong>{{ entityName() }}</strong>
      and all its data. This action cannot be undone.
    </p>
    <p class="text-surface-500 text-sm">
      Type
      <strong>{{ entityName() }}</strong>
      to confirm:
    </p>
    <ui-text-field
      class="block w-full"
      [placeholder]="'Enter ' + (entityLabel() | lowercase) + ' name'"
      [value]="confirmInput()"
      (valueChange)="confirmInput.set($event)"
      [disabled]="deleting()"
    />
  </div>
  <ng-template #footer>
    <ui-button
      intent="secondary"
      label="Cancel"
      (click)="visible.set(false)"
      [disabled]="deleting()"
    />
    <ui-button
      intent="danger"
      [label]="'Delete ' + entityLabel()"
      icon="trash"
      [loading]="deleting()"
      [disabled]="!isConfirmValid() || deleting()"
      (click)="onConfirm()"
    />
  </ng-template>
</ui-dialog>
