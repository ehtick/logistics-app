<ui-card class="h-full border-0 p-2 shadow-sm">
  <ng-template #header>
    <div class="flex items-center px-4 pt-4">
      @if (icon(); as iconName) {
        <ui-icon [name]="iconName" [class]="iconClasses()" />
      }
      <h5 class="mb-0">{{ title() }}</h5>
    </div>
  </ng-template>
  <ng-content></ng-content>
</ui-card>
