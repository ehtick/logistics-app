<div class="flex items-stretch">
  @if (prefixLabel()) {
    <span
      class="border-input bg-muted text-muted-foreground inline-flex items-center rounded-l-lg border border-r-0 px-2.5 text-sm"
    >
      {{ prefixLabel() }}
    </span>
  }
  <input
    hlmInput
    type="text"
    inputmode="decimal"
    class="w-full"
    [class.rounded-l-none]="prefixLabel()"
    [class.rounded-r-none]="suffixLabel()"
    [id]="id() || inputId() || null"
    [attr.name]="name() || null"
    [value]="displayValue()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [readonly]="readonly()"
    [required]="required()"
    [attr.aria-invalid]="showInvalid() ? 'true' : null"
    (input)="onInput($event)"
    (focus)="focused.set(true)"
    (blur)="onBlur()"
  />
  @if (suffixLabel()) {
    <span
      class="border-input bg-muted text-muted-foreground inline-flex items-center rounded-r-lg border border-l-0 px-2.5 text-sm"
    >
      {{ suffixLabel() }}
    </span>
  }
</div>
