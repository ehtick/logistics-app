<hlm-date-range-picker
  [date]="range()"
  (dateChange)="onRangeChange($any($event))"
  [formatDates]="formatDates"
  [min]="minDate()"
  [max]="maxDate()"
  [disabled]="disabled()"
>
  <hlm-date-range-input
    [inputId]="inputId()"
    [placeholder]="placeholder()"
    [showClear]="showClear()"
  />

  <div hlmDatePickerFooter class="border-border flex flex-wrap gap-2 border-t p-2">
    @for (preset of presets(); track preset.label) {
      <ui-button
        intent="secondary"
        appearance="text"
        size="sm"
        type="button"
        [label]="preset.label"
        (click)="selectPreset(preset)"
      />
    }
  </div>
</hlm-date-range-picker>
