<!--
  `*hlmDialogPortal` is required: BrnDialog.open() early-returns unless a BrnDialogContent has
  registered a template with it, so without it the dialog never opens — silently, with no error.

  Everything below the portal renders into the CDK overlay container, NOT into <ui-dialog>. Hence the
  inline width here rather than on the host, and the document-level Escape handler.
-->
<hlm-dialog
  [state]="state()"
  (stateChanged)="onStateChanged($event)"
  [hasBackdrop]="modal()"
  [aria-labelledby]="titleId"
  [disableClose]="true"
>
  <hlm-dialog-content
    *hlmDialogPortal
    [id]="panelId"
    [showCloseButton]="closable()"
    [style.width]="panelWidth()"
    [style.max-width]="panelMaxWidth()"
    [style.height]="panelHeight()"
    class="max-h-[calc(100vh-2rem)]"
    cdkDrag
    cdkDragBoundary=".cdk-overlay-container"
    [cdkDragDisabled]="!draggable()"
  >
    <!--
      `cursor` is an inline style, not a class: HlmDialogHeader drives its own class list through
      spartan's `classes()` manager, which rewrites className and would drop a `[class.x]` set here.
    -->
    <hlm-dialog-header cdkDragHandle [style.cursor]="draggable() ? 'move' : null">
      @if (headerTpl(); as tpl) {
        <ng-container *ngTemplateOutlet="tpl" />
      } @else {
        <h2 [id]="titleId" class="text-lg leading-none font-medium">{{ header() }}</h2>
      }
    </hlm-dialog-header>

    <!-- min-h-0 lets this grid row actually shrink, which is what allows it to scroll instead of
         pushing the footer out of the viewport on a tall dialog. -->
    <div data-slot="dialog-body" class="min-h-0 overflow-y-auto">
      <ng-content />
      @if (contentTpl(); as tpl) {
        <ng-container *ngTemplateOutlet="tpl" />
      }
    </div>

    @if (footerTpl(); as tpl) {
      <hlm-dialog-footer>
        <ng-container *ngTemplateOutlet="tpl" />
      </hlm-dialog-footer>
    }

    @if (resizable()) {
      <div
        data-slot="dialog-resize-grip"
        class="absolute right-0 bottom-0 h-4 w-4 cursor-se-resize touch-none"
        (pointerdown)="startResize($event)"
      ></div>
    }
  </hlm-dialog-content>
</hlm-dialog>
