<ng-content />

@if (!hidden()) {
  <!-- `ring-2 ring-[var(--background)]` is p-overlaybadge's halo: it punches the pill out of whatever
       it overlaps so a red dot on a dark icon still reads as a separate object. -->
  <ui-count-badge
    class="pointer-events-none absolute top-0 right-0 translate-x-1/3 -translate-y-1/3 ring-2 ring-[var(--background)]"
    [value]="value()"
    [severity]="severity()"
    [size]="badgeSize()"
  />
}
