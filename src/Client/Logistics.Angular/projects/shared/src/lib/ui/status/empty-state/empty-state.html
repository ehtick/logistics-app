<ui-stack align="center" justify="center" gap="0" class="py-12 text-center">
  @if (severity()) {
    <div
      class="mb-4 flex h-20 w-20 items-center justify-center rounded-full"
      [class]="severityRingClass()"
      [style]="severityIconStyle()"
    >
      <ui-icon [name]="icon()" size="inherit" class="text-3xl" />
    </div>
  } @else {
    <ui-icon [name]="icon()" size="inherit" class="text-muted-foreground mb-4 text-6xl" />
  }
  <ui-typography variant="h3" color="primary" class="mb-2">{{ title() }}</ui-typography>
  <ui-typography variant="body" color="secondary" class="mb-6 max-w-md">
    {{ message() }}
  </ui-typography>
  @if (actionLabel()) {
    <ui-button [label]="actionLabel()!" [icon]="actionIcon()" (click)="onAction()" />
  }
</ui-stack>
