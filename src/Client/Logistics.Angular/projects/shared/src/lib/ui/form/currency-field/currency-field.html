<ui-number-field
  [(value)]="value"
  [id]="id()"
  [inputId]="$any(inputId())"
  [name]="name()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [required]="required()"
  [invalid]="invalid()"
  [touched]="touched()"
  [dirty]="dirty()"
  [min]="min()"
  [max]="max()"
  [placeholder]="placeholder()"
  mode="decimal"
  [minFractionDigits]="2"
  [maxFractionDigits]="2"
  [prefixLabel]="currency()"
  (touch)="touch.emit()"
/>
