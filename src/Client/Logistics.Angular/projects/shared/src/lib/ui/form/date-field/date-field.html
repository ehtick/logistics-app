@if (timeOnly()) {
  <input
    hlmInput
    type="time"
    [id]="controlId()"
    [value]="timeValue()"
    [disabled]="disabled() || readonly()"
    [attr.aria-invalid]="showInvalid() || null"
    [class.w-full]="fluid()"
    (input)="onTimeInput($event)"
  />
} @else {
  <div [class.flex]="showTime()" [class.gap-2]="showTime()">
    <hlm-date-picker
      uiDetachedControl
      [class.flex-1]="showTime()"
      [date]="value() ?? undefined"
      (dateChange)="onDateChange($any($event))"
      [formatDate]="formatDate"
      [min]="minDate()"
      [max]="maxDate()"
      [disabled]="disabled() || readonly()"
      [autoCloseOnSelect]="true"
    >
      <hlm-date-picker-input
        [inputId]="controlId()"
        [placeholder]="placeholder() ?? ''"
        [forceInvalid]="showInvalid()"
      />
    </hlm-date-picker>

    @if (showTime()) {
      <input
        hlmInput
        type="time"
        class="w-32"
        [value]="timeValue()"
        [disabled]="disabled() || readonly()"
        (input)="onTimeInput($event)"
      />
    }
  </div>
}
