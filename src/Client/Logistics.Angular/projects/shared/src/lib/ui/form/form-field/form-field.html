<div class="mb-4 flex flex-col text-start">
  @if (label()) {
    <div class="mb-2 flex items-center gap-1 text-sm font-medium">
      @if (required()) {
        <span class="text-red-600 dark:text-red-400">*</span>
      }
      <label class="text-gray-700 dark:text-gray-300" [for]="for()">{{ label() }}</label>
    </div>
  }

  <ng-content></ng-content>

  @if (hint() && !isFieldInvalid()) {
    <div class="text-sm text-gray-500 dark:text-gray-400">
      {{ hint() }}
    </div>
  }

  @if (isFieldInvalid()) {
    <div class="text-sm text-red-600 dark:text-red-400">
      @for (error of errors(); track error) {
        <div>{{ describe(error) }}</div>
      } @empty {
        <div>This field is invalid.</div>
      }
    </div>
  }
</div>
