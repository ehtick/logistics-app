<input
  hlmInput
  class="w-full"
  [id]="id()"
  [attr.name]="name() || null"
  [type]="type()"
  [value]="value()"
  [disabled]="disabled()"
  [readOnly]="readonly()"
  [required]="required()"
  [placeholder]="placeholder()"
  [attr.autocomplete]="autocomplete() || null"
  [attr.maxlength]="maxlength() ?? null"
  [attr.aria-invalid]="showInvalid() ? 'true' : null"
  (input)="onInput($event)"
  (blur)="touch.emit()"
/>
