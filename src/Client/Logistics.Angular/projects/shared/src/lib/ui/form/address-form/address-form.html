<div>
  <ui-form-field label="Address Line 1" for="addressLine1" [required]="true">
    <input
      hlmInput
      id="addressLine1"
      [value]="parts().addressLine1"
      [disabled]="disabled()"
      (input)="onLine1Input($event)"
      (blur)="touch.emit()"
    />
  </ui-form-field>

  <ui-form-field label="Address Line 2" for="addressLine2" hint="Optional">
    <input
      hlmInput
      id="addressLine2"
      [value]="parts().addressLine2 ?? ''"
      [disabled]="disabled()"
      (input)="onLine2Input($event)"
      (blur)="touch.emit()"
    />
  </ui-form-field>

  <ui-form-field label="City" for="city" [required]="true">
    <input
      hlmInput
      id="city"
      [value]="parts().city"
      [disabled]="disabled()"
      (input)="onCityInput($event)"
      (blur)="touch.emit()"
    />
  </ui-form-field>

  <ui-form-field [label]="stateLabel()" for="state" [required]="true">
    @if (hasStateOptions()) {
      <ui-select-field
        id="state"
        [value]="parts().state"
        (selectionChange)="onStateSelect($any($event))"
        [options]="$any(stateOptions())"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'Select a ' + stateLabel().toLowerCase()"
        [filter]="true"
        [disabled]="disabled()"
        (touch)="touch.emit()"
      />
    } @else {
      <input
        hlmInput
        id="state"
        [value]="parts().state"
        [disabled]="disabled()"
        (input)="onStateInput($event)"
        (blur)="touch.emit()"
      />
    }
  </ui-form-field>

  <ui-form-field label="Zip Code" for="zipCode" [required]="true">
    <input
      hlmInput
      id="zipCode"
      [value]="parts().zipCode"
      [disabled]="disabled()"
      (input)="onZipCodeInput($event)"
      (blur)="touch.emit()"
    />
  </ui-form-field>

  <ui-form-field label="Country" for="country" [required]="true">
    <ui-select-field
      id="country"
      [value]="parts().country"
      (selectionChange)="onCountrySelect($any($event))"
      [options]="countries()"
      optionLabel="label"
      optionValue="value"
      placeholder="Select a country"
      [filter]="true"
      [disabled]="disabled()"
      (touch)="touch.emit()"
    />
  </ui-form-field>
</div>
