@let ctx = context;

<div class="flex items-start gap-4">
  @if (ctx.icon; as icon) {
    <ui-icon [name]="icon" size="xl" color="muted" class="mt-0.5 shrink-0" />
  }

  <div class="min-w-0 flex-1">
    @if (ctx.header; as header) {
      <h2 class="text-foreground text-base font-semibold">{{ header }}</h2>
    }

    <!-- `whitespace-pre-line` is load-bearing, not styling: confirm messages can embed newlines, and
         without this class they collapse into one run-on paragraph instead of rendering as separate
         lines. -->
    <p class="text-muted-foreground mt-1 text-sm whitespace-pre-line">{{ ctx.message }}</p>
  </div>
</div>

<div class="flex justify-end gap-2">
  <ui-button
    [label]="ctx.rejectLabel"
    [icon]="ctx.rejectIcon"
    [intent]="ctx.rejectIntent"
    appearance="outlined"
    (click)="reject()"
  />
  <ui-button
    [label]="ctx.acceptLabel"
    [icon]="ctx.acceptIcon"
    [intent]="ctx.acceptIntent"
    (click)="accept()"
  />
</div>
