<div class="relative">
  <input
    hlmInput
    class="w-full pr-9"
    [type]="revealed() ? 'text' : 'password'"
    [id]="id() || null"
    [attr.name]="name() || null"
    [value]="value()"
    [placeholder]="placeholder()"
    [autocomplete]="autocomplete()"
    [attr.maxlength]="maxlength() ?? null"
    [disabled]="disabled()"
    [readonly]="readonly()"
    [required]="required()"
    [attr.aria-invalid]="showInvalid() ? 'true' : null"
    (input)="onInput($event)"
    (blur)="touch.emit()"
  />
  @if (toggleMask()) {
    <button
      type="button"
      class="text-muted-foreground hover:text-foreground absolute inset-y-0 right-0 flex items-center px-2.5"
      [attr.aria-label]="revealed() ? 'Hide password' : 'Show password'"
      [attr.aria-pressed]="revealed()"
      tabindex="-1"
      (click)="toggleReveal()"
    >
      <ui-icon [name]="revealed() ? 'eye-off' : 'eye'" size="sm" />
    </button>
  }
</div>
