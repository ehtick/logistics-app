@let busy = loading();

<button
  [class]="classes()"
  [type]="type()"
  [disabled]="isDisabled()"
  [attr.aria-label]="ariaLabel() || null"
  [attr.aria-busy]="busy ? 'true' : null"
>
  <!-- The spinner takes the leading glyph's place while busy - never both. `size="inherit"` emits no
       text-* class, so the icon tracks the button's font-size and `animate-spin` works on it. -->
  @if (busy) {
    <ui-icon name="loader-circle" size="inherit" spin />
  } @else if (icon(); as name) {
    <ui-icon [name]="name" size="inherit" />
  }

  @if (label(); as text) {
    <span>{{ text }}</span>
  }

  @if (iconEnd(); as name) {
    <ui-icon [name]="name" size="inherit" />
  }
</button>
