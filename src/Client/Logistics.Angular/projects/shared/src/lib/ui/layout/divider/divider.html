<div [class]="lineClasses()"></div>
@if (isHorizontal()) {
  <!-- `empty:hidden` is load-bearing, not tidiness. With no projected label this span still rendered,
       and its `px-3` punched a 1.5rem GAP through the middle of the rule — so a plain `<ui-divider />`
       drew a broken line, not a continuous one. Nobody noticed at 2 call sites; sweeping in the 43
       dividers with no projected label would have made it a broken line on 43 pages. -->
  <span class="text-subtle-foreground px-3 text-xs empty:hidden">
    <ng-content />
  </span>
  <div [class]="lineClasses()"></div>
}
