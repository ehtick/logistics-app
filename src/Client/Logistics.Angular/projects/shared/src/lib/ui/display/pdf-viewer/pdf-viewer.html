@if (pdfUrl(); as url) {
  @if (showCard()) {
    <ui-card>
      <ng-template #header>
        <div class="flex items-center justify-between p-4 pb-0">
          <div class="flex items-center gap-2">
            <ui-icon name="file-text" class="text-foreground" />
            <h3 class="m-0 text-lg font-semibold">{{ title() }}</h3>
          </div>
          <div class="flex gap-1">
            <ui-button
              appearance="text"
              size="sm"
              ariaLabel="Open in new tab"
              icon="external-link"
              [rounded]="true"
              uiTooltip="Open in new tab"
              (click)="openInNewTab()"
            />
            @if (collapsible()) {
              <ui-button
                [icon]="isCollapsed() ? 'chevron-down' : 'chevron-up'"
                appearance="text"
                size="sm"
                [rounded]="true"
                [ariaLabel]="isCollapsed() ? 'Expand' : 'Collapse'"
                [uiTooltip]="isCollapsed() ? 'Expand' : 'Collapse'"
                (click)="toggleCollapse()"
              />
            }
          </div>
        </div>
      </ng-template>

      @if (!isCollapsed()) {
        <object
          [data]="url"
          type="application/pdf"
          class="w-full rounded border"
          [style.height]="height()"
        >
          <p class="text-muted-foreground p-4 text-center">
            Your browser does not support PDF preview.
            <button
              type="button"
              class="text-foreground cursor-pointer underline"
              (click)="openInNewTab()"
            >
              Open PDF in new tab
            </button>
          </p>
        </object>
      }
    </ui-card>
  } @else {
    <object
      [data]="url"
      type="application/pdf"
      class="w-full rounded border"
      [style.height]="height()"
    >
      <p class="text-muted-foreground p-4 text-center">
        Your browser does not support PDF preview.
        <button
          type="button"
          class="text-foreground cursor-pointer underline"
          (click)="openInNewTab()"
        >
          Open PDF in new tab
        </button>
      </p>
    </object>
  }
}
