<ui-page-header title="Tenants" addRoute="/tenants/add" addTooltip="Add a new tenant" />

<ui-card>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No tenants yet"
    emptyMessage="Add your first tenant to get started."
    emptyActionLabel="Add Tenant"
    (retry)="store.retry()"
    (emptyAction)="addTenant()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #caption>
        <ui-search-field (searchChange)="search($event)" />
      </ng-template>
      <ng-template #header>
        <tr>
          <th uiSortHeader="Name">Name</th>
          <th uiSortHeader="CompanyName">Company</th>
          <th>Region</th>
          <th>Subscription</th>
          <th>Trucks</th>
          <th class="text-center">Actions</th>
        </tr>
      </ng-template>
      <ng-template #body let-tenant>
        <tr>
          <td>{{ tenant.name }}</td>
          <td>{{ tenant.companyName }}</td>
          <td>
            <ui-badge
              [value]="tenant.settings?.region === 'eu' ? 'EU' : 'US'"
              [severity]="tenant.settings?.region === 'eu' ? 'info' : 'secondary'"
            />
          </td>
          <td>
            <ui-badge
              [value]="getSubscriptionStatus(tenant)"
              [severity]="getStatusSeverity(getSubscriptionStatus(tenant))"
            />
          </td>
          <td>{{ tenant.truckCount ?? 0 }}</td>
          <td class="text-center">
            <ui-button
              appearance="text"
              icon="ellipsis-vertical"
              (click)="openActionMenu($event, tenant)"
              ariaLabel="Show actions menu"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<ui-menu #actionMenu [items]="actionMenuItems()" />

<ui-confirm-delete-dialog
  entityLabel="Tenant"
  [entityName]="deletingTenantName()"
  [(visible)]="deleteDialogVisible"
  [deleting]="isDeleting()"
  (confirm)="confirmDelete()"
/>
