<ui-page-header title="Dashboard" />

<ui-grid container spacing="4" class="mt-4">
  @if (isLoading()) {
    @for (_ of [1, 2, 3, 4]; track $index) {
      <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
        <ui-skeleton height="8rem" />
      </ui-grid>
    }
  } @else {
    <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
      <ui-card>
        <ui-stack direction="row" align="center" gap="4">
          <div class="bg-info/15 flex h-12 w-12 items-center justify-center rounded-full">
            <ui-icon name="building-2" size="lg" class="text-info" />
          </div>
          <div>
            <ui-typography variant="caption" color="muted">Total Tenants</ui-typography>
            <ui-typography variant="stat">{{ tenantCount() }}</ui-typography>
          </div>
        </ui-stack>
        <div class="mt-4">
          <ui-button
            appearance="link"
            label="View All"
            iconEnd="arrow-right"
            routerLink="/tenants"
          />
        </div>
      </ui-card>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
      <ui-card>
        <ui-stack direction="row" align="center" gap="4">
          <div class="bg-success/15 flex h-12 w-12 items-center justify-center rounded-full">
            <ui-icon name="credit-card" size="lg" class="text-success" />
          </div>
          <div>
            <ui-typography variant="caption" color="muted">Active Subscriptions</ui-typography>
            <ui-typography variant="stat">{{ subscriptionCount() }}</ui-typography>
          </div>
        </ui-stack>
        <div class="mt-4">
          <ui-button
            appearance="link"
            label="View All"
            iconEnd="arrow-right"
            routerLink="/subscriptions"
          />
        </div>
      </ui-card>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
      <ui-card>
        <ui-stack direction="row" align="center" gap="4">
          <div class="bg-pickedup/15 flex h-12 w-12 items-center justify-center rounded-full">
            <ui-icon name="box" size="lg" class="text-pickedup" />
          </div>
          <div>
            <ui-typography variant="caption" color="muted">Subscription Plans</ui-typography>
            <ui-typography variant="stat">{{ planCount() }}</ui-typography>
          </div>
        </ui-stack>
        <div class="mt-4">
          <ui-button
            appearance="link"
            label="View All"
            iconEnd="arrow-right"
            routerLink="/subscription-plans"
          />
        </div>
      </ui-card>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
      <ui-card>
        <ui-stack direction="row" align="center" gap="4">
          <div class="bg-warning/15 flex h-12 w-12 items-center justify-center rounded-full">
            <ui-icon name="users" size="lg" class="text-warning" />
          </div>
          <div>
            <ui-typography variant="caption" color="muted">Admin Users</ui-typography>
            <ui-typography variant="stat">{{ userCount() }}</ui-typography>
          </div>
        </ui-stack>
        <div class="mt-4">
          <ui-button appearance="link" label="View All" iconEnd="arrow-right" routerLink="/users" />
        </div>
      </ui-card>
    </ui-grid>
  }
</ui-grid>

<ui-grid container spacing="4" class="mt-8">
  <ui-grid [size]="{ xs: 12, lg: 6 }">
    <ui-card>
      <ng-template #header>
        <ui-typography variant="h6" tag="h4" class="py-2 pl-4">Quick Actions</ui-typography>
        <ui-divider class="m-0" />
      </ng-template>
      <ui-stack direction="row" gap="3" wrap>
        <ui-button label="Add Tenant" icon="plus" routerLink="/tenants/add" />
        <ui-button
          intent="secondary"
          label="Add Plan"
          icon="plus"
          routerLink="/subscription-plans/add"
        />
        <ui-button
          intent="secondary"
          label="Add Subscription"
          icon="plus"
          routerLink="/subscriptions/add"
        />
      </ui-stack>
    </ui-card>
  </ui-grid>
</ui-grid>
