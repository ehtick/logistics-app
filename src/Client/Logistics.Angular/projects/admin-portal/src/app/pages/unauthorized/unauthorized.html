<div class="bg-background flex min-h-screen items-center justify-center">
  <ui-card class="w-full max-w-md shadow-lg">
    <div class="text-center">
      <div class="mb-6">
        <ui-icon name="lock" size="inherit" class="text-warning text-6xl" />
      </div>

      <h1 class="text-foreground mb-2 text-2xl font-bold">Access Denied</h1>
      <p class="text-muted-foreground mb-6">
        You don't have permission to access this page. Please contact your administrator if you
        believe this is an error.
      </p>

      <div class="flex justify-center gap-3">
        <ui-button label="Go to Login" icon="arrow-left" routerLink="/" />
        <ui-button intent="secondary" label="Sign Out" icon="log-out" (click)="logout()" />
      </div>
    </div>
  </ui-card>
</div>
