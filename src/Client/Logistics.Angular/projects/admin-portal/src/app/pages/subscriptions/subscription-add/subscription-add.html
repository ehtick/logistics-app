<ui-page-header title="Add Subscription" />

<div class="flex flex-col justify-center gap-6 md:flex-row">
  <ui-card class="w-full lg:w-2/3">
    @if (isFetching()) {
      <ui-stack gap="4">
        <ui-skeleton height="3rem" />
        <ui-skeleton height="3rem" />
      </ui-stack>
    } @else {
      <form [formRoot]="form">
        <ui-grid container spacing="4" class="mb-4">
          <ui-grid [size]="12">
            <ui-form-field label="Tenant" [required]="true">
              <ui-select-field
                [formField]="form.tenantId"
                [options]="tenantOptions()"
                optionLabel="label"
                optionValue="value"
                placeholder="Select a tenant"
                [filter]="true"
                filterPlaceholder="Search tenants..."
                styleClass="w-full"
              />
            </ui-form-field>
            @if (tenantOptions().length === 0) {
              <ui-stack direction="row" align="center" gap="2" class="text-warning mt-1 text-sm">
                <ui-icon name="info" size="sm" />
                <ui-typography variant="body-sm">
                  All tenants already have active subscriptions.
                </ui-typography>
              </ui-stack>
            }
          </ui-grid>
        </ui-grid>

        <ui-grid container spacing="4" class="mb-4">
          <ui-grid [size]="12">
            <ui-form-field label="Subscription Plan" [required]="true">
              <ui-select-field
                [formField]="form.planId"
                [options]="planOptions()"
                optionLabel="label"
                optionValue="value"
                placeholder="Select a plan"
                styleClass="w-full"
              />
            </ui-form-field>
            @if (planOptions().length === 0) {
              <ui-stack direction="row" align="center" gap="2" class="text-warning mt-1 text-sm">
                <ui-icon name="info" size="sm" />
                <ui-typography variant="body-sm">
                  No subscription plans available.
                  <a routerLink="/subscription-plans/add" class="underline">Create one first.</a>
                </ui-typography>
              </ui-stack>
            }
          </ui-grid>
        </ui-grid>

        <ui-stack direction="row" gap="2" class="mt-6">
          <ui-button
            label="Create Subscription"
            icon="check"
            type="submit"
            [loading]="form().submitting()"
            [disabled]="
              form().submitting() || tenantOptions().length === 0 || planOptions().length === 0
            "
          />
          <ui-button intent="secondary" label="Cancel" icon="x" routerLink="/subscriptions" />
        </ui-stack>
      </form>
    }
  </ui-card>
</div>
