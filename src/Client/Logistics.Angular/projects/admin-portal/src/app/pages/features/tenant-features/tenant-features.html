<ui-page-header [title]="'Feature Configuration: ' + (tenant()?.companyName ?? 'Loading...')">
  <div class="flex gap-2">
    <ui-button intent="secondary" icon="arrow-left" label="Back" (click)="goBack()" />
    <ui-button icon="save" label="Save Changes" [loading]="isSaving()" (click)="saveAll()" />
  </div>
</ui-page-header>

<ui-card>
  @if (isLoading()) {
    <div class="flex justify-center py-8">
      <ui-spinner />
    </div>
  } @else {
    <p class="text-muted-foreground mb-4">
      Configure feature settings for this tenant. Locked features cannot be changed by the tenant
      owner.
    </p>

    <div class="flex flex-col gap-2">
      @for (feature of features(); track feature.feature) {
        <ui-feature-row
          [name]="feature.name ?? ''"
          [description]="getFeatureDescription(feature.feature)"
        >
          <label [for]="'enabled-' + feature.feature" class="flex items-center gap-2 text-sm">
            <span class="text-muted-foreground">Enabled</span>
            <ui-toggle-field
              [inputId]="'enabled-' + feature.feature"
              [value]="feature.isEnabled ?? false"
              (valueChange)="toggleEnabled(feature)"
            />
          </label>
          <label
            [for]="'locked-' + feature.feature"
            class="flex items-center gap-2 text-sm"
            uiTooltip="When locked, the tenant owner cannot change this setting"
            uiTooltipPosition="top"
          >
            <span class="text-muted-foreground">Locked</span>
            <ui-toggle-field
              [inputId]="'locked-' + feature.feature"
              [value]="feature.isAdminLocked ?? false"
              (valueChange)="toggleLocked(feature)"
            />
          </label>
        </ui-feature-row>
      } @empty {
        <p class="text-muted-foreground py-4 text-center">No features available</p>
      }
    </div>
  }
</ui-card>
