<ui-page-header title="Users" />

<ui-card>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No users found"
    emptyMessage="There are no users in the system."
    (retry)="store.retry()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #caption>
        <ui-search-field (searchChange)="search($event)" />
      </ng-template>
      <ng-template #header>
        <tr>
          <th uiSortHeader="Email">Email</th>
          <th>Name</th>
          <th>Role</th>
          <th>Tenant</th>
          <th>Phone</th>
          <th class="w-16"></th>
        </tr>
      </ng-template>
      <ng-template #body let-user>
        <tr>
          <td>{{ user.email }}</td>
          <td>{{ getFullName(user) }}</td>
          <td>
            <ui-badge [value]="user.role ?? 'Unknown'" [severity]="getRoleSeverity(user.role)" />
          </td>
          <td>
            @if (user.tenantId) {
              <a [routerLink]="['/tenants', user.tenantId, 'edit']">
                {{ user.tenantName ?? "View Tenant" }}
              </a>
            } @else {
              <span class="text-muted-foreground">-</span>
            }
          </td>
          <td>{{ user.phoneNumber ?? "-" }}</td>
          <td>
            <ui-button
              appearance="text"
              icon="ellipsis-vertical"
              (click)="openActionMenu($event, user)"
              ariaLabel="Show actions menu"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<ui-menu #actionMenu [items]="actionMenuItems" />

<!-- Impersonate Dialog -->
<ui-dialog header="Impersonate User" [(open)]="showImpersonateDialog" [modal]="true" width="400px">
  <div class="flex flex-col gap-4">
    <p class="text-muted-foreground">
      You are about to impersonate
      <strong>{{ impersonateEmail() }}</strong>
      . Enter the master password to continue.
    </p>
    <div class="flex flex-col gap-2">
      <label for="masterPassword" class="font-medium">Master Password</label>
      <ui-password-field
        id="masterPassword"
        [(value)]="masterPassword"
        [feedback]="false"
        [toggleMask]="true"
        placeholder="Enter master password"
      />
    </div>
  </div>
  <ng-template #footer>
    <ui-button intent="secondary" label="Cancel" (click)="showImpersonateDialog.set(false)" />
    <ui-button
      label="Impersonate"
      icon="user"
      [loading]="isImpersonating()"
      (click)="impersonate()"
    />
  </ng-template>
</ui-dialog>
