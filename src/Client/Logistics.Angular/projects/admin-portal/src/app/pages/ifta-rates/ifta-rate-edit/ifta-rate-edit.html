<ui-page-header title="Edit IFTA Tax Rate" />

<div class="flex flex-col justify-center gap-6 md:flex-row">
  <ui-card class="w-full md:w-3/4 lg:w-2/3">
    @if (isFetching()) {
      <ui-stack gap="4">
        <ui-skeleton height="3rem" />
        <ui-skeleton height="3rem" />
        <ui-skeleton height="3rem" />
        <ui-skeleton height="3rem" />
      </ui-stack>
    } @else {
      <adm-ifta-rate-form
        mode="edit"
        [initial]="initialValue()"
        [isLoading]="isLoading()"
        (save)="onSave($event)"
        (remove)="onRemove()"
      />
    }
  </ui-card>
</div>
