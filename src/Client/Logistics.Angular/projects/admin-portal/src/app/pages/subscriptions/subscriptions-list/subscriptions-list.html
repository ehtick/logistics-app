<ui-page-header
  title="Subscriptions"
  addRoute="/subscriptions/add"
  addTooltip="Add a new subscription"
/>

<ui-card>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No subscriptions yet"
    emptyMessage="Add your first subscription to get started."
    emptyActionLabel="Add Subscription"
    (retry)="store.retry()"
    (emptyAction)="addSubscription()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #caption>
        <ui-search-field (searchChange)="search($event)" />
      </ng-template>
      <ng-template #header>
        <tr>
          <th>Tenant</th>
          <th>Plan</th>
          <th>Status</th>
          <th class="w-16"></th>
        </tr>
      </ng-template>
      <ng-template #body let-sub>
        <tr>
          <td>
            <a [routerLink]="['/tenants', sub.tenant?.id, 'edit']" class="font-medium">
              {{ sub.tenant?.name ?? "Unknown" }}
            </a>
          </td>
          <td>{{ sub.plan?.name ?? "-" }}</td>
          <td>
            <ui-badge
              [value]="sub.status ?? 'unknown'"
              [severity]="getStatusSeverity(sub.status)"
            />
          </td>
          <td>
            <ui-button
              appearance="text"
              icon="ellipsis-vertical"
              (click)="openActionMenu($event, sub)"
              ariaLabel="Show actions menu"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<ui-menu #actionMenu [items]="actionMenuItems()" />
