<ui-page-header title="Blog Posts" addRoute="/blog-posts/add" addTooltip="Add a new blog post" />

<ui-card>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No blog posts yet"
    emptyMessage="Add your first blog post to get started."
    emptyActionLabel="Add Blog Post"
    (retry)="store.retry()"
    (emptyAction)="addBlogPost()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #caption>
        <ui-search-field (searchChange)="search($event)" />
      </ng-template>
      <ng-template #header>
        <tr>
          <th uiSortHeader="Title">Title</th>
          <th uiSortHeader="Category">Category</th>
          <th uiSortHeader="AuthorName">Author</th>
          <th>Status</th>
          <th uiSortHeader="PublishedAt">Published</th>
          <th class="w-20">Actions</th>
        </tr>
      </ng-template>
      <ng-template #body let-post>
        <tr>
          <td>
            <ui-stack direction="row" align="center" gap="2">
              @if (post.isFeatured) {
                <ui-icon name="star" color="warning" uiTooltip="Featured" />
              }
              {{ post.title }}
            </ui-stack>
          </td>
          <td>{{ post.category || "-" }}</td>
          <td>{{ post.authorName }}</td>
          <td>
            <ui-badge [value]="post.status" [severity]="getStatusSeverity(post.status)" />
          </td>
          <td>{{ post.publishedAt | date: "mediumDate" }}</td>
          <td>
            <ui-button
              intent="secondary"
              appearance="text"
              icon="ellipsis-vertical"
              (click)="openActionMenu(post, menu, $event)"
              ariaLabel="Show actions menu"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<ui-menu #menu [items]="actionMenuItems()" />
