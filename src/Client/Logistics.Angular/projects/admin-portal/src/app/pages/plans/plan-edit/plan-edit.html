<ui-page-header title="Edit Subscription Plan" backLink="/subscription-plans" />

<div class="flex flex-col justify-center gap-6 md:flex-row">
  <ui-card class="w-full lg:w-2/3">
    @if (isFetching()) {
      <ui-stack gap="4">
        <ui-skeleton height="3rem" />
        <ui-skeleton height="6rem" />
        <ui-skeleton height="3rem" />
        <ui-skeleton height="3rem" />
      </ui-stack>
    } @else {
      <adm-plan-form
        mode="edit"
        [initial]="initialValue()"
        [isLoading]="isLoading()"
        (save)="onSave($event)"
        (remove)="onRemove()"
      />
    }
  </ui-card>
</div>
