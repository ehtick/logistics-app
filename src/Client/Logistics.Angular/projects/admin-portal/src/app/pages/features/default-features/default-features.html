<ui-page-header title="Default Feature Configuration">
  <ui-button icon="save" label="Save Changes" [loading]="isSaving()" (click)="saveAll()" />
</ui-page-header>

<ui-card>
  @if (isLoading()) {
    <div class="flex justify-center py-8">
      <ui-spinner />
    </div>
  } @else {
    <p class="text-muted-foreground mb-4">
      Configure the default feature settings for new tenants. These settings will be applied when a
      new tenant is created.
    </p>

    <div class="flex flex-col gap-2">
      @for (feature of features(); track feature.feature) {
        <ui-feature-row
          [name]="feature.name ?? ''"
          [description]="getFeatureDescription(feature.feature)"
        >
          <ui-toggle-field
            [value]="feature.isEnabledByDefault ?? false"
            (valueChange)="toggleFeature(feature)"
          />
        </ui-feature-row>
      } @empty {
        <p class="text-muted-foreground py-4 text-center">No features available</p>
      }
    </div>
  }
</ui-card>
