<form [formRoot]="form">
  <div class="mb-4 grid grid-cols-12 gap-4">
    <div class="col-span-12">
      <ui-form-field label="Plan Name" [required]="true">
        <ui-text-field
          [formField]="form.name"
          placeholder="Enter plan name (e.g., Basic, Pro, Enterprise)"
        />
      </ui-form-field>
    </div>
  </div>

  <div class="mb-4 grid grid-cols-12 gap-4">
    <div class="col-span-12 md:col-span-6">
      <ui-form-field label="Description">
        <ui-textarea-field
          [formField]="form.description"
          placeholder="Enter plan description"
          [rows]="3"
        />
      </ui-form-field>
    </div>

    <div class="col-span-12 md:col-span-6">
      <ui-form-field label="Plan Tier" [required]="true">
        <ui-select-field
          [formField]="form.tier"
          [options]="tierOptions"
          placeholder="Select tier"
          [fluid]="true"
        />
      </ui-form-field>
    </div>
  </div>

  <div class="mb-4 grid grid-cols-12 gap-4">
    <div class="col-span-12 md:col-span-4">
      <ui-form-field label="Base Monthly Fee" [required]="true">
        <ui-currency-field [formField]="form.price" placeholder="0.00" />
      </ui-form-field>
    </div>

    <div class="col-span-12 md:col-span-4">
      <ui-form-field label="Per Truck Fee" [required]="true">
        <ui-currency-field [formField]="form.perTruckPrice" placeholder="0.00" />
      </ui-form-field>
    </div>

    <div class="col-span-12 md:col-span-4">
      <ui-form-field label="Max Trucks">
        <ui-number-field
          [formField]="form.maxTrucks"
          [showButtons]="true"
          placeholder="Unlimited"
          [fluid]="true"
        />
      </ui-form-field>
    </div>
  </div>

  <div class="mb-4 grid grid-cols-12 gap-4">
    <div class="col-span-12 md:col-span-4">
      <ui-form-field label="Weekly AI Request Quota" hint="Leave empty for unlimited">
        <ui-number-field
          [formField]="form.weeklyAiRequestQuota"
          [showButtons]="true"
          placeholder="Unlimited"
          [fluid]="true"
        />
      </ui-form-field>
    </div>
  </div>

  <div class="mb-4 grid grid-cols-12 gap-4">
    <div class="col-span-12 md:col-span-4">
      <ui-form-field label="Billing Interval" [required]="true">
        <ui-select-field
          [formField]="form.interval"
          [options]="intervalOptions"
          placeholder="Select interval"
          [fluid]="true"
        />
      </ui-form-field>
    </div>

    <div class="col-span-12 md:col-span-4">
      <ui-form-field label="Interval Count" [required]="true">
        <ui-number-field [formField]="form.intervalCount" [showButtons]="true" [fluid]="true" />
      </ui-form-field>
    </div>
  </div>

  <div class="mt-6 flex gap-2">
    <ui-button
      [label]="mode() === 'create' ? 'Create' : 'Save'"
      icon="check"
      type="submit"
      [loading]="isLoading()"
      [disabled]="isLoading()"
    />
    <ui-button intent="secondary" label="Cancel" icon="x" routerLink="/subscription-plans" />
    @if (mode() === "edit") {
      <ui-button
        intent="danger"
        appearance="outlined"
        label="Delete"
        icon="trash"
        (click)="askRemove()"
      />
    }
  </div>
</form>
