<header
  class="border-border bg-card sticky top-0 z-40 flex items-center justify-between border-b px-4 py-3 md:hidden"
>
  <!-- size="lg": ui-button sizes its glyph from the size variant (lg = 1.25rem). -->
  <ui-button
    [icon]="mobileMenuOpen() ? 'x' : 'menu'"
    appearance="text"
    size="lg"
    (click)="toggleMenu()"
    ariaLabel="Toggle navigation menu"
  />

  <span class="text-primary text-lg font-semibold">Admin Portal</span>

  <div class="w-10"></div>
</header>
