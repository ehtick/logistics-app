<ui-drawer
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  position="left"
  width="300px"
>
  <div uiDrawerHeader class="border-subtle flex items-center gap-3 border-b px-5 py-4">
    <span class="text-foreground text-base font-semibold">Admin Portal</span>
  </div>

  <div class="flex h-full flex-col">
    <!-- Navigation -->
    <div class="flex-1 overflow-y-auto px-2">
      @for (section of sections(); track section.label; let isLast = $last) {
        <p
          class="text-muted-foreground mt-3 mb-1 px-2 text-xs font-semibold tracking-wider uppercase"
        >
          {{ section.label }}
        </p>
        @for (item of section.items; track item.route) {
          <button
            class="text-foreground hover:bg-sidebar-accent mb-0.5 flex w-full items-center gap-3 rounded-lg border-none bg-transparent px-3 py-2.5 text-left text-sm font-medium transition-colors"
            (click)="navigateTo(item.route)"
          >
            <ui-icon [name]="item.icon" size="inherit" class="text-base" />
            <span>{{ item.label }}</span>
          </button>
        }
        @if (!isLast) {
          <ui-divider />
        }
      }
    </div>

    <!-- User Section -->
    <div class="border-border border-t p-4">
      @if (userName()) {
        <div class="mb-3 flex items-center gap-3">
          <ui-avatar [label]="userInitials()" />
          <div>
            <p class="text-foreground m-0 text-sm font-medium">{{ userName() }}</p>
            <p class="text-muted-foreground m-0 text-xs">Super Admin</p>
          </div>
        </div>
      }

      <ui-button
        intent="danger"
        appearance="outlined"
        block
        label="Sign Out"
        icon="log-out"
        (click)="logout()"
      />
    </div>
  </div>
</ui-drawer>
