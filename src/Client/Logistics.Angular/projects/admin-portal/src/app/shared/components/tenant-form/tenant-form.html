<form [formRoot]="form">
  <div class="mb-4 grid grid-cols-1 gap-4 md:grid-cols-2">
    <ui-form-field label="Tenant Name" [required]="true">
      <ui-text-field [formField]="form.name" placeholder="Enter tenant identifier" />
    </ui-form-field>

    <ui-form-field label="Company Name" [required]="true">
      <ui-text-field [formField]="form.companyName" placeholder="Enter company name" />
    </ui-form-field>
  </div>

  <div class="mb-4 grid grid-cols-1 gap-4 md:grid-cols-2">
    <ui-form-field label="Billing Email" [required]="true">
      <ui-text-field
        [formField]="form.billingEmail"
        placeholder="Enter billing email"
        type="email"
      />
    </ui-form-field>

    <ui-form-field label="DOT Number">
      <ui-text-field [formField]="form.dotNumber" placeholder="Enter DOT number" />
    </ui-form-field>
  </div>

  <div class="mb-4 grid grid-cols-1 gap-4 md:grid-cols-2">
    <ui-form-field
      label="Region"
      [required]="true"
      hint="Determines available countries for addresses"
    >
      <ui-select-field
        [formField]="form.region"
        [options]="regionOptions"
        placeholder="Select region"
      />
    </ui-form-field>
  </div>

  <div class="mb-4">
    <h4 class="mb-2 font-semibold">
      Company Address
      <span class="text-danger">*</span>
    </h4>
    <ui-address-form [formField]="form.companyAddress" />
  </div>

  @if (mode() === "create") {
    <div class="mb-4">
      <h4 class="mb-2 font-semibold">Owner Account</h4>
      <p class="text-muted-foreground mb-4 text-sm">
        The owner will receive login credentials via email.
      </p>

      <div class="mb-4 grid grid-cols-1 gap-4 md:grid-cols-2">
        <ui-form-field label="First Name" [required]="true">
          <ui-text-field [formField]="form.ownerFirstName" placeholder="Enter first name" />
        </ui-form-field>

        <ui-form-field label="Last Name" [required]="true">
          <ui-text-field [formField]="form.ownerLastName" placeholder="Enter last name" />
        </ui-form-field>
      </div>

      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <ui-form-field label="Email" [required]="true">
          <ui-text-field
            [formField]="form.ownerEmail"
            placeholder="Enter owner email"
            type="email"
          />
        </ui-form-field>
      </div>
    </div>
  }

  <div class="mt-6 flex gap-2">
    <ui-button
      [label]="mode() === 'create' ? 'Create' : 'Save'"
      icon="check"
      type="submit"
      [loading]="isLoading()"
      [disabled]="isLoading()"
    />
    <ui-button intent="secondary" label="Cancel" icon="x" routerLink="/tenants" />
    @if (mode() === "edit") {
      <ui-button
        intent="danger"
        appearance="outlined"
        label="Delete"
        icon="trash"
        (click)="askRemove()"
      />
    }
  </div>
</form>
