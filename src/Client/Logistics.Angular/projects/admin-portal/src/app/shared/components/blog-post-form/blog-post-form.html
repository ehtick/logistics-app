<form [formRoot]="form">
  <div class="mb-4 grid grid-cols-12 gap-4">
    <div class="col-span-12 md:col-span-8">
      <ui-form-field label="Title" [required]="true">
        <ui-text-field [formField]="form.title" placeholder="Enter blog post title" />
      </ui-form-field>
    </div>

    <div class="col-span-12 md:col-span-4">
      <ui-form-field label="Category">
        <ui-text-field [formField]="form.category" placeholder="e.g., Industry News, Tips" />
      </ui-form-field>
    </div>
  </div>

  <div class="mb-4">
    <ui-form-field label="Content" [required]="true">
      <ui-editor [formField]="form.content" contentHeight="320px" />
    </ui-form-field>
  </div>

  <div class="mb-4">
    <ui-form-field label="Excerpt">
      <ui-textarea-field
        [formField]="form.excerpt"
        placeholder="Brief summary of the post (shown in listings)"
        [rows]="3"
      />
    </ui-form-field>
  </div>

  <div class="mb-4 grid grid-cols-12 gap-4">
    <div class="col-span-12 md:col-span-6">
      <ui-form-field label="Author Name" [required]="true">
        <ui-text-field [formField]="form.authorName" placeholder="Enter author name" />
      </ui-form-field>
    </div>

    <div class="col-span-12 md:col-span-6">
      <ui-form-field label="Featured Image URL">
        <ui-text-field
          [formField]="form.featuredImage"
          placeholder="https://example.com/image.jpg"
        />
      </ui-form-field>
    </div>
  </div>

  <div class="mb-4">
    <ui-checkbox-field [formField]="form.isFeatured" inputId="isFeatured" />
    <label for="isFeatured" class="ml-2">Featured Post</label>
  </div>

  <div class="mt-6 flex flex-wrap gap-2">
    <ui-button
      [label]="mode() === 'create' ? 'Create' : 'Save'"
      icon="check"
      type="submit"
      [loading]="isLoading()"
      [disabled]="isLoading()"
    />
    <ui-button intent="secondary" label="Cancel" icon="x" routerLink="/blog-posts" />
    @if (mode() === "edit") {
      @if (status() === "draft" || status() === "archived") {
        <ui-button
          intent="success"
          appearance="outlined"
          label="Publish"
          icon="send"
          (click)="askPublish()"
        />
      }
      @if (status() === "published") {
        <ui-button
          intent="warn"
          appearance="outlined"
          label="Unpublish"
          icon="eye-off"
          (click)="askUnpublish()"
        />
      }
      <ui-button
        intent="danger"
        appearance="outlined"
        label="Delete"
        icon="trash"
        (click)="askRemove()"
      />
    }
  </div>
</form>
