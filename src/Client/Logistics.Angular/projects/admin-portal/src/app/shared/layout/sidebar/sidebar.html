<aside
  class="bg-sidebar border-border fixed top-0 left-0 z-40 hidden h-screen w-64 flex-col border-r md:flex"
>
  <!-- Header -->
  <div class="border-border flex h-16 items-center justify-center border-b px-4">
    <span class="text-foreground text-xl font-semibold">Admin Portal</span>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto px-3 py-2">
    @for (section of sections(); track section.label; let isLast = $last) {
      <p
        class="text-muted-foreground mt-3 mb-1 px-2 text-xs font-semibold tracking-wider uppercase"
      >
        {{ section.label }}
      </p>
      @for (item of section.items; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-primary/12 text-foreground"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-foreground hover:bg-sidebar-accent mb-0.5 flex items-center gap-3 rounded-lg px-3 py-2 text-sm transition-colors"
        >
          <ui-icon [name]="item.icon" size="inherit" class="shrink-0 text-base" />
          <span>{{ item.label }}</span>
        </a>
      }
      @if (!isLast) {
        <ui-divider />
      }
    }
  </nav>

  <!-- User section -->
  <div class="border-border border-t p-4">
    <div class="mb-3 flex items-center gap-3">
      <ui-avatar [label]="userInitials()" />
      <div>
        <p class="text-foreground m-0 text-sm font-medium">{{ userName() }}</p>
        <p class="text-muted-foreground m-0 text-xs">Super Admin</p>
      </div>
      <ui-theme-toggle class="ml-auto" />
    </div>
    <ui-button label="Logout" icon="log-out" intent="secondary" block (click)="logout()" />
  </div>
</aside>
