<ui-stack direction="row" align="center" justify="between" class="mb-6">
  <ui-typography variant="h2" tag="h1">My Invoices</ui-typography>
  <ui-search-field
    placeholder="Search invoices..."
    class="w-64"
    (searchChange)="onSearch($event)"
  />
</ui-stack>

<ui-surface variant="elevated" padding="none">
  <ui-data-table
    [value]="invoices()"
    [lazy]="true"
    [paginator]="true"
    [rows]="10"
    [first]="tableFirst()"
    [totalRecords]="totalRecords()"
    [loading]="isLoading()"
    [rowsPerPageOptions]="[10, 25, 50]"
    [tableStyle]="{ 'min-width': '50rem' }"
    (lazyLoad)="onLazyLoad($event)"
  >
    <ng-template #header>
      <tr>
        <th>Invoice #</th>
        <th>Load</th>
        <th>Date</th>
        <th>Due Date</th>
        <th>Amount</th>
        <th>Status</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-invoice>
      <tr>
        <td class="font-medium">INV-{{ invoice.number }}</td>
        <td>
          @if (invoice.loadId) {
            <a
              [routerLink]="['/shipments', invoice.loadId]"
              class="text-foreground hover:underline"
            >
              #{{ invoice.loadNumber }}
            </a>
          } @else {
            -
          }
        </td>
        <td>{{ invoice.createdAt | dateFormat: "mediumDate" }}</td>
        <td>{{ invoice.dueDate | dateFormat: "mediumDate" }}</td>
        <td class="font-medium">{{ invoice.total | currencyFormat }}</td>
        <td>
          <ui-status-badge [status]="invoice.status" kind="invoice" />
        </td>
        <td class="text-right">
          <ui-button
            appearance="text"
            icon="download"
            label="Download"
            (click)="downloadInvoice(invoice)"
          />
        </td>
      </tr>
    </ng-template>
    <ng-template #empty>
      <tr>
        <td colspan="7" class="py-12 text-center">
          <ui-stack align="center" gap="2">
            <ui-icon name="inbox" size="xl" color="muted" />
            <ui-typography variant="body" color="muted">No invoices found</ui-typography>
          </ui-stack>
        </td>
      </tr>
    </ng-template>
  </ui-data-table>
</ui-surface>
