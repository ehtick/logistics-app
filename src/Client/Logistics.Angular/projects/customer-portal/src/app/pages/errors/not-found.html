<div class="bg-background flex min-h-screen items-center justify-center">
  <div class="mx-4 max-w-lg text-center">
    <!-- Illustration -->
    <div class="relative mb-8">
      <div class="bg-primary/12 mx-auto flex h-40 w-40 items-center justify-center rounded-full">
        <div class="relative">
          <ui-icon name="map" size="xl" class="text-primary" />
          <div
            class="bg-warning/15 absolute -right-2 -bottom-2 flex h-12 w-12 items-center justify-center rounded-full"
          >
            <ui-icon name="circle-help" size="lg" class="text-warning" />
          </div>
        </div>
      </div>
      <!-- Decorative elements -->
      <div class="bg-primary/25 absolute top-0 left-1/4 h-3 w-3 rounded-full opacity-60"></div>
      <div class="bg-warning/30 absolute right-1/4 bottom-4 h-2 w-2 rounded-full opacity-60"></div>
      <div class="bg-border absolute top-1/4 right-1/3 h-4 w-4 rounded-full opacity-40"></div>
    </div>

    <!-- Error Code -->
    <h1 class="text-muted-foreground/40 mb-2 text-8xl">404</h1>

    <!-- Title -->
    <ui-typography variant="h3" tag="h2" align="center" class="mb-4">Page Not Found</ui-typography>

    <!-- Description -->
    <ui-typography variant="body" color="muted" align="center" class="mb-8 block">
      Oops! The page you're looking for seems to have wandered off. It might have been moved,
      deleted, or perhaps never existed.
    </ui-typography>

    <!-- Actions -->
    <ui-stack direction="row" justify="center" gap="3" class="flex-col items-center sm:flex-row">
      <ui-button routerLink="/" label="Go to Dashboard" icon="home" />
      <ui-button
        appearance="outlined"
        routerLink="/shipments"
        label="View Shipments"
        icon="truck"
      />
    </ui-stack>

    <!-- Help text -->
    <ui-typography variant="body-sm" color="muted" align="center" class="mt-8 block">
      Need help? Contact your company administrator or check your URL.
    </ui-typography>
  </div>
</div>
