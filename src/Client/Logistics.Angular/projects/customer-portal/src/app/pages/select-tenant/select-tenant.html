<div class="bg-background flex min-h-screen items-center justify-center p-4">
  <div class="w-full max-w-2xl">
    <ui-stack align="center" gap="2" class="mb-8 text-center">
      <ui-icon name="box" size="xl" class="text-foreground mb-4" />
      <ui-typography variant="h2" tag="h1" align="center">Select Company</ui-typography>
      <ui-typography variant="body" color="muted" align="center">
        Choose which company you'd like to access
      </ui-typography>
    </ui-stack>

    @if (isLoading()) {
      <ui-stack direction="row" justify="center" class="py-12">
        <ui-spinner />
      </ui-stack>
    } @else {
      <ui-grid container spacing="4">
        @for (tenant of tenants(); track tenant.id) {
          <ui-grid [size]="{ xs: 12, md: 6 }">
            <button
              type="button"
              class="group hover:border-primary focus:ring-primary border-border bg-card block w-full rounded-lg border p-6 text-left transition-all hover:shadow-md focus:ring-2 focus:ring-offset-2 focus:outline-none"
              (click)="selectTenant(tenant)"
            >
              <ui-stack direction="row" align="start" gap="4">
                <div
                  class="bg-primary/12 text-foreground group-hover:bg-primary group-hover:text-primary-foreground flex h-12 w-12 items-center justify-center rounded-lg"
                >
                  <ui-icon name="building-2" size="lg" />
                </div>
                <div class="flex-1">
                  <ui-typography variant="body" weight="semibold">
                    {{ tenant.companyName || tenant.tenantName }}
                  </ui-typography>
                  @if (tenant.customerName) {
                    <ui-typography variant="body-sm" color="muted" class="mt-1">
                      Customer: {{ tenant.customerName }}
                    </ui-typography>
                  }
                  @if (tenant.lastAccessedAt) {
                    <ui-typography variant="caption" color="muted" class="mt-1 block">
                      Last accessed: {{ tenant.lastAccessedAt | date: "short" }}
                    </ui-typography>
                  }
                </div>
                <ui-icon name="chevron-right" color="muted" />
              </ui-stack>
            </button>
          </ui-grid>
        }
      </ui-grid>

      @if (tenants().length === 0) {
        <ui-surface variant="elevated" padding="lg" class="block text-center">
          <ui-icon name="triangle-alert" size="xl" class="text-warning mb-4" />
          <ui-typography variant="h5" tag="h3" class="mb-2">No Access</ui-typography>
          <ui-typography variant="body" color="muted" class="mb-6">
            You don't have access to any companies. Please contact your administrator.
          </ui-typography>
          <ui-button appearance="outlined" label="Sign Out" icon="log-out" (click)="logout()" />
        </ui-surface>
      }
    }
  </div>
</div>
