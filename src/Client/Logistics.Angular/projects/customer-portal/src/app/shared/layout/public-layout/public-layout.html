<div class="bg-background min-h-screen">
  <header class="bg-card shadow-sm">
    <div class="mx-auto max-w-4xl px-4 py-6">
      <div class="flex items-center gap-4">
        @if (tenantLogoUrl()) {
          <img [src]="tenantLogoUrl()" alt="Company Logo" class="h-12 w-auto object-contain" />
        } @else {
          <div class="bg-primary flex h-12 w-12 items-center justify-center rounded-lg">
            <ui-icon name="truck" size="inherit" class="text-primary-foreground text-2xl" />
          </div>
        }
        <div>
          <h1 class="text-foreground">
            {{ tenantName() || "Shipment Tracking" }}
          </h1>
          <p class="text-muted-foreground text-sm">{{ subtitle() }}</p>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-4 py-8">
    <ng-content />
  </main>
</div>
