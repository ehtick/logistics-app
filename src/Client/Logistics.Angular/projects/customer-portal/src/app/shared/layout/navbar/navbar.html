<nav class="border-border bg-card sticky top-0 z-50 border-b">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <!-- Logo and company name -->
      <div class="flex items-center gap-4">
        <a routerLink="/" class="flex items-center gap-2">
          <ui-icon name="box" size="inherit" class="text-foreground text-2xl" />
          <span class="text-foreground text-xl font-semibold">Customer Portal</span>
        </a>

        @if (hasMultipleTenants()) {
          <ui-select-field
            [options]="availableTenants()"
            optionLabel="companyName"
            optionValue="tenantId"
            [value]="currentTenant()?.tenantId ?? null"
            (selectionChange)="onTenantChange($event)"
            placeholder="Select Company"
            [fluid]="false"
            class="w-56"
          />
        } @else if (currentTenant()) {
          <span class="bg-muted text-muted-foreground rounded-lg px-3 py-1 text-sm font-medium">
            {{ companyDisplayName() }}
          </span>
        }
      </div>

      <!-- Navigation links -->
      <div class="hidden items-center gap-1 md:flex">
        @for (item of navItems; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-primary/12 text-foreground"
            [routerLinkActiveOptions]="{ exact: item.route === '/' }"
            class="text-muted-foreground hover:bg-muted hover:text-foreground flex items-center gap-2 rounded-lg px-4 py-2 text-sm font-medium transition-colors"
          >
            <ui-icon [name]="item.icon" />
            <span>{{ item.label }}</span>
          </a>
        }
      </div>

      <!-- User menu -->
      <div class="flex items-center gap-3">
        <ui-theme-toggle />
        @if (userName()) {
          <span class="text-muted-foreground hidden text-sm sm:block">{{ userName() }}</span>
        }
        <ui-menu #menu [items]="profileMenuItems" />
        <ui-button
          intent="secondary"
          appearance="text"
          ariaLabel="Open profile menu"
          icon="user"
          [rounded]="true"
          (click)="menu.toggle($event)"
        />
      </div>
    </div>
  </div>

  <!-- Mobile navigation -->
  <div class="border-border border-t md:hidden">
    <div class="flex justify-around py-2">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="text-foreground"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="text-muted-foreground flex flex-col items-center gap-1 px-3 py-2 text-xs"
        >
          <ui-icon [name]="item.icon" size="inherit" class="text-lg" />
          <span>{{ item.label }}</span>
        </a>
      }
    </div>
  </div>
</nav>
