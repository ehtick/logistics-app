<ui-dialog
  header="Request a Demo"
  [open]="visible()"
  (openChange)="visible.set($event)"
  [modal]="true"
  width="500px"
  [breakpoints]="{ '640px': '95vw' }"
>
  @if (isSubmitted()) {
    <div class="flex flex-col items-center gap-4 py-8 text-center">
      <div class="flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
        <ui-icon name="check" size="inherit" class="text-3xl text-green-600" />
      </div>
      <h3 class="text-xl font-semibold text-gray-900">Thanks!</h3>
      <p class="text-gray-600">
        We got your demo request. Someone will be in touch within 24 hours.
      </p>
      <ui-button label="Close" (click)="closeDialog()" />
    </div>
  } @else {
    <form [formRoot]="form" class="flex flex-col pt-4">
      @if (errorMessage()) {
        <div class="mb-4 rounded-lg bg-red-50 p-3 text-sm text-red-600">
          <ui-icon name="circle-alert" class="mr-2" />
          {{ errorMessage() }}
        </div>
      }

      <div class="grid grid-cols-2 gap-4">
        <ui-form-field label="First Name" for="firstName" [required]="true">
          <ui-text-field id="firstName" [formField]="form.firstName" placeholder="John" />
        </ui-form-field>
        <ui-form-field label="Last Name" for="lastName" [required]="true">
          <ui-text-field id="lastName" [formField]="form.lastName" placeholder="Doe" />
        </ui-form-field>
      </div>

      <ui-form-field label="Work Email" for="email" [required]="true">
        <ui-text-field
          id="email"
          [formField]="form.email"
          type="email"
          placeholder="john@company.com"
        />
      </ui-form-field>

      <ui-form-field label="Company Name" for="company" [required]="true">
        <ui-text-field id="company" [formField]="form.company" placeholder="Acme Trucking" />
      </ui-form-field>

      <ui-form-field label="Phone Number" for="phone">
        <ui-phone-field id="phone" [formField]="form.phone" />
      </ui-form-field>

      <ui-form-field label="Fleet Size" for="fleetSize">
        <ui-select-field
          id="fleetSize"
          [formField]="form.fleetSize"
          [options]="fleetSizeOptions"
          placeholder="Select fleet size"
          styleClass="w-full"
        />
      </ui-form-field>

      <ui-form-field label="Message" for="message">
        <ui-textarea-field
          id="message"
          [formField]="form.message"
          [rows]="3"
          placeholder="Tell us about your needs..."
        />
      </ui-form-field>

      <div class="flex justify-end gap-2">
        <ui-button intent="secondary" label="Cancel" (click)="closeDialog()" />
        <ui-button
          label="Submit Request"
          type="submit"
          [disabled]="form().submitting()"
          [loading]="form().submitting()"
        />
      </div>
    </form>
  }
</ui-dialog>
