<web-section-container sectionId="faq" background="light" maxWidth="3xl">
  <div webScrollAnimate="fade-up">
    <web-section-header
      label="FAQ"
      title="Frequently asked questions"
      subtitle="If your question isn't here, send us a note."
    />
  </div>

  <div webScrollAnimate="fade-up" [delay]="200" class="mt-12">
    @defer {
      <ui-accordion type="multiple" class="faq-accordion">
        @for (faq of faqs; track faq.question) {
          <ui-accordion-panel>
            <ui-accordion-header>
              <span class="font-display text-ink font-semibold">{{ faq.question }}</span>
            </ui-accordion-header>
            <ui-accordion-content>
              <p class="text-steel leading-relaxed">{{ faq.answer }}</p>
            </ui-accordion-content>
          </ui-accordion-panel>
        }
      </ui-accordion>
    }
  </div>
</web-section-container>
