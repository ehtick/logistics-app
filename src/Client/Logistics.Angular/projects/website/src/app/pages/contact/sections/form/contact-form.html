<web-section-container sectionId="contact-form" background="white">
  <div class="mx-auto max-w-2xl">
    @if (isSubmitted()) {
      <!-- Success State -->
      <div class="rounded-2xl bg-green-50 p-8 text-center" webScrollAnimate="scale-up">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
          <ui-icon name="check" size="inherit" class="text-3xl text-green-600" />
        </div>
        <h3 class="mt-6 text-2xl font-bold text-gray-900">Message sent</h3>
        <p class="mt-2 text-gray-600">
          Thanks for reaching out. We'll get back to you within 24 hours.
        </p>
        <ui-button
          appearance="outlined"
          label="Send Another Message"
          [rounded]="true"
          (click)="resetForm()"
          class="mt-6"
        />
      </div>
    } @else {
      <!-- Form -->
      <div webScrollAnimate="fade-up">
        <h2 class="text-center text-2xl font-bold text-gray-900">Send us a message</h2>
        <p class="mt-2 text-center text-gray-600">Fill this out and we'll get back to you.</p>

        <form [formRoot]="form" class="mt-8">
          <!-- Name Fields -->
          <div class="grid gap-4 sm:grid-cols-2">
            <ui-form-field label="First Name" for="firstName" [required]="true">
              <ui-text-field id="firstName" [formField]="form.firstName" placeholder="John" />
            </ui-form-field>
            <ui-form-field label="Last Name" for="lastName" [required]="true">
              <ui-text-field id="lastName" [formField]="form.lastName" placeholder="Doe" />
            </ui-form-field>
          </div>

          <!-- Email & Phone -->
          <div class="grid gap-4 sm:grid-cols-2">
            <ui-form-field label="Email" for="email" [required]="true">
              <ui-text-field
                id="email"
                type="email"
                [formField]="form.email"
                placeholder="john@company.com"
              />
            </ui-form-field>
            <ui-form-field label="Phone" for="phone" hint="Optional">
              <ui-text-field
                id="phone"
                type="tel"
                [formField]="form.phone"
                placeholder="(555) 123-4567"
              />
            </ui-form-field>
          </div>

          <!-- Subject -->
          <ui-form-field label="Subject" for="subject" [required]="true">
            <ui-select-field
              id="subject"
              [formField]="form.subject"
              [options]="subjectOptions"
              optionLabel="label"
              optionValue="value"
              placeholder="Select a subject"
              styleClass="w-full"
            />
          </ui-form-field>

          <!-- Message -->
          <ui-form-field label="Message" for="message" [required]="true">
            <ui-textarea-field
              id="message"
              [formField]="form.message"
              [rows]="5"
              placeholder="How can we help you?"
            />
          </ui-form-field>

          <!-- Error Message -->
          @if (errorMessage()) {
            <div class="mb-4 rounded-lg bg-red-50 p-4 text-sm text-red-600">
              <ui-icon name="circle-alert" class="mr-2" />
              {{ errorMessage() }}
            </div>
          }

          <!-- Submit Button -->
          <div class="text-center">
            <ui-button
              size="lg"
              type="submit"
              label="Send Message"
              iconEnd="send"
              [loading]="form().submitting()"
              [rounded]="true"
            />
          </div>
        </form>
      </div>
    }
  </div>
</web-section-container>
