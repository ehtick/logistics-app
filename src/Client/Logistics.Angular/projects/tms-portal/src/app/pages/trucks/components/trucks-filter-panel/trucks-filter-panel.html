<ui-card class="mb-4">
  <ui-stack direction="row" align="center" justify="between" class="mb-4">
    <ui-typography variant="h6" color="primary" weight="bold">Filters</ui-typography>
    <ui-stack direction="row" align="center" gap="2">
      @if (activeFilterCount() > 0) {
        <ui-typography variant="body-sm" color="muted">
          {{ activeFilterCount() }} active
        </ui-typography>
      }
      <ui-button
        appearance="text"
        size="sm"
        label="Clear All"
        icon="x"
        (click)="clearFilters()"
        [disabled]="activeFilterCount() === 0"
      />
    </ui-stack>
  </ui-stack>

  <div class="grid grid-cols-1 gap-x-4 md:grid-cols-3">
    <ui-form-field label="Search">
      <ui-search-field class="w-full" (searchChange)="onSearch($event)" />
    </ui-form-field>

    <ui-form-field label="Status">
      <ui-multiselect-field
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        [(value)]="selectedStatuses"
        (selectionChange)="applyFilters()"
        placeholder="Select status"
        [showClear]="true"
      />
    </ui-form-field>

    <ui-form-field label="Type">
      <ui-multiselect-field
        [options]="typeOptions"
        optionLabel="label"
        optionValue="value"
        [(value)]="selectedTypes"
        (selectionChange)="applyFilters()"
        placeholder="Select type"
        [showClear]="true"
      />
    </ui-form-field>
  </div>
</ui-card>
