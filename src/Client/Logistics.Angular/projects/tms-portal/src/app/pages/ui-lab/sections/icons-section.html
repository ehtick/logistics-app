<section id="icons" class="scroll-mt-24">
  <ui-typography variant="h2" tag="h2">Icons</ui-typography>
  <ui-typography variant="body-sm" color="muted">
    {{ icons.length }} icons, driven straight off
    <code>UI_ICONS</code>
    . Every cell is bordered — an empty box is a blank icon.
  </ui-typography>

  <div
    data-lab="icons-all"
    class="mt-4 grid grid-cols-3 gap-2 sm:grid-cols-5 md:grid-cols-8 lg:grid-cols-10"
  >
    @for (name of icons; track name) {
      <div
        class="border-default flex flex-col items-center justify-center gap-1 rounded-md border p-2"
        [attr.data-icon]="name"
        [title]="name"
      >
        <ui-icon [name]="name" size="lg" />
        <span class="text-muted-foreground truncate text-xs" [title]="name">{{ name }}</span>
      </div>
    }
  </div>

  <ui-typography variant="h4" tag="h3" class="mt-6">Sizes</ui-typography>
  <div data-lab="icons-sizes" class="mt-2 flex flex-wrap items-end gap-4">
    @for (size of sizes; track size) {
      <div
        class="border-default flex flex-col items-center gap-1 rounded-md border px-4 py-2"
        [attr.data-icon-size]="size"
      >
        <ui-icon name="truck" [size]="size" />
        <span class="text-muted-foreground text-xs">{{ size }}</span>
      </div>
    }
  </div>

  <ui-typography variant="h4" tag="h3" class="mt-6">Colors</ui-typography>
  <div data-lab="icons-colors" class="mt-2 flex flex-wrap items-end gap-4">
    @for (color of colors; track color) {
      <div
        class="border-default flex flex-col items-center gap-1 rounded-md border px-4 py-2"
        [attr.data-icon-color]="color"
      >
        <ui-icon name="circle-check" size="lg" [color]="color" />
        <span class="text-muted-foreground text-xs">{{ color }}</span>
      </div>
    }
  </div>
</section>
