<ui-page-header title="Expenses" addRoute="/expenses/add" addTooltip="Add a new expense">
  <ui-button
    appearance="outlined"
    icon="chart-column"
    label="Analytics"
    [routerLink]="['/expenses/analytics']"
  />
</ui-page-header>

<ui-card>
  <div class="mb-4">
    <ui-search-field (searchChange)="onSearch($event)" />
  </div>

  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No expenses found"
    emptyMessage="Try adjusting your search or add a new expense."
    (retry)="store.retry()"
  >
    <ui-data-table
      [value]="store.data()"
      dataKey="id"
      [scrollable]="true"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th uiSortHeader="Number" class="w-24">#</th>
          <th uiSortHeader="Type" class="w-28">Type</th>
          <th>Category</th>
          <th>Vendor</th>
          <th uiSortHeader="Amount" class="w-32">Amount</th>
          <th uiSortHeader="ExpenseDate" class="w-36">Date</th>
          <th uiSortHeader="Status" class="w-28">Status</th>
          <th class="w-24">Receipt</th>
          <th class="w-24">Action</th>
        </tr>
      </ng-template>
      <ng-template #body let-expense>
        <tr class="hover:bg-hover cursor-pointer" (click)="selectedRow.set(expense)">
          <td>
            <span class="font-mono text-sm">{{ expense.number }}</span>
          </td>
          <td>
            <app-expense-type-tag [type]="expense.type" />
          </td>
          <td>
            <span class="text-sm">{{ getCategoryLabel(expense) }}</span>
          </td>
          <td>
            <span class="text-sm">{{ expense.vendorName || "N/A" }}</span>
          </td>
          <td>
            <span class="font-medium">
              {{ expense.amount?.amount | currencyFormat }}
            </span>
          </td>
          <td>{{ expense.expenseDate | dateFormat: "mediumDate" }}</td>
          <td>
            <app-expense-status-tag [status]="expense.status" />
          </td>
          <td>
            @if (expense.receiptBlobPath) {
              <ui-button
                intent="success"
                appearance="text"
                size="sm"
                icon="file"
                uiTooltip="View receipt"
                ariaLabel="View receipt"
                (click)="viewReceipt(expense, $event)"
              />
            } @else {
              <ui-icon name="file" color="muted" uiTooltip="No receipt" />
            }
          </td>
          <td>
            <ui-button
              appearance="text"
              icon="ellipsis-vertical"
              (click)="openActionMenu(expense, menu, $event); $event.stopPropagation()"
              ariaLabel="Show actions menu"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<!-- Context menu for actions -->
<ui-menu #menu [items]="actionMenuItems()" />

<!-- Reject dialog -->
<app-reject-expense-dialog />
