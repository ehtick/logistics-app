<ui-dialog
  header="Resolve Exception"
  [(open)]="visible"
  [modal]="true"
  width="450px"
  [closable]="true"
  (closed)="close()"
>
  @if (exception(); as exc) {
    <div class="space-y-4">
      <div class="border-default bg-subtle rounded-lg border p-4">
        @if (exceptionType(); as type) {
          <div class="mb-2 flex items-center gap-2">
            <app-exception-type-tag [type]="type" />
          </div>
        }
        <p class="text-subtle-foreground m-0 text-sm">{{ exc.reason }}</p>
        <p class="text-muted-foreground m-0 mt-2 text-xs">Reported by {{ exc.reportedByName }}</p>
      </div>

      <ui-form-field label="Resolution Notes" [required]="true">
        <ui-textarea-field
          [(value)]="resolution"
          [rows]="4"
          placeholder="Describe how the exception was resolved..."
        />
      </ui-form-field>
    </div>
  }

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <ui-button appearance="text" label="Cancel" (click)="close()" [disabled]="isSubmitting()" />
      <ui-button
        intent="success"
        label="Mark Resolved"
        icon="check"
        (click)="submit()"
        [loading]="isSubmitting()"
        [disabled]="!exception() || !resolution().trim()"
      />
    </div>
  </ng-template>
</ui-dialog>
