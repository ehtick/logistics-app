<ui-dialog
  header="Record Manual Payment"
  [(open)]="visible"
  [modal]="true"
  width="450px"
  (opened)="onShow()"
  (closed)="close()"
>
  <p class="text-muted-foreground mb-4">
    Record a cash or check payment received from the customer.
  </p>

  <form [formRoot]="form">
    <ui-form-field label="Amount" for="amount" [required]="true">
      <ui-number-field
        id="amount"
        [formField]="form.amount"
        mode="currency"
        currency="USD"
        locale="en-US"
      />
    </ui-form-field>

    <ui-form-field label="Payment Type" for="type" [required]="true">
      <ui-select-field
        id="type"
        [formField]="form.type"
        [options]="paymentTypes"
        optionLabel="label"
        optionValue="value"
      />
    </ui-form-field>

    <ui-form-field
      label="Reference Number"
      for="referenceNumber"
      hint="Check number, receipt ID, etc."
    >
      <ui-text-field id="referenceNumber" [formField]="form.referenceNumber" />
    </ui-form-field>

    <ui-form-field label="Received Date" for="receivedDate">
      <ui-date-field
        id="receivedDate"
        [formField]="form.receivedDate"
        [showIcon]="true"
        dateFormat="mm/dd/yy"
      />
    </ui-form-field>

    <ui-form-field label="Notes" for="notes">
      <ui-textarea-field
        id="notes"
        [formField]="form.notes"
        [rows]="2"
        placeholder="Add any additional notes about this payment..."
      />
    </ui-form-field>

    <ui-stack direction="row" justify="end" gap="2">
      <ui-button appearance="outlined" type="button" label="Cancel" (click)="close()" />
      <ui-button
        type="submit"
        icon="check"
        label="Record Payment"
        [loading]="form().submitting()"
      />
    </ui-stack>
  </form>
</ui-dialog>
