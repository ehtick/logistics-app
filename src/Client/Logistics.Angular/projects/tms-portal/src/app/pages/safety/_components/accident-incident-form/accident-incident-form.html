<div class="py-4">
  <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
    <ui-form-field label="Date & Time" for="accidentDateTime" [required]="true">
      <ui-date-field
        [formField]="field().accidentDateTime"
        id="accidentDateTime"
        [showTime]="true"
        [showIcon]="true"
        dateFormat="mm/dd/yy"
        [fluid]="true"
      />
    </ui-form-field>

    <ui-form-field label="Location" for="location" [required]="true">
      <app-address-autocomplete
        [formField]="field().location"
        placeholder="Type address..."
        [forceSelection]="true"
      />
    </ui-form-field>
  </div>

  <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2">
    <ui-form-field label="Truck" for="truck" [required]="true">
      <app-search-truck [formField]="field().truck" />
    </ui-form-field>

    <ui-form-field label="Driver" for="driver" [required]="true">
      <app-search-employee
        [formField]="field().driver"
        [role]="'tenant.driver'"
        placeholder="Search for driver..."
      />
    </ui-form-field>
  </div>

  <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2">
    <ui-form-field label="Accident Type" for="type" [required]="true">
      <ui-select-field
        [formField]="field().type"
        id="type"
        [options]="typeOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select type"
      />
    </ui-form-field>

    <ui-form-field label="Severity" for="severity" [required]="true">
      <ui-select-field
        [formField]="field().severity"
        id="severity"
        [options]="severityOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select severity"
      />
    </ui-form-field>
  </div>

  <ui-form-field label="Description" for="description" [required]="true" class="mt-4">
    <ui-textarea-field
      [formField]="field().description"
      id="description"
      [rows]="4"
      placeholder="Describe what happened..."
    />
  </ui-form-field>

  <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2">
    <ui-form-field label="Weather Conditions" for="weatherConditions">
      <ui-text-field
        [formField]="field().weatherConditions"
        id="weatherConditions"
        placeholder="e.g., Clear, Rainy, Foggy"
      />
    </ui-form-field>

    <ui-form-field label="Road Conditions" for="roadConditions">
      <ui-text-field
        [formField]="field().roadConditions"
        id="roadConditions"
        placeholder="e.g., Dry, Wet, Icy"
      />
    </ui-form-field>
  </div>
</div>
