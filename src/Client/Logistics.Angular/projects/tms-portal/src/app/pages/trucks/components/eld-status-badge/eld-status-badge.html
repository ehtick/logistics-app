@if (providerInfo()) {
  <span
    class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-medium"
    [class]="
      isConnected()
        ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400'
        : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'
    "
    [uiTooltip]="statusText() + (lastSyncText() ? ' • Last sync: ' + lastSyncText() : '')"
  >
    <ui-icon
      [name]="providerInfo()!.icon"
      size="inherit"
      class="text-xs"
      [class]="isConnected() ? 'text-green-600' : 'text-red-500'"
    />
    {{ providerInfo()!.label }}
    @if (isConnected()) {
      <ui-icon name="circle-check" size="inherit" class="text-xs" />
    } @else {
      <ui-icon name="circle-x" size="inherit" class="text-xs" />
    }
  </span>
} @else {
  <span
    class="inline-flex items-center gap-1.5 rounded-full bg-gray-100 px-2.5 py-1 text-xs font-medium text-gray-600 dark:bg-gray-800 dark:text-gray-400"
    uiTooltip="No ELD provider configured"
  >
    <ui-icon name="wifi" size="inherit" class="text-xs" />
    No ELD
  </span>
}
