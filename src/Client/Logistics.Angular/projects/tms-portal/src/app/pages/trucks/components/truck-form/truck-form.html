<ui-stack [direction]="{ sm: 'col', md: 'row' }" gap="6">
  <!-- Left: Form -->
  @if (isLoading()) {
    <ui-stack direction="row" justify="center" class="py-8">
      <ui-icon name="loader-circle" spin size="xl" />
    </ui-stack>
  }

  <form [formRoot]="form">
    <ui-stack gap="6">
      <!-- Truck Information Section -->
      <ui-stack tag="section" gap="3">
        <ui-stack direction="row" gap="2" align="center">
          <ui-icon name="truck" color="secondary" />
          <ui-typography variant="overline" color="secondary">Truck Information</ui-typography>
        </ui-stack>
        <ui-surface variant="elevated" [border]="true">
          <ui-form-field label="Truck Number" for="truckNumber" [required]="true">
            <ui-text-field
              id="truckNumber"
              [formField]="form.truckNumber"
              type="text"
              placeholder="e.g., T-001"
            />
          </ui-form-field>

          <ui-form-field label="Truck Type" for="truckType" [required]="true">
            <ui-select-field
              [formField]="form.truckType"
              [options]="truckTypes"
              placeholder="Select truck type"
            />
          </ui-form-field>

          @if (mode() === "edit") {
            <ui-form-field label="Status" for="truckStatus" [required]="true">
              <ui-select-field
                [formField]="form.truckStatus"
                [options]="truckStatuses"
                placeholder="Select status"
              />
            </ui-form-field>
          }

          @if (isCarHauler()) {
            <ui-form-field
              label="Vehicle Capacity"
              for="vehicleCapacity"
              hint="Maximum number of vehicles this hauler can carry"
              class="mb-0"
            >
              <ui-number-field
                [formField]="form.vehicleCapacity"
                inputId="vehicleCapacity"
                placeholder="e.g., 8"
              />
            </ui-form-field>
          }
        </ui-surface>
      </ui-stack>

      <!-- Vehicle Details Section -->
      <ui-stack tag="section" gap="3">
        <ui-stack direction="row" gap="2" align="center">
          <ui-icon name="car" color="secondary" />
          <ui-typography variant="overline" color="secondary">Vehicle Details</ui-typography>
        </ui-stack>
        <ui-surface variant="elevated" [border]="true">
          <ui-grid container spacing="4">
            <ui-grid [size]="{ xs: 12, md: 6 }">
              <ui-form-field label="Make" for="make">
                <ui-text-field
                  id="make"
                  [formField]="form.make"
                  type="text"
                  placeholder="e.g., Freightliner"
                />
              </ui-form-field>
            </ui-grid>

            <ui-grid [size]="{ xs: 12, md: 6 }">
              <ui-form-field label="Model" for="model">
                <ui-text-field
                  id="model"
                  [formField]="form.model"
                  type="text"
                  placeholder="e.g., Cascadia"
                />
              </ui-form-field>
            </ui-grid>

            <ui-grid [size]="{ xs: 12, md: 6 }">
              <ui-form-field label="Year" for="year">
                <ui-number-field
                  [formField]="form.year"
                  inputId="year"
                  [useGrouping]="false"
                  placeholder="e.g., 2023"
                />
              </ui-form-field>
            </ui-grid>

            <ui-grid [size]="{ xs: 12, md: 6 }">
              <app-truck-vin-field [field]="form" />
            </ui-grid>
          </ui-grid>
        </ui-surface>
      </ui-stack>

      <!-- Registration Section -->
      <ui-stack tag="section" gap="3">
        <ui-stack direction="row" gap="2" align="center">
          <ui-icon name="id-card" color="secondary" />
          <ui-typography variant="overline" color="secondary">Registration</ui-typography>
        </ui-stack>
        <ui-surface variant="elevated" [border]="true">
          <ui-grid container spacing="4">
            <ui-grid [size]="{ xs: 12, md: 6 }">
              <ui-form-field label="License Plate" for="licensePlate">
                <ui-text-field
                  id="licensePlate"
                  [formField]="form.licensePlate"
                  type="text"
                  placeholder="e.g., ABC-1234"
                />
              </ui-form-field>
            </ui-grid>

            <ui-grid [size]="{ xs: 12, md: 6 }">
              <ui-form-field label="License Plate State" for="licensePlateState" class="mb-0">
                <ui-text-field
                  id="licensePlateState"
                  [formField]="form.licensePlateState"
                  type="text"
                  placeholder="e.g., TX"
                  [maxlength]="2"
                />
              </ui-form-field>
            </ui-grid>
          </ui-grid>
        </ui-surface>
      </ui-stack>

      <!-- Driver Assignment Section -->
      <ui-stack tag="section" gap="3">
        <ui-stack direction="row" gap="2" align="center">
          <ui-icon name="users" color="secondary" />
          <ui-typography variant="overline" color="secondary">Driver Assignment</ui-typography>
        </ui-stack>
        <ui-surface variant="elevated" [border]="true">
          <ui-form-field label="Main Driver" for="mainDriver">
            <ui-autocomplete-field
              [formField]="form.mainDriver"
              placeholder="Search for a driver..."
              optionLabel="fullName"
              [minQueryLength]="2"
              [suggestions]="suggestedDrivers()"
              (completeMethod)="searchDriver($event)"
            />
          </ui-form-field>

          <ui-form-field label="Secondary Driver" for="secondaryDriver" class="mb-0">
            <ui-autocomplete-field
              [formField]="form.secondaryDriver"
              placeholder="Search for a driver..."
              optionLabel="fullName"
              [minQueryLength]="2"
              [suggestions]="suggestedDrivers()"
              (completeMethod)="searchDriver($event)"
            />
          </ui-form-field>
        </ui-surface>
      </ui-stack>

      <app-truck-hazmat-section [field]="form" />

      <!-- Action Buttons -->
      <ui-stack direction="row" gap="2">
        <ui-button
          type="submit"
          icon="check"
          [label]="mode() === 'create' ? 'Create Truck' : 'Update Truck'"
          [disabled]="isLoading()"
        />

        @if (mode() === "edit") {
          <ui-button
            intent="danger"
            type="button"
            icon="trash"
            label="Delete"
            [disabled]="isLoading()"
            (click)="askRemove()"
          />
        }

        <ui-button
          appearance="outlined"
          type="button"
          icon="arrow-left"
          label="Back to list"
          [routerLink]="['/trucks']"
        />
      </ui-stack>
    </ui-stack>
  </form>

  <!-- Right: Tips Panel -->

  <app-truck-form-tips [mode]="mode()" />
</ui-stack>
