<ui-dialog
  header="Reject Expense"
  [(open)]="service.showRejectDialog"
  [modal]="true"
  width="450px"
  [closable]="true"
  (closed)="service.cancelReject()"
>
  <div class="flex flex-col gap-4">
    <p class="text-subtle-foreground">
      Please provide a reason for rejecting expense #{{ service.pendingExpenseNumber() }}.
    </p>
    <ui-textarea-field
      [(value)]="service.rejectionReason"
      [rows]="4"
      class="block w-full"
      placeholder="Enter rejection reason..."
    />
  </div>
  <ng-template #footer>
    <ui-button appearance="text" label="Cancel" (click)="service.cancelReject()" />
    <ui-button
      intent="danger"
      label="Reject"
      icon="x"
      [disabled]="!service.rejectionReason().trim()"
      (click)="service.confirmReject()"
    />
  </ng-template>
</ui-dialog>
