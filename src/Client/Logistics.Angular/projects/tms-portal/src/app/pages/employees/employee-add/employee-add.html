<ui-page-header title="Add Employee" backLink="/employees" />

<ui-container maxWidth="md">
  @if (isLoading()) {
    <ui-stack align="center" justify="center" class="py-8">
      <ui-spinner />
    </ui-stack>
  }

  <form [formRoot]="form">
    <ui-stack gap="6">
      <!-- Employee Details Section -->
      <ui-stack tag="section" gap="3">
        <ui-stack direction="row" gap="2" align="center">
          <ui-icon name="user" color="secondary" />
          <ui-typography variant="overline" color="secondary">Employee Details</ui-typography>
        </ui-stack>
        <ui-surface variant="elevated" [border]="true">
          <ui-form-field label="User Name" for="name" hint="Start typing (minimum 3 characters)">
            <ui-autocomplete-field
              [formField]="form.user"
              placeholder="Type user name"
              optionLabel="userName"
              [minQueryLength]="3"
              [suggestions]="suggestedUsers()"
              (completeMethod)="searchUser($event)"
            />
          </ui-form-field>

          <ui-form-field label="Role" for="role" class="mb-0">
            <ui-select-field
              [formField]="form.role"
              [options]="roles()"
              optionValue="name"
              optionLabel="displayName"
              [showClear]="true"
              (cleared)="clearSelectedRole()"
            />
          </ui-form-field>
        </ui-surface>
      </ui-stack>

      <!-- Compensation Section -->
      <ui-stack tag="section" gap="3">
        <ui-stack direction="row" gap="2" align="center">
          <ui-icon name="dollar-sign" color="secondary" />
          <ui-typography variant="overline" color="secondary">Compensation</ui-typography>
        </ui-stack>
        <ui-surface variant="elevated" [border]="true">
          <ui-form-field label="Salary Type" for="salaryType">
            <ui-select-field [formField]="form.salaryType" [options]="salaryTypes" />
          </ui-form-field>

          <ui-form-field label="Salary" for="salary" class="mb-0">
            @if (isShareOfGrossSalary()) {
              <ui-unit-field [formField]="form.salary" unit="%" />
            } @else {
              <ui-currency-field [formField]="form.salary" />
            }
          </ui-form-field>
        </ui-surface>
      </ui-stack>

      <!-- Action Buttons -->
      <ui-stack direction="row" gap="2">
        <ui-button
          type="submit"
          icon="plus"
          label="Add"
          [loading]="form().submitting()"
          [disabled]="isLoading()"
        />
        <ui-button
          appearance="outlined"
          type="button"
          icon="arrow-left"
          label="Back to list"
          [routerLink]="['/employees']"
        />
      </ui-stack>
    </ui-stack>
  </form>
</ui-container>
