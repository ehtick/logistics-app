<div class="animate-in fade-in">
  <ui-page-header title="List Loads" addRoute="/loads/add" addTooltip="Add a new load">
    <ui-stack direction="row" gap="1">
      <ui-button
        appearance="text"
        size="lg"
        icon="file-input"
        [rounded]="true"
        uiTooltip="Import from PDF"
        ariaLabel="Import from PDF"
        [routerLink]="['/loads/import']"
      />
      <ui-button
        appearance="text"
        size="lg"
        icon="download"
        [rounded]="true"
        uiTooltip="Export to CSV"
        ariaLabel="Export to CSV"
        (click)="exportToCsv()"
        [disabled]="store.isEmpty()"
      />
    </ui-stack>
  </ui-page-header>

  <!-- Summary Stats -->
  <app-loads-summary-stats
    [loads]="store.data()"
    [totalRecords]="store.totalRecords()"
    [isLoading]="store.isLoading()"
  />

  <!-- Filter Panel -->
  <app-loads-filter-panel
    [isLoading]="store.isLoading()"
    (filtersChanged)="onFiltersChanged($event)"
    (searchChanged)="onSearchChanged($event)"
  />

  <!-- Bulk Action Toolbar -->
  @if (selectedLoads().length > 0) {
    <app-loads-bulk-toolbar
      [selectedLoads]="selectedLoads()"
      [isProcessing]="isBulkProcessing()"
      (assignRequested)="openBulkAssignDialog()"
      (dispatched)="onBulkDispatched()"
      (deleted)="onBulkDeleted()"
      (selectionCleared)="clearSelection()"
    />
  }

  <!-- Data Table -->
  <app-loads-table
    [data]="store.data()"
    [isLoading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    [totalRecords]="store.totalRecords()"
    [pageSize]="store.pageSize()"
    [first]="store.first()"
    [(selectedLoads)]="selectedLoads"
    (lazyLoad)="store.onLazyLoad($event)"
    (retry)="store.retry()"
    (addLoad)="addLoad()"
    (assignLoad)="onAssignLoad($event)"
    (dispatchLoad)="onDispatchLoad($event)"
  />

  <!-- Bulk Assign Dialog -->
  <app-bulk-assign-dialog
    [loads]="selectedLoads()"
    [(visible)]="showBulkAssignDialog"
    (assigned)="onBulkAssigned()"
  />
</div>
