<app-provider-connect-dialog
  header="Add Fuel Card Provider"
  submitLabel="Add Provider"
  [(visible)]="visible"
  [saving]="saving()"
  [form]="form"
  (opened)="onShow()"
>
  <ui-form-field label="Provider" for="providerType" [required]="true">
    <ui-select-field
      id="providerType"
      [formField]="form.providerType"
      [options]="providerOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Select provider"
    >
      <ng-template #item let-item>
        <div>
          <div class="font-medium">{{ item.label }}</div>
          <small class="text-muted-foreground">{{ item.description }}</small>
        </div>
      </ng-template>
    </ui-select-field>
  </ui-form-field>

  <ui-form-field
    label="API Key"
    for="apiKey"
    [required]="true"
    hint="Your fuel card provider API key or access token"
  >
    <ui-text-field id="apiKey" [formField]="form.apiKey" placeholder="Enter API key" />
  </ui-form-field>

  <ui-form-field label="API Secret (Optional)" for="apiSecret" hint="Required for some providers">
    <ui-password-field
      id="apiSecret"
      [formField]="form.apiSecret"
      [toggleMask]="true"
      [feedback]="false"
      placeholder="Enter API secret"
    />
  </ui-form-field>

  <ui-form-field
    label="Account ID (Optional)"
    for="externalAccountId"
    hint="Your carrier account number with the provider"
  >
    <ui-text-field
      id="externalAccountId"
      [formField]="form.externalAccountId"
      placeholder="Enter account ID"
    />
  </ui-form-field>

  <ui-alert intent="warning" title="Where to get credentials" class="mt-4 block">
    <ul class="mt-1 mb-0 list-inside list-disc text-sm">
      <li>Demo: Enter any text as API key (for testing only)</li>
      <li>WEX: Request API access through your WEX account manager</li>
      <li>EFS: Request eManager API credentials from EFS support</li>
    </ul>
  </ui-alert>
</app-provider-connect-dialog>
