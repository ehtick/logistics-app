@if (stacked()) {
  <div>
    <span class="text-muted-foreground block">{{ label() }}</span>
    <span class="mt-1 block">
      <ng-content />
    </span>
  </div>
} @else {
  <div class="flex items-center justify-between">
    <span class="text-muted-foreground">{{ label() }}</span>
    <ng-content />
  </div>
}
