<ui-card class="border-0 shadow-sm">
  <ng-template #header>
    <ui-stack direction="row" align="center" gap="2" class="p-3">
      <ui-icon name="zap" color="warning" />
      <ui-typography variant="h5" class="mb-0">Quick Actions</ui-typography>
    </ui-stack>
  </ng-template>

  <ui-grid container spacing="4">
    @for (action of actions; track action.route) {
      <ui-grid [size]="{ xs: 12, md: 4 }">
        <!-- Deliberately NOT a ui-button. ui-button is filled by `label` + `icon`, and this is a
             clickable CARD: an icon medallion, a title and a description, laid out by itself — free-
             form content ui-button's slots cannot express. The classes below are the
             secondary/outlined cell of ui-button's own cva, so it still looks like a button. -->
        <button
          type="button"
          class="border-strong text-subtle-foreground hover:bg-secondary hover:text-foreground flex h-auto w-full cursor-pointer items-center gap-3 rounded-md border p-4 text-left transition-colors"
          (click)="navigate(action.route)"
        >
          <div class="bg-subtle flex h-12 w-12 shrink-0 items-center justify-center rounded-full">
            <ui-icon [name]="action.icon" size="lg" [color]="action.iconColor" />
          </div>
          <div>
            <ui-typography variant="h6" class="mb-1">{{ action.label }}</ui-typography>
            <ui-typography variant="body-sm" color="muted" class="mb-0">
              {{ action.description }}
            </ui-typography>
          </div>
        </button>
      </ui-grid>
    }
  </ui-grid>
</ui-card>
