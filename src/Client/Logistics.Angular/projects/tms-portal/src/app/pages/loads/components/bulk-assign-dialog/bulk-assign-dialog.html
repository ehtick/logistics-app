<ui-dialog
  header="Assign Loads to Truck"
  [(open)]="visible"
  [modal]="true"
  width="450px"
  [closable]="true"
  (closed)="close()"
>
  <div class="space-y-4">
    <div class="bg-surface-100 dark:bg-surface-800 rounded-lg p-4">
      <div class="text-muted-foreground mb-1 text-sm">Selected Loads</div>
      <div class="text-foreground text-xl font-semibold">{{ loads().length }} load(s)</div>
      <div class="text-muted-foreground text-sm">
        Total value: {{ totalCost() | currencyFormat }}
      </div>
    </div>

    <div>
      <span class="text-subtle-foreground mb-2 block text-sm font-medium">Select Truck</span>
      <app-search-truck [(value)]="selectedTruck" />
    </div>

    @if (selectedTruck()) {
      <div class="bg-surface-50 dark:bg-surface-700 rounded-lg p-3">
        <div class="text-muted-foreground text-sm">Assigning to</div>
        <div class="text-foreground font-semibold">Truck #{{ selectedTruck()!.number }}</div>
        @if (selectedTruck()!.mainDriver) {
          <div class="text-muted-foreground text-sm">Driver: {{ selectedTruck()!.mainDriver }}</div>
        }
      </div>
    }
  </div>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <ui-button appearance="text" label="Cancel" (click)="close()" [disabled]="isAssigning()" />
      <ui-button
        label="Assign"
        icon="check"
        (click)="assign()"
        [loading]="isAssigning()"
        [disabled]="!selectedTruck()"
      />
    </div>
  </ng-template>
</ui-dialog>
