<ui-page-header
  title="Service Records"
  backLink="/maintenance"
  addRoute="/maintenance/records/add"
  addTooltip="Log new service"
/>

<ui-card>
  <div class="mb-4">
    <ui-search-field (searchChange)="onSearch($event)" />
  </div>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No service records"
    emptyMessage="No maintenance has been logged yet."
    emptyActionLabel="Log Service"
    (retry)="store.retry()"
    (emptyAction)="addRecord()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th uiSortHeader="ServiceDate">Date</th>
          <th uiSortHeader="TruckNumber">Truck</th>
          <th>Type</th>
          <th>Vendor</th>
          <th uiSortHeader="OdometerReading">Odometer</th>
          <th uiSortHeader="TotalCost">Cost</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-record>
        <tr>
          <td>{{ record.serviceDate | date: "shortDate" }}</td>
          <td>{{ record.truckNumber || "-" }}</td>
          <td>
            <ui-badge
              [value]="record.typeDisplay || record.type"
              [severity]="getTypeSeverity(record.type)"
            />
          </td>
          <td>{{ record.vendorName || "-" }}</td>
          <td>
            @if (record.odometerReading) {
              {{ record.odometerReading | number }} mi
            } @else {
              -
            }
          </td>
          <td>{{ record.totalCost | currencyFormat }}</td>
          <td>
            <ui-button
              appearance="text"
              icon="ellipsis-vertical"
              ariaLabel="Show actions menu"
              (click)="$event.stopPropagation(); selectedRow.set(record); menu.toggle($event)"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<!-- Context menu for row actions -->
<ui-menu #menu [items]="actionMenuItems" />
