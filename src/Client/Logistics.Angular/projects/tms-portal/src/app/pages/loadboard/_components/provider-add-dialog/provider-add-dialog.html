<ui-dialog
  header="Add Load Board Provider"
  [(open)]="visible"
  [modal]="true"
  width="500px"
  [draggable]="false"
  (opened)="onShow()"
>
  <form [formRoot]="form" #formEl>
    <ui-form-field label="Provider" for="providerType" [required]="true">
      <ui-select-field
        id="providerType"
        [formField]="form.providerType"
        [options]="providerOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select provider"
      />
    </ui-form-field>

    <ui-form-field
      label="API Key"
      for="apiKey"
      [required]="true"
      hint="Your load board API key or client ID"
    >
      <ui-text-field id="apiKey" [formField]="form.apiKey" placeholder="Enter API key" />
    </ui-form-field>

    <ui-form-field
      label="API Secret (Optional)"
      for="apiSecret"
      hint="Required for some providers (e.g., DAT)"
    >
      <ui-password-field
        id="apiSecret"
        [formField]="form.apiSecret"
        [toggleMask]="true"
        [feedback]="false"
        placeholder="Enter API secret"
      />
    </ui-form-field>

    <ui-form-field
      label="DOT Number (Optional)"
      for="companyDotNumber"
      hint="Your company's USDOT number"
    >
      <ui-text-field
        id="companyDotNumber"
        [formField]="form.companyDotNumber"
        placeholder="e.g., 1234567"
      />
    </ui-form-field>

    <ui-form-field
      label="MC Number (Optional)"
      for="companyMcNumber"
      hint="Your company's Motor Carrier number"
    >
      <ui-text-field
        id="companyMcNumber"
        [formField]="form.companyMcNumber"
        placeholder="e.g., MC123456"
      />
    </ui-form-field>

    <div class="border-default bg-subtle mt-4 rounded border p-3">
      <ui-stack direction="row" align="start" gap="2">
        <ui-icon name="triangle-alert" color="warning" />
        <div>
          <ui-typography variant="body-sm" class="font-semibold">
            Where to get credentials:
          </ui-typography>
          <ul class="mt-1 mb-0 list-inside list-disc">
            <li>
              <ui-typography variant="body-sm" color="secondary" tag="span">
                Demo: Enter any text as API key (for testing only)
              </ui-typography>
            </li>
            <li>
              <ui-typography variant="body-sm" color="secondary" tag="span">
                DAT: freight.api.dat.com developer portal
              </ui-typography>
            </li>
            <li>
              <ui-typography variant="body-sm" color="secondary" tag="span">
                Truckstop: api.truckstop.com developer portal
              </ui-typography>
            </li>
            <li>
              <ui-typography variant="body-sm" color="secondary" tag="span">
                123Loadboard: 123loadboard.com/developers
              </ui-typography>
            </li>
          </ul>
        </div>
      </ui-stack>
    </div>
  </form>

  <ng-template #footer>
    <ui-button appearance="text" label="Cancel" (click)="close()" />
    <ui-button label="Add Provider" icon="check" (click)="requestSubmit()" [loading]="saving()" />
  </ng-template>
</ui-dialog>
