<div class="bg-background text-foreground min-h-screen p-6" data-lab="ui-lab">
  <header
    class="bg-background border-default sticky top-0 z-10 -mx-6 -mt-6 mb-6 border-b px-6 py-4"
  >
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div>
        <ui-typography variant="h1" tag="h1">UI Lab</ui-typography>
        <ui-typography variant="body-sm" color="muted">
          Every shared component, every state, no auth and no HTTP. Dev builds only.
        </ui-typography>
      </div>
      <div data-lab="theme-toggle">
        <ui-theme-toggle />
      </div>
    </div>

    <nav class="mt-3 flex flex-wrap gap-2">
      @for (section of sections; track section.id) {
        <a
          class="border-default hover:bg-subtle rounded-md border px-2 py-1 text-sm"
          [href]="'#' + section.id"
          [attr.data-lab-nav]="section.id"
        >
          {{ section.label }}
        </a>
      }
    </nav>
  </header>

  <div class="flex flex-col gap-12">
    <app-ui-lab-icons />
    <app-ui-lab-buttons />
    <app-ui-lab-table />
    <app-ui-lab-forms />
    <app-ui-lab-form-slots />
    <app-ui-lab-overlays />
    <app-ui-lab-feedback />
    <app-ui-lab-cosmetics />
    <app-ui-lab-dialogs />
    <app-ui-lab-tooltip />
    <app-ui-lab-notifications />

    <!--
      S9 landed the behavioural tail (menu, tabs, accordion, popover, drawer, stepper, timeline), so
      the `pending` section and its `slot-ui-menu` placeholder are gone - ui-menu is real now and is
      rendered, and clickable, below.
    -->
    <app-ui-lab-behaviour />
    <app-ui-lab-dataviz />
  </div>
</div>
