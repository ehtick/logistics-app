<ui-page-header title="Containers" addRoute="/containers/add" addTooltip="Add a new container" />

<ui-card>
  <ui-stack direction="row" align="end" gap="3" wrap class="mb-4">
    <div class="min-w-72 flex-1">
      <ui-search-field (searchChange)="search($event)" />
    </div>
    <ui-select-field
      [options]="statusOptions"
      optionLabel="label"
      optionValue="value"
      [fluid]="false"
      [showClear]="true"
      placeholder="All statuses"
      [value]="statusFilter()"
      (selectionChange)="onStatusChange($event)"
      (cleared)="onStatusChange(null)"
    />
    <ui-select-field
      [options]="isoTypeOptions"
      optionLabel="label"
      optionValue="value"
      [fluid]="false"
      [showClear]="true"
      placeholder="All ISO types"
      [value]="isoTypeFilter()"
      (selectionChange)="onIsoTypeChange($event)"
      (cleared)="onIsoTypeChange(null)"
    />
  </ui-stack>

  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No containers yet"
    emptyMessage="Add your first container to get started."
    emptyActionLabel="Add Container"
    (retry)="store.retry()"
    (emptyAction)="addContainer()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th uiSortHeader="Number">Number</th>
          <th>ISO Type</th>
          <th>Status</th>
          <th>Current Terminal</th>
          <th>Laden</th>
          <th uiSortHeader="CreatedAt">Created</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-container>
        <tr class="cursor-pointer" (click)="viewContainer(container)">
          <td class="font-medium">{{ container.number || "-" }}</td>
          <td>{{ isoTypeLabel(container.isoType) }}</td>
          <td>
            <ui-status-badge [status]="container.status" kind="container" />
          </td>
          <td>{{ container.currentTerminalCode || "-" }}</td>
          <td>
            @if (container.isLaden) {
              <ui-icon name="check" color="success" />
            } @else {
              <ui-icon name="minus" color="muted" />
            }
          </td>
          <td>{{ container.createdAt | date: "mediumDate" }}</td>
          <td>
            <ui-button
              appearance="text"
              icon="pencil"
              ariaLabel="Edit container"
              (click)="$event.stopPropagation(); editContainer(container)"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>
