<div class="border-default bg-subtle mb-4 flex items-center justify-between rounded-lg border p-3">
  <span class="text-foreground font-medium">{{ selectedLoads().length }} load(s) selected</span>
  <div class="flex gap-2">
    <ui-button
      appearance="outlined"
      size="sm"
      label="Assign to Truck"
      icon="truck"
      (click)="openBulkAssignDialog()"
      [loading]="isProcessing()"
    />
    <ui-button
      appearance="outlined"
      size="sm"
      label="Dispatch"
      icon="send"
      (click)="bulkDispatch()"
      [disabled]="!canDispatchSelected()"
      [loading]="isProcessing()"
      uiTooltip="Only Draft loads can be dispatched"
    />
    <ui-button
      intent="danger"
      appearance="outlined"
      size="sm"
      label="Delete"
      icon="trash"
      (click)="bulkDelete()"
      [disabled]="!canDeleteSelected()"
      [loading]="isProcessing()"
      uiTooltip="Only Draft loads can be deleted"
    />
    <ui-button
      appearance="text"
      size="sm"
      ariaLabel="Clear selection"
      icon="x"
      (click)="clearSelection()"
      uiTooltip="Clear selection"
    />
  </div>
</div>
