<ui-stack>
  <form [formRoot]="form">
    <ui-form-field label="Trip Name" for="tripName" [required]="true">
      <ui-text-field
        id="tripName"
        [formField]="form.tripName"
        type="text"
        placeholder="Trip name"
      />
    </ui-form-field>

    <ui-form-field label="Assigned Truck" for="truck">
      <app-search-truck [formField]="form.truck" />
    </ui-form-field>

    <ui-stack direction="row" justify="between" class="pt-6">
      <ui-button type="button" icon="arrow-left" label="Back to list" [routerLink]="['/trips']" />
      <ui-button type="submit" iconEnd="arrow-right" label="Next" />
    </ui-stack>
  </form>
</ui-stack>
