<div
  class="bg-surface mx-auto flex h-[calc(100vh-10rem)] max-w-4xl flex-col overflow-hidden rounded-xl shadow-lg"
>
  <!-- Header -->
  <app-conversation-header
    [conversation]="store.currentConversation()"
    [isNewConversation]="isNewConversation()"
    [isTyping]="store.typingUsers().size > 0"
    (toggleDetails)="toggleDetails()"
  />

  <!-- Messages Area -->
  <div
    #messagesContainer
    class="from-hover to-active flex-1 gap-2 space-y-4 overflow-y-auto bg-linear-to-b p-6"
  >
    @if (isNewConversation()) {
      <app-recipient-selector
        [currentUserId]="currentUserId()"
        [selected]="selectedRecipient()"
        (selectedChange)="onRecipientChange($event)"
      />
    } @else if (store.loading() && store.messages().length === 0) {
      <div class="space-y-4">
        @for (i of [1, 2, 3]; track i) {
          <div class="flex gap-3">
            <ui-skeleton shape="circle" size="2.5rem" />
            <div class="flex-1">
              <ui-skeleton width="40%" height="1rem" class="mb-2" />
              <ui-skeleton width="70%" height="3rem" class="rounded-xl" />
            </div>
          </div>
        }
      </div>
    } @else if (store.messages().length === 0) {
      <ui-empty-state
        icon="messages-square"
        title="No messages yet"
        message="Send a message to start the conversation!"
      />
    } @else {
      @if (store.hasMore()) {
        <ui-stack align="center" justify="center">
          <ui-button
            appearance="text"
            size="sm"
            label="Load earlier messages"
            icon="history"
            [loading]="store.loading()"
            (click)="loadMore()"
          />
        </ui-stack>
      }
      <div class="flex flex-col gap-2">
        @for (message of store.messages(); track message.id) {
          <app-message-bubble
            [message]="message"
            [isOwn]="isOwnMessage(message)"
            (mouseEnter)="markMessageAsRead(message)"
          />
        }
      </div>
    }
  </div>

  <!-- Input Area -->
  <div class="bg-surface border-t p-4">
    <div class="flex items-end gap-3">
      <div class="relative flex-1">
        <ui-text-field
          class="block w-full"
          placeholder="Type a message..."
          [value]="messageContent()"
          (valueChange)="messageContent.set($event); onInput()"
          (keydown)="onKeyDown($event)"
        />
      </div>
      <ui-button
        ariaLabel="Send message"
        icon="send"
        [rounded]="true"
        [disabled]="!canSendMessage()"
        [loading]="isCreatingConversation()"
        (click)="sendMessage()"
      />
    </div>
  </div>
</div>

<app-conversation-details
  [conversation]="store.currentConversation()"
  [currentUserId]="currentUserId()"
  [(visible)]="showDetails"
/>
