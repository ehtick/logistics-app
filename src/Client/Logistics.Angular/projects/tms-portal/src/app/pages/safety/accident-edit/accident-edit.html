<ui-page-header title="Edit Accident Report" backLink="/safety/accidents" />

@if (isLoading()) {
  <div class="flex justify-center py-16">
    <ui-spinner />
  </div>
} @else {
  <ui-card>
    <ui-stepper [linear]="true" [value]="activeStep()" (valueChange)="goToStep($event)">
      <ui-step-list>
        <ui-step [value]="1">Incident Details</ui-step>
        <ui-step [value]="2">Injuries & Damage</ui-step>
        <ui-step [value]="3">Review & Save</ui-step>
      </ui-step-list>

      <ui-step-panels>
        <!-- Step 1: Incident Details -->
        <ui-step-panel [value]="1">
          <ng-template uiStepContent>
            <app-accident-incident-form [field]="step1Form" />

            <div class="flex justify-end gap-2 py-4">
              <ui-button label="Next" iconEnd="arrow-right" (click)="nextStep()" />
            </div>
          </ng-template>
        </ui-step-panel>

        <!-- Step 2: Injuries & Damage -->
        <ui-step-panel [value]="2">
          <ng-template uiStepContent>
            <app-accident-injuries-damage-form [field]="step2Form" />

            <div class="flex justify-between py-4">
              <ui-button
                appearance="outlined"
                label="Back"
                icon="arrow-left"
                (click)="prevStep()"
              />
              <ui-button label="Next" iconEnd="arrow-right" (click)="nextStep()" />
            </div>
          </ng-template>
        </ui-step-panel>

        <!-- Step 3: Review & Save -->
        <ui-step-panel [value]="3">
          <ng-template uiStepContent>
            <div class="py-4">
              <h3 class="mb-4 text-lg font-semibold">Review Changes</h3>

              <app-accident-review-summary
                [incidentForm]="step1Form"
                [injuriesDamageForm]="step2Form"
              />

              <div class="mt-6 flex justify-between">
                <ui-button
                  appearance="outlined"
                  label="Back"
                  icon="arrow-left"
                  (click)="prevStep()"
                />
                <ui-button
                  label="Save Changes"
                  icon="check"
                  [loading]="isSaving()"
                  (click)="submit()"
                />
              </div>
            </div>
          </ng-template>
        </ui-step-panel>
      </ui-step-panels>
    </ui-stepper>
  </ui-card>
}
