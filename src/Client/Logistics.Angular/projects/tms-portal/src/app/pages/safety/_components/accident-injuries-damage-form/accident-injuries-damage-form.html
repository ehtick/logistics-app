<div class="py-4">
  <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
    <!-- Injuries Section -->
    <ui-card header="Injuries">
      <div class="flex flex-col gap-4">
        <div class="flex items-center justify-between">
          <span>Were there any injuries?</span>
          <ui-toggle-field [formField]="field().injuriesReported" />
        </div>

        @if (field().injuriesReported().value()) {
          <ui-form-field label="Number of Injuries" for="numberOfInjuries">
            <ui-number-field [formField]="field().numberOfInjuries" id="numberOfInjuries" />
          </ui-form-field>

          <ui-form-field label="Injury Description" for="injuryDescription">
            <ui-textarea-field
              [formField]="field().injuryDescription"
              id="injuryDescription"
              [rows]="2"
              placeholder="Describe the injuries..."
            />
          </ui-form-field>
        }

        <div class="flex items-center justify-between border-t pt-4">
          <span>Were there any fatalities?</span>
          <ui-toggle-field [formField]="field().fatalitiesReported" />
        </div>

        @if (field().fatalitiesReported().value()) {
          <ui-form-field label="Number of Fatalities" for="numberOfFatalities">
            <ui-number-field [formField]="field().numberOfFatalities" id="numberOfFatalities" />
          </ui-form-field>
        }
      </div>
    </ui-card>

    <!-- Damage Section -->
    <ui-card header="Damage">
      <div class="flex flex-col gap-4">
        <ui-form-field label="Estimated Damage" for="estimatedDamage">
          <ui-number-field
            [formField]="field().estimatedDamage"
            id="estimatedDamage"
            mode="currency"
            currency="USD"
            locale="en-US"
          />
        </ui-form-field>

        <ui-form-field label="Damage Description" for="damageDescription">
          <ui-textarea-field
            [formField]="field().damageDescription"
            id="damageDescription"
            [rows]="2"
            placeholder="Describe the damage..."
          />
        </ui-form-field>

        <div class="flex items-center justify-between border-t pt-4">
          <span>Was the vehicle towed?</span>
          <ui-toggle-field [formField]="field().vehicleTowed" />
        </div>

        @if (field().vehicleTowed().value()) {
          <ui-form-field label="Tow Company" for="towCompany">
            <ui-text-field
              [formField]="field().towCompany"
              id="towCompany"
              placeholder="Name of tow company"
            />
          </ui-form-field>
        }
      </div>
    </ui-card>
  </div>

  <!-- Hazmat Section -->
  <ui-card header="Hazardous Materials" class="mt-4">
    <div class="flex flex-col gap-4">
      <div class="flex items-center justify-between">
        <span>Was hazardous material involved?</span>
        <ui-toggle-field [formField]="field().hazmatInvolved" />
      </div>

      @if (field().hazmatInvolved().value()) {
        <ui-form-field label="Hazmat Description" for="hazmatDescription">
          <ui-textarea-field
            [formField]="field().hazmatDescription"
            id="hazmatDescription"
            [rows]="2"
            placeholder="Describe the hazardous materials involved..."
          />
        </ui-form-field>
      }
    </div>
  </ui-card>
</div>
