  </div>
  <div class="flex justify-between">
    <span class="text-muted-foreground">Deductions</span>
    <span class="font-medium text-red-600">-{{ totalDeductions() | currencyFormat }}</span>

  <div class="flex justify-between text-lg">

  </div>
