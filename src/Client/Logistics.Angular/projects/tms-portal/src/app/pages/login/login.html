<div class="login-container">
  <div class="animate-in fade-in w-full max-w-md">
    @if (isLoading()) {
      <div class="login-card text-center">
        <ui-spinner />
        <p class="loading-state-text">Authenticating...</p>
      </div>
    } @else if (!isAuthenticated()) {
      <div class="login-card">
        <div class="mb-8 text-center">
          <div class="login-logo">
            <ui-icon name="truck" />
          </div>
          <h1 class="login-title">LogisticsX</h1>
          <p class="login-subtitle">Transportation Management System</p>
        </div>

        <div class="login-description">Sign in to access your dashboard and manage your fleet.</div>

        <ui-button block icon="log-in" label="Sign In" (click)="login()" />

        <div class="login-footer">Need help? Contact your administrator.</div>
      </div>
    }
  </div>
</div>
