<app-provider-connect-dialog
  header="Add Load Board Provider"
  submitLabel="Add Provider"
  [(visible)]="visible"
  [saving]="saving()"
  [form]="form"
  (opened)="onShow()"
>
  <ui-form-field label="Provider" for="providerType" [required]="true">
    <ui-select-field
      id="providerType"
      [formField]="form.providerType"
      [options]="providerOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Select provider"
    />
  </ui-form-field>

  <ui-form-field
    label="API Key"
    for="apiKey"
    [required]="true"
    hint="Your load board API key or client ID"
  >
    <ui-text-field id="apiKey" [formField]="form.apiKey" placeholder="Enter API key" />
  </ui-form-field>

  <ui-form-field
    label="API Secret (Optional)"
    for="apiSecret"
    hint="Required for some providers (e.g., DAT)"
  >
    <ui-password-field
      id="apiSecret"
      [formField]="form.apiSecret"
      [toggleMask]="true"
      [feedback]="false"
      placeholder="Enter API secret"
    />
  </ui-form-field>

  <ui-form-field label="DOT Number (Optional)" for="companyDotNumber" hint="Your company's USDOT number">
    <ui-text-field
      id="companyDotNumber"
      [formField]="form.companyDotNumber"
      placeholder="e.g., 1234567"
    />
  </ui-form-field>

  <ui-form-field
    label="MC Number (Optional)"
    for="companyMcNumber"
    hint="Your company's Motor Carrier number"
  >
    <ui-text-field
      id="companyMcNumber"
      [formField]="form.companyMcNumber"
      placeholder="e.g., MC123456"
    />
  </ui-form-field>

  <ui-alert intent="warning" title="Where to get credentials" class="mt-4 block">
    <ul class="mt-1 mb-0 list-inside list-disc text-sm">
      <li>Demo: Enter any text as API key (for testing only)</li>
      <li>DAT: freight.api.dat.com developer portal</li>
      <li>Truckstop: api.truckstop.com developer portal</li>
      <li>123Loadboard: 123loadboard.com/developers</li>
    </ul>
  </ui-alert>
</app-provider-connect-dialog>
