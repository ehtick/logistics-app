<ui-card class="h-full">
  <ng-template #header>
    <div class="flex items-center justify-between py-3 pr-4 pl-4">
      <div class="flex items-center gap-2">
        <ui-icon name="chart-line" size="inherit" class="text-xl text-cyan-600" />
        <h4 class="mb-0 font-semibold">Daily Gross Revenue</h4>
      </div>
      <ui-date-range-picker (datesChange)="onDateRangeChange($event)" />
    </div>
    <ui-divider class="m-0" />
  </ng-template>

  @if (isLoading()) {
    <div class="flex flex-col gap-4">
      <div class="flex gap-6">
        <ui-skeleton width="120px" height="3rem" />
        <ui-skeleton width="120px" height="3rem" />
        <ui-skeleton width="120px" height="3rem" />
        <ui-skeleton width="120px" height="3rem" />
      </div>
      <ui-skeleton height="280px" />
    </div>
  } @else {
    <!-- Summary Stats -->
    <div class="mb-4 flex flex-wrap gap-6">
      <div>
        <div class="text-muted-foreground text-xs font-medium tracking-wide uppercase">
          Total Gross
        </div>
        <div class="mt-1 font-mono text-xl font-bold text-emerald-600">
          {{ totalGross() | currencyFormat }}
        </div>
      </div>
      <div>
        <div class="text-muted-foreground text-xs font-medium tracking-wide uppercase">
          Total Miles
        </div>
        <div class="text-foreground mt-1 font-mono text-xl font-bold">
          {{ totalDistance() | number: "1.0-0" }} mi
        </div>
      </div>
      <div>
        <div class="text-muted-foreground text-xs font-medium tracking-wide uppercase">
          Rate/Mile
        </div>
        <div class="mt-1 font-mono text-xl font-bold text-purple-600">
          {{ rpm() | currencyFormat }}
        </div>
      </div>
      <div>
        <div class="text-muted-foreground text-xs font-medium tracking-wide uppercase">Avg/Day</div>
        <div class="mt-1 font-mono text-xl font-bold text-cyan-600">
          {{ avgDailyGross() | currencyFormat }}
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="relative h-72">
      <ui-chart type="line" [data]="chartData()" [options]="chartOptions()" class="h-full w-full" />
    </div>
  }
</ui-card>
