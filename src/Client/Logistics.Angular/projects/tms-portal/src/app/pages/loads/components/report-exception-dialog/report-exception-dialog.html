<ui-dialog
  header="Report Exception"
  [(open)]="visible"
  [modal]="true"
  width="450px"
  [closable]="true"
  (closed)="close()"
>
  <div class="space-y-4">
    <div class="bg-surface-100 dark:bg-surface-800 rounded-lg p-4">
      <p class="text-muted-foreground m-0 text-sm">
        Report an exception or issue that occurred during load transportation. This will be recorded
        in the load's history.
      </p>
    </div>

    <ui-form-field label="Exception Type" [required]="true">
      <ui-select-field
        [options]="typeOptions"
        optionLabel="label"
        optionValue="value"
        [(value)]="selectedType"
        placeholder="Select exception type"
        [showClear]="true"
      />
    </ui-form-field>

    <ui-form-field label="Reason" [required]="true">
      <ui-textarea-field
        [(value)]="reason"
        [rows]="4"
        placeholder="Describe the exception or issue..."
      />
    </ui-form-field>
  </div>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <ui-button appearance="text" label="Cancel" (click)="close()" [disabled]="isSubmitting()" />
      <ui-button
        label="Report Exception"
        icon="triangle-alert"
        (click)="submit()"
        [loading]="isSubmitting()"
        [disabled]="!selectedType() || !reason().trim()"
      />
    </div>
  </ng-template>
</ui-dialog>
