<ui-dialog
  header="Send Tracking Link"
  [(open)]="visible"
  [modal]="true"
  width="450px"
  (opened)="onShow()"
  (closed)="close()"
>
  <p class="text-muted-foreground mb-4">Send this tracking link to a customer via email.</p>

  <form [formRoot]="form">
    <ui-form-field label="Email Address" for="email" [required]="true">
      <ui-text-field
        id="email"
        [formField]="form.email"
        type="email"
        placeholder="customer@example.com"
      />
    </ui-form-field>

    <ui-form-field label="Personal Message" for="personalMessage">
      <ui-textarea-field
        id="personalMessage"
        [formField]="form.personalMessage"
        [rows]="3"
        placeholder="Add an optional message to include in the email..."
      />
    </ui-form-field>

    <div class="flex justify-end gap-2">
      <ui-button appearance="outlined" type="button" label="Cancel" (click)="close()" />
      <ui-button type="submit" icon="send" label="Send Email" [loading]="form().submitting()" />
    </div>
  </form>
</ui-dialog>
