<ui-dialog
  header="Edit Customer"
  [(open)]="visible"
  [modal]="true"
  width="600px"
  [closable]="true"
  [draggable]="false"
>
  <form [formRoot]="form">
    <ui-form-field label="Name" for="name" [required]="true">
      <ui-text-field [formField]="form.name" id="name" placeholder="Customer name" />
    </ui-form-field>

    <ui-grid container spacing="4" class="mt-4">
      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Email" for="email">
          <ui-text-field
            [formField]="form.email"
            id="email"
            type="email"
            placeholder="email@example.com"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Phone" for="phone">
          <ui-text-field
            [formField]="form.phone"
            id="phone"
            type="tel"
            placeholder="(555) 555-5555"
          />
        </ui-form-field>
      </ui-grid>
    </ui-grid>

    <ui-form-field label="Status" for="status" class="mt-4">
      <ui-select-field
        [formField]="form.status"
        id="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
      />
    </ui-form-field>

    <ui-form-field label="Address" class="mt-4">
      <ui-address-form [formField]="form.address" [allowedCountries]="allowedCountries()" />
    </ui-form-field>

    <ui-grid container spacing="4" class="mt-4">
      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field
          label="Tax ID / VAT number"
          for="taxId"
          [required]="customerIsEu()"
          [hint]="
            customerIsEu()
              ? 'Required for EU customers — enables cross-border B2B reverse charge.'
              : 'VAT, EIN, GSTIN, ABN, etc. (optional)'
          "
        >
          <ui-text-field id="taxId" [formField]="form.taxId" placeholder="e.g. DE123456789" />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Tax status" for="isVatExempt">
          <div class="flex items-center gap-2 pt-2">
            <ui-checkbox-field [formField]="form.isVatExempt" inputId="isVatExempt" />
            <label for="isVatExempt">VAT / sales tax exempt</label>
          </div>
        </ui-form-field>
      </ui-grid>
    </ui-grid>

    <ui-form-field label="Notes" for="notes" class="mt-4">
      <ui-textarea-field
        [formField]="form.notes"
        id="notes"
        [rows]="3"
        placeholder="Additional notes about this customer..."
      />
    </ui-form-field>

    <ui-stack direction="row" justify="end" gap="2" class="mt-6">
      <ui-button appearance="outlined" type="button" label="Cancel" (click)="close()" />
      <ui-button type="submit" label="Save Changes" icon="check" [loading]="form().submitting()" />
    </ui-stack>
  </form>

  <ui-accordion class="mt-6">
    <ui-accordion-panel>
      <ui-accordion-header>
        <span class="text-danger">Danger Zone</span>
      </ui-accordion-header>
      <ui-accordion-content>
        <p class="text-muted-foreground mb-4">
          Deleting a customer will remove all associated data. This action cannot be undone.
        </p>
        <ui-button intent="danger" label="Delete Customer" icon="trash" (click)="deleted.emit()" />
      </ui-accordion-content>
    </ui-accordion-panel>
  </ui-accordion>
</ui-dialog>
