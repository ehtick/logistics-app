<ui-card class="h-full">
  <ng-template #header>
    <div class="flex items-center justify-between py-3 pr-4 pl-4">
      <div class="flex items-center gap-2">
        <ui-icon name="chart-line" size="inherit" class="text-xl text-cyan-600" />
        <h4 class="mb-0 font-semibold">Daily Gross</h4>
        <span class="bg-surface-100 dark:bg-surface-700 rounded-full px-2 py-0.5 text-xs">
          Last 7 Days
        </span>
      </div>
    </div>
    <ui-divider class="m-0" />
  </ng-template>

  @if (isLoading()) {
    <div class="flex flex-col gap-4">
      <div class="flex gap-6">
        <ui-skeleton width="100px" height="2.5rem" />
        <ui-skeleton width="100px" height="2.5rem" />
        <ui-skeleton width="100px" height="2.5rem" />
      </div>
      <ui-skeleton height="180px" />
    </div>
  } @else {
    <!-- Summary Stats -->
    <div [class]="'mb-4 flex flex-wrap gap-6 ' + chartClass()">
      <div>
        <div class="text-muted-foreground text-xs font-medium tracking-wide uppercase">
          Weekly Total
        </div>
        <div class="mt-1 font-mono text-lg font-bold text-emerald-600">
          {{ totalGross() | currencyFormat }}
        </div>
      </div>
      <div>
        <div class="text-muted-foreground text-xs font-medium tracking-wide uppercase">Today</div>
        <div class="mt-1 font-mono text-lg font-bold text-cyan-600">
          {{ todayGross() | currencyFormat }}
        </div>
      </div>
      <div>
        <div class="text-muted-foreground text-xs font-medium tracking-wide uppercase">Avg/Day</div>
        <div class="text-foreground mt-1 font-mono text-lg font-bold">
          {{ totalGross() / 7 | currencyFormat }}
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="relative h-44">
      <ui-chart type="line" [data]="chartData()" [options]="chartOptions()" class="h-full w-full" />
    </div>
  }
</ui-card>
