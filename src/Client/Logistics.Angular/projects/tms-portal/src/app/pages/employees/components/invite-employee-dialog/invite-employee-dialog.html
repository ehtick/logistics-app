<ui-dialog
  header="Invite Employee"
  [(open)]="visible"
  [modal]="true"
  width="450px"
  (closed)="close()"
>
  @if (form().submitting()) {
    <ui-stack align="center" justify="center" class="py-4">
      <ui-spinner />
    </ui-stack>
  } @else {
    <p class="text-muted-foreground mb-4">
      Send an email invitation to join your company as an employee.
    </p>

    <form [formRoot]="form">
      <ui-form-field label="Email Address" for="email" [required]="true">
        <ui-text-field
          id="email"
          [formField]="form.email"
          type="email"
          placeholder="employee@example.com"
        />
      </ui-form-field>

      <ui-form-field label="Role" for="role" [required]="true">
        <ui-select-field
          [formField]="form.role"
          id="role"
          appendTo="body"
          [options]="roles()"
          optionValue="name"
          optionLabel="displayName"
          placeholder="Select a role"
        />
      </ui-form-field>

      <ui-form-field
        label="Personal Message"
        for="personalMessage"
        hint="Optional note to include in the invitation email"
      >
        <ui-textarea-field
          id="personalMessage"
          [formField]="form.personalMessage"
          [rows]="3"
          placeholder="Add a personal note to the invitation email..."
        />
      </ui-form-field>

      <ui-stack direction="row" justify="end" gap="2">
        <ui-button appearance="outlined" type="button" label="Cancel" (click)="close()" />
        <ui-button type="submit" icon="send" label="Send Invitation" />
      </ui-stack>
    </form>
  }
</ui-dialog>
