<ui-page-header [title]="'Container ' + (container()?.number ?? '')" backLink="/containers" />

<ui-container maxWidth="md">
  <ui-card>
    <ui-stack direction="row" align="center" gap="3" wrap class="border-default mb-4 border-b pb-4">
      <ui-typography variant="body-sm" color="secondary">Status:</ui-typography>
      <ui-badge
        [severity]="statusSeverity(container()?.status)"
        [value]="statusLabel(container()?.status)"
      />
      @if (container()?.currentTerminalCode) {
        <ui-typography variant="body-sm" color="secondary">Terminal:</ui-typography>
        <span class="font-medium">
          {{ container()?.currentTerminalCode }} - {{ container()?.currentTerminalName }}
        </span>
      }
      <ui-stack direction="row" gap="2" class="ml-auto">
        <ui-button
          appearance="outlined"
          type="button"
          icon="refresh-cw"
          label="Change Status"
          (click)="openStatusDialog()"
        />
        <ui-button
          appearance="outlined"
          type="button"
          icon="map-pin"
          label="Move to Terminal"
          (click)="openTerminalDialog()"
        />
      </ui-stack>
    </ui-stack>

    <form [formRoot]="form">
      <ui-stack gap="4">
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="tag" color="secondary" />
            <ui-typography variant="overline" color="secondary">Identification</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-grid container spacing="4">
              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field
                  label="Container Number"
                  for="number"
                  [required]="true"
                  hint="11 characters: 4 letters + 7 digits"
                >
                  <ui-text-field id="number" [formField]="form.number" />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field label="ISO Type" for="isoType" [required]="true">
                  <ui-select-field [formField]="form.isoType" [options]="isoTypeOptions" />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field label="Seal Number" for="sealNumber">
                  <ui-text-field id="sealNumber" [formField]="form.sealNumber" />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field label="Booking Reference" for="bookingReference">
                  <ui-text-field id="bookingReference" [formField]="form.bookingReference" />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="12">
                <ui-form-field label="Bill of Lading Number" for="billOfLadingNumber">
                  <ui-text-field id="billOfLadingNumber" [formField]="form.billOfLadingNumber" />
                </ui-form-field>
              </ui-grid>
            </ui-grid>
          </ui-surface>
        </ui-stack>

        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="box" color="secondary" />
            <ui-typography variant="overline" color="secondary">Cargo</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Gross Weight (kg)" for="grossWeight" class="mb-0">
              <ui-number-field id="grossWeight" [formField]="form.grossWeight" />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="message-square" color="secondary" />
            <ui-typography variant="overline" color="secondary">Notes</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Notes" for="notes" class="mb-0">
              <ui-textarea-field id="notes" [formField]="form.notes" [rows]="3" />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <ui-stack direction="row" gap="2">
          <ui-button
            type="submit"
            icon="check"
            label="Update"
            [disabled]="isLoading()"
            [loading]="form().submitting()"
          />
          <ui-button
            appearance="outlined"
            type="button"
            icon="arrow-left"
            label="Back to list"
            [routerLink]="['/containers']"
          />
        </ui-stack>
      </ui-stack>
    </form>
  </ui-card>
</ui-container>

<!-- Status change dialog -->
<ui-dialog
  header="Change Container Status"
  [modal]="true"
  [(open)]="statusDialogVisible"
  width="32rem"
>
  <form [formRoot]="statusForm">
    <ui-stack gap="3">
      <ui-form-field label="New Status" for="targetStatus" [required]="true">
        <ui-select-field
          [formField]="statusForm.targetStatus"
          [options]="statusOptions"
          placeholder="Select target status"
        />
      </ui-form-field>

      @if (statusRequiresTerminal) {
        <ui-form-field label="Terminal" for="statusTerminal" [required]="true" class="mb-0">
          <app-search-terminal [formField]="statusForm.terminal" />
        </ui-form-field>
      }

      <ui-stack direction="row" justify="end" gap="2" class="pt-2">
        <ui-button
          appearance="outlined"
          type="button"
          label="Cancel"
          (click)="statusDialogVisible.set(false)"
        />
        <ui-button
          type="submit"
          label="Update Status"
          icon="check"
          [loading]="statusForm().submitting()"
        />
      </ui-stack>
    </ui-stack>
  </form>
</ui-dialog>

<!-- Move to terminal dialog -->
<ui-dialog
  header="Move Container to Terminal"
  [modal]="true"
  [(open)]="terminalDialogVisible"
  width="32rem"
>
  <form [formRoot]="terminalForm">
    <ui-stack gap="3">
      <ui-form-field label="Terminal" for="moveTerminal" [required]="true" class="mb-0">
        <app-search-terminal [formField]="terminalForm.terminal" />
      </ui-form-field>

      <ui-stack direction="row" justify="end" gap="2" class="pt-2">
        <ui-button
          appearance="outlined"
          type="button"
          label="Cancel"
          (click)="terminalDialogVisible.set(false)"
        />
        <ui-button
          type="submit"
          label="Move"
          icon="arrow-right"
          [loading]="terminalForm().submitting()"
        />
      </ui-stack>
    </ui-stack>
  </form>
</ui-dialog>
