<ui-card>
  <ng-template #header>
    <div class="p-4 pb-0">
      <ui-typography variant="h4">Expense Information</ui-typography>
    </div>
  </ng-template>

  <div class="space-y-4">
    <ui-info-row label="Expense #">
      <span class="font-mono font-semibold">{{ expense().number }}</span>
    </ui-info-row>

    <ui-divider />

    <ui-info-row label="Type">
      <app-expense-type-tag [type]="expense().type" />
    </ui-info-row>

    <ui-info-row label="Status">
      <app-expense-status-tag [status]="expense().status" />
    </ui-info-row>

    <ui-info-row label="Category">
      <span class="font-medium">{{ categoryLabel() }}</span>
    </ui-info-row>

    <ui-divider />

    <ui-info-row label="Amount">
      <span class="text-success text-xl font-bold">
        {{ expense().amount?.amount ?? 0 | currencyFormat: expense().amount?.currency ?? "USD" }}
      </span>
    </ui-info-row>

    <ui-info-row label="Expense Date">
      <span>{{ expense().expenseDate | date: "mediumDate" }}</span>
    </ui-info-row>

    @if (expense().vendorName) {
      <ui-info-row label="Vendor">
        <span>{{ expense().vendorName }}</span>
      </ui-info-row>
    }
  </div>
</ui-card>
