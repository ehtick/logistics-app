<ui-dialog
  [(open)]="visible"
  [modal]="true"
  [header]="title()"
  width="600px"
  [draggable]="false"
  [resizable]="false"
>
  <form [formRoot]="form">
    <ui-stack gap="3">
      <ui-form-field label="License number" for="licenseNumber" [required]="true">
        <ui-text-field id="licenseNumber" [formField]="form.licenseNumber" type="text" />
      </ui-form-field>

      <ui-form-field label="License class" for="licenseClass" [required]="true">
        <ui-select-field
          id="licenseClass"
          [formField]="form.licenseClass"
          [options]="classOptions"
          optionLabel="label"
          optionValue="value"
          appendTo="body"
        />
      </ui-form-field>

      <ui-form-field
        label="Issuing country (ISO 3166)"
        for="issuingCountry"
        hint="2-letter country code, e.g. US, DE, PL"
        [required]="true"
      >
        <ui-text-field
          id="issuingCountry"
          [formField]="form.issuingCountry"
          type="text"
          [maxlength]="2"
          style="text-transform: uppercase"
        />
      </ui-form-field>

      <ui-form-field
        label="Issuing region"
        for="issuingRegion"
        hint="State / province, e.g. TX, BY"
      >
        <ui-text-field id="issuingRegion" [formField]="form.issuingRegion" type="text" />
      </ui-form-field>

      <ui-form-field label="Issued date" for="issuedDate" [required]="true">
        <ui-date-field
          id="issuedDate"
          [formField]="form.issuedDate"
          dateFormat="yy-mm-dd"
          appendTo="body"
        />
      </ui-form-field>

      <ui-form-field label="Expires at" for="expiresAt" [required]="true">
        <ui-date-field
          id="expiresAt"
          [formField]="form.expiresAt"
          dateFormat="yy-mm-dd"
          appendTo="body"
        />
      </ui-form-field>

      <ui-form-field
        label="DOT medical certificate expiry"
        for="medicalCertExpiresAt"
        hint="US CDL only — leave blank for non-US licenses"
      >
        <ui-date-field
          id="medicalCertExpiresAt"
          [formField]="form.medicalCertExpiresAt"
          dateFormat="yy-mm-dd"
          appendTo="body"
        />
      </ui-form-field>

      @if (mode() === "update") {
        <ui-form-field label="Status" for="status">
          <ui-select-field
            id="status"
            [formField]="form.status"
            [options]="statusOptions"
            optionLabel="label"
            optionValue="value"
            appendTo="body"
          />
        </ui-form-field>
      }

      <ui-form-field label="Endorsements" for="endorsements">
        <ui-multiselect-field
          id="endorsements"
          [formField]="form.endorsements"
          [options]="endorsementOptions"
          optionLabel="label"
          optionValue="value"
          display="chip"
          appendTo="body"
        />
      </ui-form-field>

      <ui-stack direction="row" justify="end" gap="2">
        <ui-button intent="secondary" appearance="outlined" label="Cancel" (click)="close()" />
        <ui-button type="submit" label="Save" icon="check" [loading]="form().submitting()" />
      </ui-stack>
    </ui-stack>
  </form>
</ui-dialog>
