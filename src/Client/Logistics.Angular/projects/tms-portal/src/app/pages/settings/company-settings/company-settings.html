<ui-page-header title="Company Settings" [centered]="true" />

<ui-container maxWidth="md">
  @if (isLoading()) {
    <ui-stack align="center" justify="center" class="py-8">
      <ui-spinner />
    </ui-stack>
  } @else {
    <form [formRoot]="form">
      <ui-stack gap="6">
        <!-- Branding Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="image" color="secondary" />
            <ui-typography variant="overline" color="secondary">Branding</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Company Logo" class="mb-0">
              <ui-stack direction="row" align="center" gap="4">
                <div
                  class="border-default flex h-24 w-24 items-center justify-center overflow-hidden rounded-lg border-2 border-dashed"
                >
                  @if (logoPreviewUrl()) {
                    <img
                      [src]="logoPreviewUrl()"
                      alt="Company logo"
                      class="h-full w-full object-contain"
                    />
                  } @else {
                    <ui-icon name="image" size="xl" color="muted" />
                  }
                </div>
                <div>
                  <input
                    type="file"
                    class="hidden"
                    #logoInput
                    accept="image/*"
                    (change)="onLogoSelected($event)"
                  />
                  <ui-button
                    type="button"
                    icon="upload"
                    label="Upload Logo"
                    (click)="logoInput.click()"
                    [loading]="isUploadingLogo()"
                  />
                  <ui-typography variant="caption" color="muted" class="mt-1">
                    PNG, JPG or GIF. Max 5MB.
                  </ui-typography>
                </div>
              </ui-stack>
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <!-- Company Info Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="building-2" color="secondary" />
            <ui-typography variant="overline" color="secondary">Company Info</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Company Name" for="companyName" [required]="true">
              <ui-text-field [formField]="form.companyName" id="companyName" />
            </ui-form-field>

            <ui-form-field label="Phone Number" for="phoneNumber">
              <ui-phone-field [formField]="form.phoneNumber" />
            </ui-form-field>

            <ui-form-field label="Billing Email" for="billingEmail" [required]="true" class="mb-0">
              <ui-text-field [formField]="form.billingEmail" id="billingEmail" type="email" />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <!-- Regulatory & Tax IDs Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="id-card" color="secondary" />
            <ui-typography variant="overline" color="secondary">
              Regulatory &amp; Tax IDs
            </ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <ui-form-field label="US DOT Number" for="dotNumber" class="mb-0">
                <ui-text-field [formField]="form.dotNumber" id="dotNumber" />
              </ui-form-field>

              <ui-form-field
                label="MC Number"
                for="mcNumber"
                hint="US Motor Carrier number"
                class="mb-0"
              >
                <ui-text-field [formField]="form.mcNumber" id="mcNumber" />
              </ui-form-field>

              <ui-form-field
                label="VAT Number"
                for="vatNumber"
                hint="Required to send invoices for EU tenants"
                class="mb-0"
              >
                <ui-text-field
                  [formField]="form.vatNumber"
                  id="vatNumber"
                  placeholder="e.g. DE123456789"
                />
              </ui-form-field>

              <ui-form-field
                label="EORI Number"
                for="eoriNumber"
                hint="EU/UK customs ID"
                class="mb-0"
              >
                <ui-text-field [formField]="form.eoriNumber" id="eoriNumber" />
              </ui-form-field>

              <ui-form-field
                label="Company Registration Number"
                for="companyRegistrationNumber"
                hint="Companies House, Handelsregister, RCS, etc."
                class="mb-0"
              >
                <ui-text-field
                  [formField]="form.companyRegistrationNumber"
                  id="companyRegistrationNumber"
                />
              </ui-form-field>

              <ui-form-field
                label="Tax Residency Country"
                for="taxResidencyCountry"
                hint="ISO-2 code, defaults to billing-address country"
                class="mb-0"
              >
                <ui-text-field
                  [formField]="form.taxResidencyCountry"
                  id="taxResidencyCountry"
                  [maxlength]="2"
                  placeholder="e.g. DE"
                />
              </ui-form-field>
            </div>
          </ui-surface>
        </ui-stack>

        <!-- Address Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="map-pin" color="secondary" />
            <ui-typography variant="overline" color="secondary">Company Address</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Address" [required]="true" class="mb-0">
              <ui-address-form
                [formField]="form.companyAddress"
                [allowedCountries]="allowedCountries()"
              />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <!-- Regional Settings Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="globe" color="secondary" />
            <ui-typography variant="overline" color="secondary">Regional Settings</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <ui-form-field label="Distance Unit" for="distanceUnit" class="mb-0">
                <ui-select-field
                  id="distanceUnit"
                  [formField]="form.distanceUnit"
                  [options]="distanceUnitOptions"
                  optionLabel="label"
                  optionValue="value"
                  [fluid]="true"
                />
              </ui-form-field>

              <ui-form-field label="Weight Unit" for="weightUnit" class="mb-0">
                <ui-select-field
                  id="weightUnit"
                  [formField]="form.weightUnit"
                  [options]="weightUnitOptions"
                  optionLabel="label"
                  optionValue="value"
                  [fluid]="true"
                />
              </ui-form-field>

              <ui-form-field label="Date Format" for="dateFormat" class="mb-0">
                <ui-select-field
                  id="dateFormat"
                  [formField]="form.dateFormat"
                  [options]="dateFormatOptions"
                  optionLabel="label"
                  optionValue="value"
                  [fluid]="true"
                />
              </ui-form-field>

              <ui-form-field label="Timezone" for="timezone" class="mb-0">
                <ui-select-field
                  id="timezone"
                  [formField]="form.timezone"
                  [options]="timezoneOptions"
                  optionLabel="label"
                  optionValue="value"
                  [fluid]="true"
                  [filter]="true"
                  filterPlaceholder="Search timezone..."
                />
              </ui-form-field>
            </div>
          </ui-surface>
        </ui-stack>

        <!-- Actions -->
        <ui-stack direction="row" gap="2">
          <ui-button
            type="submit"
            icon="save"
            label="Save Changes"
            [loading]="form().submitting()"
          />
        </ui-stack>
      </ui-stack>
    </form>
  }
</ui-container>
