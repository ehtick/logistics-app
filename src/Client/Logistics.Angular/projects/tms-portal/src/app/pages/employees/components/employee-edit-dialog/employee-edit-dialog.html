<ui-dialog
  header="Edit Employee"
  [(open)]="visible"
  [modal]="true"
  width="500px"
  [closable]="true"
  [draggable]="false"
>
  <form [formRoot]="form">
    <ui-form-field label="Status" for="status">
      <ui-select-field
        [formField]="form.status"
        id="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
      />
    </ui-form-field>

    <ui-form-field label="Salary Type" for="salaryType" class="mt-4">
      <ui-select-field
        [formField]="form.salaryType"
        id="salaryType"
        [options]="salaryTypes"
        optionLabel="label"
        optionValue="value"
      />
    </ui-form-field>

    <ui-form-field label="Salary" for="salary" class="mt-4">
      @if (isShareOfGrossSalary()) {
        <ui-unit-field [formField]="form.salary" unit="%" />
      } @else if (isNoneSalary()) {
        <ui-text-field id="salary" value="N/A" [disabled]="true" />
      } @else {
        <ui-currency-field [formField]="form.salary" />
      }
    </ui-form-field>

    <!--
      The control inside is a ui-text-field - a component with its OWN border - so wrapping it in a
      bordered group (Helm's input-group expects a borderless `input[hlmInputGroupInput]`) would just
      draw a second border around the first. A flex row is what this actually is: a read-only field
      with an action beside it.
    -->
    <ui-form-field label="Role" for="role" class="mt-4">
      <div class="flex items-start gap-2">
        <ui-text-field
          id="role"
          class="block flex-1"
          [disabled]="true"
          [value]="employee()?.role?.displayName || 'No role assigned'"
        />
        <ui-button
          type="button"
          label="Change"
          [disabled]="!canChangeRole()"
          (click)="openChangeRoleDialog()"
        />
      </div>
    </ui-form-field>

    <ui-form-field
      label="Address"
      class="mt-4"
      hint="Optional. Used for Stripe Connect payout onboarding when the employee's country differs from the company's."
    >
      <ui-address-form [formField]="form.address" [allowedCountries]="allowedCountries()" />
    </ui-form-field>

    <ui-stack direction="row" justify="end" gap="2" class="mt-6">
      <ui-button appearance="outlined" type="button" label="Cancel" (click)="close()" />
      <ui-button type="submit" label="Save Changes" icon="check" [loading]="form().submitting()" />
    </ui-stack>
  </form>

  <ui-accordion class="mt-6">
    <ui-accordion-panel>
      <ui-accordion-header>
        <span class="text-danger">Danger Zone</span>
      </ui-accordion-header>
      <ui-accordion-content>
        <p class="text-muted-foreground mb-4">
          Removing an employee will revoke their access to this tenant. This action cannot be
          undone.
        </p>
        <ui-button intent="danger" label="Remove Employee" icon="trash" (click)="deleted.emit()" />
      </ui-accordion-content>
    </ui-accordion-panel>
  </ui-accordion>
</ui-dialog>

@if (employee()) {
  <app-change-role-dialog
    [(visible)]="changeRoleDialogVisible"
    [userId]="employee()!.id!"
    [currentRole]="employee()!.role ?? null"
    (roleChanged)="onRoleChanged()"
  />
}
