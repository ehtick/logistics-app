<div>
  <ui-page-header title="Reports" subtitle="Analytics and exports across your operation." />

  @for (group of groups(); track group.label) {
    <section class="mt-6 first:mt-4">
      <h2 class="text-muted-foreground mb-3 text-xs font-bold tracking-widest uppercase">
        {{ group.label }}
      </h2>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        @for (card of group.cards; track card.route) {
          <a
            [routerLink]="card.route"
            class="group focus-visible:ring-ring/60 rounded-[var(--ui-radius-card)] focus-visible:ring-2 focus-visible:outline-none"
          >
            <ui-card
              class="group-hover:border-primary/50 h-full border border-transparent transition-colors"
            >
              <div class="flex items-start gap-3">
                <div
                  class="bg-primary/10 text-primary flex size-10 shrink-0 items-center justify-center rounded-lg"
                >
                  <ui-icon [name]="card.icon" size="inherit" class="text-lg" />
                </div>
                <div class="min-w-0">
                  <h3 class="text-foreground font-medium">{{ card.title }}</h3>
                  <p class="text-muted-foreground mt-0.5 text-sm">{{ card.description }}</p>
                </div>
              </div>
            </ui-card>
          </a>
        }
      </div>
    </section>
  }
</div>
