<ui-dialog
  [header]="dialogTitle"
  [(open)]="visible"
  [modal]="true"
  width="500px"
  (closed)="close()"
>
  @if (form().submitting()) {
    <ui-stack align="center" justify="center" class="py-4">
      <ui-spinner />
    </ui-stack>
  } @else {
    <form [formRoot]="form">
      @if (!isEditMode) {
        <ui-form-field label="Employee" for="employeeId" [required]="true">
          <ui-select-field
            [formField]="form.employeeId"
            id="employeeId"
            appendTo="body"
            [options]="employees()"
            optionValue="id"
            optionLabel="fullName"
            placeholder="Select an employee"
            [filter]="true"
            filterBy="fullName"
          />
        </ui-form-field>
      }

      <ui-form-field label="Date" for="date" [required]="true">
        <ui-date-field
          [formField]="form.date"
          id="date"
          dateFormat="mm/dd/yy"
          [showIcon]="true"
          appendTo="body"
        />
      </ui-form-field>

      <ui-grid container spacing="4">
        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field label="Start Time" for="startTime" [required]="true">
            <ui-date-field
              [formField]="form.startTime"
              id="startTime"
              [timeOnly]="true"
              [showIcon]="true"
              appendTo="body"
              (dateSelected)="calculateHours()"
            />
          </ui-form-field>
        </ui-grid>

        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field label="End Time" for="endTime" [required]="true">
            <ui-date-field
              [formField]="form.endTime"
              id="endTime"
              [timeOnly]="true"
              [showIcon]="true"
              appendTo="body"
              (dateSelected)="calculateHours()"
            />
          </ui-form-field>
        </ui-grid>
      </ui-grid>

      <ui-grid container spacing="4">
        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field
            label="Total Hours"
            for="totalHours"
            hint="Calculated from start and end time"
          >
            <ui-number-field
              [formField]="form.totalHours"
              id="totalHours"
              mode="decimal"
              [minFractionDigits]="1"
              [maxFractionDigits]="2"
            />
          </ui-form-field>
        </ui-grid>

        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field label="Type" for="type" [required]="true">
            <ui-select-field
              [formField]="form.type"
              id="type"
              appendTo="body"
              [options]="typeOptions"
              optionValue="value"
              optionLabel="label"
            />
          </ui-form-field>
        </ui-grid>
      </ui-grid>

      <ui-form-field label="Notes" for="notes" hint="Optional notes about this entry">
        <ui-textarea-field
          id="notes"
          [formField]="form.notes"
          [rows]="3"
          placeholder="Add notes..."
        />
      </ui-form-field>

      <ui-stack direction="row" justify="end" gap="2" class="mt-4">
        <ui-button appearance="outlined" type="button" label="Cancel" (click)="close()" />
        <ui-button type="submit" icon="check" [label]="isEditMode ? 'Update' : 'Create'" />
      </ui-stack>
    </form>
  }
</ui-dialog>
