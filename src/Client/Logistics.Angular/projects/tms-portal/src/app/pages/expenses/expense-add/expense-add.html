<ui-container maxWidth="md">
  <ui-page-header title="Add Expense" backLink="/expenses" />
  <ui-card>
    <ui-tabs [value]="activeTab()" (valueChange)="onTabChange($event)">
      <ui-tab-list>
        <ui-tab value="0">Company Expense</ui-tab>
        <ui-tab value="1">Truck Expense</ui-tab>
        <ui-tab value="2">Body Shop Expense</ui-tab>
      </ui-tab-list>

      <ui-tab-panels>
        <ui-tab-panel value="0">
          <app-company-expense-form mode="add" />
        </ui-tab-panel>
        <ui-tab-panel value="1">
          <app-truck-expense-form mode="add" />
        </ui-tab-panel>
        <ui-tab-panel value="2">
          <app-body-shop-expense-form mode="add" />
        </ui-tab-panel>
      </ui-tab-panels>
    </ui-tabs>
  </ui-card>
</ui-container>
