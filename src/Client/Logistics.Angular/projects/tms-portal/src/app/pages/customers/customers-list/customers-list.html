<ui-page-header title="Customers" addRoute="/customers/add" addTooltip="Add a new customer" />

<ui-stack direction="row" gap="2" class="mb-4">
  <ui-permission-guard [permissions]="Permission.Invitation.Manage">
    <ui-button
      appearance="outlined"
      icon="send"
      label="Invite Customer User"
      (click)="openInviteDialog()"
    />
  </ui-permission-guard>
</ui-stack>

<ui-card>
  <div class="mb-4">
    <ui-search-field (searchChange)="search($event)" />
  </div>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No customers yet"
    emptyMessage="Add your first customer to get started."
    emptyActionLabel="Add Customer"
    (retry)="store.retry()"
    (emptyAction)="addCustomer()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th uiSortHeader="Name">Name</th>
          <th>Status</th>
          <th uiSortHeader="Email">Email</th>
          <th uiSortHeader="Phone">Phone</th>
          <th uiSortHeader="CreatedDate">Created</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-customer>
        <tr>
          <td>
            <ui-stack direction="row" align="center" gap="3">
              <app-customer-avatar [customer]="customer" size="normal" />
              <div>
                <div class="font-medium">{{ customer.name }}</div>
              </div>
            </ui-stack>
          </td>
          <td>
            @if (customer.status) {
              <app-customer-status-tag [status]="customer.status" />
            }
          </td>
          <td>{{ customer.email || "-" }}</td>
          <td>{{ customer.phone || "-" }}</td>
          <td>{{ customer.createdAt | date: "mediumDate" }}</td>
          <td>
            <ui-button
              appearance="text"
              icon="ellipsis-vertical"
              ariaLabel="Show actions menu"
              (click)="$event.stopPropagation(); selectedRow.set(customer); menu.toggle($event)"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<app-invite-customer-dialog
  [(visible)]="inviteDialogVisible"
  [customerId]="selectedCustomerId()"
  [customerName]="selectedCustomerName()"
  (invitationSent)="onInvitationSent()"
/>

<!-- Context menu for row actions -->
<ui-menu #menu [items]="actionMenuItems" />
