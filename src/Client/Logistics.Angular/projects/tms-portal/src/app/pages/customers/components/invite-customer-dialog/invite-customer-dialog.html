<ui-dialog
  header="Invite Customer User"
  [(open)]="visible"
  [modal]="true"
  width="450px"
  (opened)="onShow()"
  (closed)="close()"
>
  @if (form().submitting()) {
    <ui-stack align="center" justify="center" class="py-4">
      <ui-spinner />
    </ui-stack>
  } @else {
    <p class="text-muted-foreground mb-4">
      Send an email invitation to give a customer access to the customer portal.
    </p>

    <form [formRoot]="form">
      <ui-form-field label="Email Address" for="email" [required]="true">
        <ui-text-field
          id="email"
          [formField]="form.email"
          type="email"
          placeholder="customer@example.com"
        />
      </ui-form-field>

      <ui-form-field label="Customer" for="customerId" [required]="true">
        @if (customerId()) {
          <ui-text-field id="customerName" [value]="customerName() ?? ''" [disabled]="true" />
        } @else {
          <ui-select-field
            [formField]="form.customerId"
            id="customerId"
            appendTo="body"
            [options]="customers()"
            optionValue="id"
            optionLabel="name"
            placeholder="Select a customer"
            [loading]="isLoadingCustomers()"
            [filter]="true"
            filterPlaceholder="Search customers..."
          />
        }
      </ui-form-field>

      <ui-form-field
        label="Personal Message"
        for="personalMessage"
        hint="Optional note to include in the invitation email"
      >
        <ui-textarea-field
          id="personalMessage"
          [formField]="form.personalMessage"
          [rows]="3"
          placeholder="Add a personal note to the invitation email..."
        />
      </ui-form-field>

      <ui-stack direction="row" justify="end" gap="2">
        <ui-button appearance="outlined" type="button" label="Cancel" (click)="close()" />
        <ui-button
          type="submit"
          icon="send"
          label="Send Invitation"
          [disabled]="form().submitting()"
        />
      </ui-stack>
    </form>
  }
</ui-dialog>
