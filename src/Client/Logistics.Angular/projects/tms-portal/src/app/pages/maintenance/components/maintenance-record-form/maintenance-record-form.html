<div class="flex flex-col gap-6">
  @if (form().submitting()) {
    <div class="flex justify-center py-8">
      <ui-spinner />
    </div>
  }

  <form [formRoot]="form">
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <ui-form-field label="Truck" for="truck" [required]="true">
        <app-search-truck [formField]="form.truck" />
      </ui-form-field>

      <ui-form-field label="Service Type" for="type" [required]="true">
        <ui-select-field
          [formField]="form.type"
          id="type"
          [options]="maintenanceTypeOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Select service type"
        />
      </ui-form-field>
    </div>

    <ui-form-field label="Description" for="description" [required]="true" class="mt-4">
      <ui-textarea-field
        [formField]="form.description"
        id="description"
        [rows]="2"
        placeholder="Describe the maintenance performed..."
      />
    </ui-form-field>

    <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-3">
      <ui-form-field label="Service Date" for="serviceDate" [required]="true">
        <ui-date-field
          [formField]="form.serviceDate"
          id="serviceDate"
          [showIcon]="true"
          [iconDisplay]="'input'"
          [fluid]="true"
          dateFormat="mm/dd/yy"
        />
      </ui-form-field>

      <ui-form-field label="Odometer Reading" for="odometerReading">
        <ui-number-field
          [formField]="form.odometerReading"
          id="odometerReading"
          [useGrouping]="true"
          suffix=" mi"
        />
      </ui-form-field>

      <ui-form-field label="Engine Hours" for="engineHours">
        <ui-number-field
          [formField]="form.engineHours"
          id="engineHours"
          [useGrouping]="true"
          suffix=" hrs"
        />
      </ui-form-field>
    </div>

    <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2">
      <ui-form-field label="Vendor Name" for="vendorName">
        <ui-text-field
          id="vendorName"
          [formField]="form.vendorName"
          placeholder="Service provider name"
        />
      </ui-form-field>

      <ui-form-field label="Invoice Number" for="invoiceNumber">
        <ui-text-field
          id="invoiceNumber"
          [formField]="form.invoiceNumber"
          placeholder="INV-12345"
        />
      </ui-form-field>
    </div>

    <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2">
      <ui-form-field label="Labor Cost" for="laborCost">
        <ui-number-field
          [formField]="form.laborCost"
          id="laborCost"
          mode="currency"
          currency="USD"
          locale="en-US"
        />
      </ui-form-field>

      <ui-form-field label="Parts Cost" for="partsCost">
        <ui-number-field
          [formField]="form.partsCost"
          id="partsCost"
          mode="currency"
          currency="USD"
          locale="en-US"
        />
      </ui-form-field>
    </div>

    <ui-form-field label="Notes" for="notes" class="mt-4">
      <ui-textarea-field
        [formField]="form.notes"
        id="notes"
        [rows]="3"
        placeholder="Additional notes about this service..."
      />
    </ui-form-field>

    <div class="mt-6 flex gap-2">
      <ui-button type="submit" icon="check" label="Save" [loading]="form().submitting()" />

      <ui-button
        appearance="outlined"
        type="button"
        icon="arrow-left"
        label="Back to list"
        [routerLink]="['/maintenance/records']"
      />
    </div>
  </form>
</div>
