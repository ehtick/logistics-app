<form [formRoot]="form" class="space-y-4 pt-4">
  <ui-grid container spacing="4">
    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Amount" for="bodyshop-amount" [required]="true">
        <ui-number-field
          id="bodyshop-amount"
          [formField]="form.amount"
          mode="currency"
          currency="USD"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Truck" for="bodyshop-truck" [required]="true">
        <ui-select-field
          id="bodyshop-truck"
          [formField]="form.truckId"
          [options]="trucks()"
          optionLabel="number"
          optionValue="id"
          placeholder="Select a truck"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Body Shop Name" for="bodyshop-vendor">
        <ui-text-field id="bodyshop-vendor" [formField]="form.vendorName" />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Expense Date" for="bodyshop-date" [required]="true">
        <ui-date-field
          id="bodyshop-date"
          [formField]="form.expenseDate"
          [showIcon]="true"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Shop Address" for="bodyshop-address">
        <ui-text-field id="bodyshop-address" [formField]="form.vendorAddress" />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Shop Phone" for="bodyshop-phone">
        <ui-text-field id="bodyshop-phone" [formField]="form.vendorPhone" />
      </ui-form-field>
    </ui-grid>
  </ui-grid>

  <ui-form-field label="Repair Description" for="bodyshop-description">
    <ui-textarea-field id="bodyshop-description" [formField]="form.repairDescription" [rows]="3" />
  </ui-form-field>

  <ui-grid container spacing="4">
    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Estimated Completion" for="bodyshop-est-date">
        <ui-date-field
          id="bodyshop-est-date"
          [formField]="form.estimatedCompletionDate"
          [showIcon]="true"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Actual Completion" for="bodyshop-actual-date">
        <ui-date-field
          id="bodyshop-actual-date"
          [formField]="form.actualCompletionDate"
          [showIcon]="true"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>
  </ui-grid>

  <ui-form-field label="Notes" for="bodyshop-notes">
    <ui-textarea-field id="bodyshop-notes" [formField]="form.notes" [rows]="3" />
  </ui-form-field>

  <app-expense-receipt-upload
    [initialPath]="receiptPath()"
    (uploaded)="onReceiptUploaded($event)"
  />

  <ui-stack direction="row" justify="end" gap="2" class="pt-4">
    <ui-button
      appearance="outlined"
      label="Cancel"
      [routerLink]="mode() === 'edit' ? ['/expenses', initial()?.id] : ['/expenses']"
    />
    <ui-button
      type="submit"
      [label]="mode() === 'edit' ? 'Save Changes' : 'Create Expense'"
      icon="save"
      [loading]="form().submitting()"
    />
  </ui-stack>
</form>
