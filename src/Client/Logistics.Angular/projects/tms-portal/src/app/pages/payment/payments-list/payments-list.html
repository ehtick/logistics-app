<ui-page-header title="Payments History" />

<ui-card>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No payments yet"
    emptyMessage="Payment history will appear here."
    (retry)="store.retry()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th uiSortHeader="CreatedDate">Created Date</th>
          <th uiSortHeader="Method">Method</th>
          <th uiSortHeader="Amount">Amount</th>
          <th uiSortHeader="Status">Status</th>
          <th uiSortHeader="BillingAddress">Billing Address</th>
          <th uiSortHeader="Description">Description</th>
        </tr>
      </ng-template>

      <ng-template #body let-payment>
        <tr>
          <td>{{ payment.createdDate | date: "mediumDate" }}</td>
          <td>{{ getPaymentMethodDesc(payment.method) }}</td>
          <td>{{ payment.amount.amount | currencyFormat }}</td>
          <td>
            <app-payment-status-tag [paymentStatus]="payment.status"></app-payment-status-tag>
          </td>
          <td
            [uiTooltip]="payment.billingAddress | address"
            [uiTooltipDelay]="500"
            uiTooltipPosition="bottom"
          >
            {{ payment.billingAddress | address }}
          </td>
          <td>{{ payment.description }}</td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>
