<ui-page-header title="Add Container" backLink="/containers" />

<ui-container maxWidth="md">
  <ui-card>
    <form [formRoot]="form">
      <ui-stack gap="4">
        <!-- Identification -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="tag" color="secondary" />
            <ui-typography variant="overline" color="secondary">Identification</ui-typography>
          </ui-stack>
          <ui-surface>
            <ui-grid container spacing="4">
              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field
                  label="Container Number"
                  for="number"
                  [required]="true"
                  hint="11 characters: 4 letters + 7 digits (e.g., MSCU1234567)"
                >
                  <ui-text-field id="number" [formField]="form.number" placeholder="MSCU1234567" />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field label="ISO Type" for="isoType" [required]="true">
                  <ui-select-field
                    [formField]="form.isoType"
                    [options]="isoTypeOptions"
                    placeholder="Select ISO type"
                  />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field label="Seal Number" for="sealNumber">
                  <ui-text-field id="sealNumber" [formField]="form.sealNumber" />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field label="Booking Reference" for="bookingReference">
                  <ui-text-field id="bookingReference" [formField]="form.bookingReference" />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="12">
                <ui-form-field label="Bill of Lading Number" for="billOfLadingNumber">
                  <ui-text-field id="billOfLadingNumber" [formField]="form.billOfLadingNumber" />
                </ui-form-field>
              </ui-grid>
            </ui-grid>
          </ui-surface>
        </ui-stack>

        <!-- Cargo -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="box" color="secondary" />
            <ui-typography variant="overline" color="secondary">Cargo</ui-typography>
          </ui-stack>
          <ui-surface>
            <ui-grid container spacing="4">
              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field label="Gross Weight (kg)" for="grossWeight">
                  <ui-number-field id="grossWeight" [formField]="form.grossWeight" />
                </ui-form-field>
              </ui-grid>

              <ui-grid [size]="{ xs: 12, md: 6 }">
                <ui-form-field label="Status" for="isLaden">
                  <ui-stack direction="row" gap="2" align="center">
                    <ui-checkbox-field [formField]="form.isLaden" inputId="isLaden" />
                    <label for="isLaden" class="cursor-pointer">Laden (loaded with cargo)</label>
                  </ui-stack>
                </ui-form-field>
              </ui-grid>
            </ui-grid>
          </ui-surface>
        </ui-stack>

        <!-- Location -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="map-pin" color="secondary" />
            <ui-typography variant="overline" color="secondary">Current Location</ui-typography>
          </ui-stack>
          <ui-surface>
            <ui-form-field label="Current Terminal" for="currentTerminal" class="mb-0">
              <app-search-terminal [formField]="form.currentTerminal" />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <!-- Notes -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="message-square" color="secondary" />
            <ui-typography variant="overline" color="secondary">Notes</ui-typography>
          </ui-stack>
          <ui-surface>
            <ui-form-field label="Notes" for="notes" class="mb-0">
              <ui-textarea-field id="notes" [formField]="form.notes" [rows]="3" />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <ui-stack direction="row" gap="2">
          <ui-button type="submit" icon="check" label="Create" [loading]="form().submitting()" />
          <ui-button
            appearance="outlined"
            type="button"
            icon="arrow-left"
            label="Cancel"
            [routerLink]="['/containers']"
          />
        </ui-stack>
      </ui-stack>
    </form>
  </ui-card>
</ui-container>
