<ui-page-header title="Terminals" addRoute="/terminals/add" addTooltip="Add a new terminal" />

<ui-card>
  <ui-stack direction="row" align="end" gap="3" wrap class="mb-4">
    <div class="min-w-72 flex-1">
      <ui-search-field (searchChange)="search($event)" />
    </div>
    <ui-select-field
      [options]="typeOptions"
      optionLabel="label"
      optionValue="value"
      [fluid]="false"
      [showClear]="true"
      placeholder="All types"
      [value]="typeFilter()"
      (selectionChange)="onTypeChange($event)"
      (cleared)="onTypeChange(null)"
    />
    <input
      type="text"
      placeholder="Country code (e.g., US, NL)"
      class="border-default bg-elevated rounded border px-3 py-2 text-sm"
      maxlength="2"
      (input)="onCountryChange($any($event.target).value)"
    />
  </ui-stack>

  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No terminals yet"
    emptyMessage="Add your first terminal to get started."
    emptyActionLabel="Add Terminal"
    (retry)="store.retry()"
    (emptyAction)="addTerminal()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th uiSortHeader="Code">Code</th>
          <th uiSortHeader="Name">Name</th>
          <th>Country</th>
          <th>Type</th>
          <th>City</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-terminal>
        <tr class="cursor-pointer" (click)="viewTerminal(terminal)">
          <td class="font-mono font-medium">{{ terminal.code || "-" }}</td>
          <td>{{ terminal.name || "-" }}</td>
          <td>{{ terminal.countryCode || "-" }}</td>
          <td>{{ typeLabel(terminal.type) }}</td>
          <td>{{ terminal.address?.city || "-" }}</td>
          <td>
            <ui-button
              appearance="text"
              icon="pencil"
              ariaLabel="Edit terminal"
              (click)="$event.stopPropagation(); editTerminal(terminal)"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>
