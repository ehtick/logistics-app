<form [formRoot]="form">
  <ui-grid container spacing="4">
    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Origin City" for="originCity">
        <ui-text-field
          id="originCity"
          [formField]="form.originCity"
          placeholder="e.g., Los Angeles"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Origin State" for="originState">
        <ui-text-field id="originState" [formField]="form.originState" placeholder="e.g., CA" />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Origin Radius ({{ distanceUnitLabel() }})" for="originRadius">
        <ui-number-field id="originRadius" [formField]="form.originRadius" />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Destination City" for="destinationCity">
        <ui-text-field
          id="destinationCity"
          [formField]="form.destinationCity"
          placeholder="e.g., Dallas"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Destination State" for="destinationState">
        <ui-text-field
          id="destinationState"
          [formField]="form.destinationState"
          placeholder="e.g., TX"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Dest. Radius ({{ distanceUnitLabel() }})" for="destinationRadius">
        <ui-number-field id="destinationRadius" [formField]="form.destinationRadius" />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Pickup From" for="pickupDateStart">
        <ui-date-field
          id="pickupDateStart"
          [formField]="form.pickupDateStart"
          [showIcon]="true"
          dateFormat="mm/dd/yy"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Pickup To" for="pickupDateEnd">
        <ui-date-field
          id="pickupDateEnd"
          [formField]="form.pickupDateEnd"
          [showIcon]="true"
          dateFormat="mm/dd/yy"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Equipment Types" for="equipmentTypes">
        <ui-multiselect-field
          id="equipmentTypes"
          [formField]="form.equipmentTypes"
          [options]="equipmentOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Any equipment"
          [style]="{ width: '100%' }"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Max Results" for="maxResults">
        <ui-number-field id="maxResults" [formField]="form.maxResults" />
      </ui-form-field>
    </ui-grid>
  </ui-grid>

  <ui-stack direction="row" justify="end" class="mt-4">
    <ui-button label="Search Loads" icon="search" type="submit" [loading]="searching()" />
  </ui-stack>
</form>
