<ui-dialog
  header="Post Truck to Load Board"
  [(open)]="visible"
  [modal]="true"
  width="600px"
  [draggable]="false"
  (opened)="onShow()"
>
  <form [formRoot]="form">
    <ui-grid container spacing="4">
      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Truck" for="truckId" [required]="true">
          <ui-select-field
            id="truckId"
            [formField]="form.truckId"
            [options]="trucks()"
            optionLabel="number"
            optionValue="id"
            placeholder="Select truck"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Load Board" for="providerType" [required]="true">
          <ui-select-field
            id="providerType"
            [formField]="form.providerType"
            [options]="providerOptions()"
            optionLabel="label"
            optionValue="value"
            placeholder="Select provider"
            [style]="{ width: '100%' }"
          />
        </ui-form-field>
      </ui-grid>
    </ui-grid>

    <ui-typography variant="h6" class="mt-4 mb-3">Available Location</ui-typography>
    <ui-grid container spacing="4">
      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="City" for="availableAtCity" [required]="true">
          <ui-text-field
            id="availableAtCity"
            [formField]="form.availableAtCity"
            placeholder="e.g., Los Angeles"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="State" for="availableAtState" [required]="true">
          <ui-text-field
            id="availableAtState"
            [formField]="form.availableAtState"
            placeholder="e.g., CA"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="ZIP Code" for="availableAtZipCode">
          <ui-text-field
            id="availableAtZipCode"
            [formField]="form.availableAtZipCode"
            placeholder="e.g., 90001"
          />
        </ui-form-field>
      </ui-grid>
    </ui-grid>

    <ui-typography variant="h6" class="mt-4 mb-3">Destination Preference (Optional)</ui-typography>
    <ui-grid container spacing="4">
      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="City" for="destinationCity">
          <ui-text-field
            id="destinationCity"
            [formField]="form.destinationCity"
            placeholder="e.g., Dallas"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="State" for="destinationState">
          <ui-text-field
            id="destinationState"
            [formField]="form.destinationState"
            placeholder="e.g., TX"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="Radius (mi)" for="destinationRadius">
          <ui-number-field id="destinationRadius" [formField]="form.destinationRadius" />
        </ui-form-field>
      </ui-grid>
    </ui-grid>

    <ui-typography variant="h6" class="mt-4 mb-3">Availability</ui-typography>
    <ui-grid container spacing="4">
      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Available From" for="availableFrom" [required]="true">
          <ui-date-field
            id="availableFrom"
            [formField]="form.availableFrom"
            [showIcon]="true"
            dateFormat="mm/dd/yy"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Available To" for="availableTo">
          <ui-date-field
            id="availableTo"
            [formField]="form.availableTo"
            [showIcon]="true"
            dateFormat="mm/dd/yy"
          />
        </ui-form-field>
      </ui-grid>
    </ui-grid>

    <ui-typography variant="h6" class="mt-4 mb-3">Equipment Details (Optional)</ui-typography>
    <ui-grid container spacing="4">
      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="Equipment Type" for="equipmentType">
          <ui-select-field
            id="equipmentType"
            [formField]="form.equipmentType"
            [options]="equipmentOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Select type"
            [style]="{ width: '100%' }"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="Max Weight (lbs)" for="maxWeight">
          <ui-number-field id="maxWeight" [formField]="form.maxWeight" />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 4 }">
        <ui-form-field label="Max Length (ft)" for="maxLength">
          <ui-number-field id="maxLength" [formField]="form.maxLength" />
        </ui-form-field>
      </ui-grid>
    </ui-grid>
  </form>

  <ng-template #footer>
    <ui-button appearance="text" label="Cancel" (click)="close()" />
    <ui-button label="Post Truck" icon="check" (click)="onSubmit()" [loading]="posting()" />
  </ng-template>
</ui-dialog>
