<ui-page-header title="DVIR Reports" />

<ui-card>
  <div class="mb-4">
    <ui-search-field (searchChange)="onSearch($event)" />
  </div>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No DVIR reports"
    emptyMessage="No inspection reports have been submitted yet."
    (retry)="store.retry()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th uiSortHeader="InspectionDate">Date</th>
          <th>Type</th>
          <th uiSortHeader="TruckNumber">Truck</th>
          <th uiSortHeader="DriverName">Driver</th>
          <th>Defects</th>
          <th>Status</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-dvir>
        <tr>
          <td>{{ dvir.inspectionDate | date: "short" }}</td>
          <td>
            <ui-badge [value]="getTypeLabel(dvir.type)" [severity]="getTypeSeverity(dvir.type)" />
          </td>
          <td>{{ dvir.truckNumber || "-" }}</td>
          <td>{{ dvir.driverName || "-" }}</td>
          <td>
            @if (dvir.hasDefects) {
              <ui-stack direction="row" align="center" gap="1" class="text-danger font-medium">
                <ui-icon name="triangle-alert" />
                {{ dvir.defects?.length || 0 }}
              </ui-stack>
            } @else {
              <ui-stack direction="row" align="center" gap="1" class="text-success">
                <ui-icon name="check" />
                None
              </ui-stack>
            }
          </td>
          <td>
            <ui-badge
              [value]="getStatusLabel(dvir.status)"
              [severity]="getStatusSeverity(dvir.status)"
            />
          </td>
          <td>
            <ui-button
              appearance="text"
              icon="ellipsis-vertical"
              ariaLabel="Show actions menu"
              (click)="$event.stopPropagation(); selectedRow.set(dvir); menu.toggle($event)"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<!-- Context menu for row actions -->
<ui-menu #menu [items]="actionMenuItems" />
