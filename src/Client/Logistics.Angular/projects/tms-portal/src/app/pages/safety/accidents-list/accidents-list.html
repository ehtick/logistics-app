<ui-page-header
  title="Accident Reports"
  addRoute="/safety/accidents/add"
  addTooltip="Report a new accident"
/>

<ui-card>
  <div class="mb-4">
    <ui-search-field (searchChange)="onSearch($event)" />
  </div>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No accident reports"
    emptyMessage="No accidents have been reported. We hope it stays that way!"
    emptyActionLabel="Report Accident"
    (retry)="store.retry()"
    (emptyAction)="addAccident()"
  >
    <ui-data-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (lazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th uiSortHeader="AccidentDateTime">Date</th>
          <th uiSortHeader="TruckNumber">Truck</th>
          <th uiSortHeader="DriverName">Driver</th>
          <th>Location</th>
          <th>Severity</th>
          <th>Injuries</th>
          <th>Status</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-accident>
        <tr>
          <td>{{ accident.accidentDateTime | date: "short" }}</td>
          <td>{{ accident.truckNumber || "-" }}</td>
          <td>{{ accident.driverName || "-" }}</td>
          <td>{{ accident.location || "-" }}</td>
          <td>
            <ui-badge
              [value]="getSeverityLabel(accident.severity)"
              [severity]="getSeveritySeverity(accident.severity)"
            />
          </td>
          <td>
            @if (accident.injuriesReported) {
              <ui-stack direction="row" align="center" gap="1" class="text-danger font-medium">
                <ui-icon name="triangle-alert" />
                Yes
              </ui-stack>
            } @else {
              <span class="text-success">No</span>
            }
          </td>
          <td>
            <ui-badge
              [value]="getStatusLabel(accident.status)"
              [severity]="getStatusSeverity(accident.status)"
            />
          </td>
          <td>
            <ui-button
              appearance="text"
              icon="ellipsis-vertical"
              ariaLabel="Show actions menu"
              (click)="$event.stopPropagation(); selectedRow.set(accident); menu.toggle($event)"
            />
          </td>
        </tr>
      </ng-template>
    </ui-data-table>
  </ui-data-container>
</ui-card>

<!-- Context menu for row actions -->
<ui-menu #menu [items]="actionMenuItems" />
