<form [formRoot]="form">
  <ui-stack gap="4">
    <ui-stack tag="section" gap="3">
      <ui-stack direction="row" gap="2" align="center">
        <ui-icon name="tag" color="secondary" />
        <ui-typography variant="overline" color="secondary">Identification</ui-typography>
      </ui-stack>
      <ui-surface variant="elevated" [border]="true">
        <ui-grid container spacing="4">
          <ui-grid [size]="{ xs: 12, md: 6 }">
            <ui-form-field
              label="Code"
              for="code"
              [required]="true"
              hint="5-character UN/LOCODE (e.g., USNYC, BEANR)"
            >
              <ui-text-field id="code" [formField]="form.code" [maxlength]="5" />
            </ui-form-field>
          </ui-grid>

          <ui-grid [size]="{ xs: 12, md: 6 }">
            <ui-form-field label="Name" for="name" [required]="true">
              <ui-text-field id="name" [formField]="form.name" />
            </ui-form-field>
          </ui-grid>

          <ui-grid [size]="{ xs: 12, md: 6 }">
            <ui-form-field label="Type" for="type" [required]="true">
              <ui-select-field [formField]="form.type" [options]="typeOptions" />
            </ui-form-field>
          </ui-grid>

          <ui-grid [size]="{ xs: 12, md: 6 }">
            <ui-form-field label="Country" for="countryCode" [required]="true">
              <ui-select-field
                [formField]="form.countryCode"
                [options]="countryOptions()"
                [filter]="true"
                placeholder="Select country"
              />
            </ui-form-field>
          </ui-grid>
        </ui-grid>
      </ui-surface>
    </ui-stack>

    <ui-stack tag="section" gap="3">
      <ui-stack direction="row" gap="2" align="center">
        <ui-icon name="map-pin" color="secondary" />
        <ui-typography variant="overline" color="secondary">Address</ui-typography>
      </ui-stack>
      <ui-surface variant="elevated" [border]="true">
        <ui-address-form [formField]="form.address" [allowedCountries]="allowedCountries()" />
      </ui-surface>
    </ui-stack>

    <ui-stack tag="section" gap="3">
      <ui-stack direction="row" gap="2" align="center">
        <ui-icon name="message-square" color="secondary" />
        <ui-typography variant="overline" color="secondary">Notes</ui-typography>
      </ui-stack>
      <ui-surface variant="elevated" [border]="true">
        <ui-form-field label="Notes" for="notes" class="mb-0">
          <ui-textarea-field id="notes" [formField]="form.notes" [rows]="3" />
        </ui-form-field>
      </ui-surface>
    </ui-stack>

    <ui-stack direction="row" gap="2">
      <ui-button
        type="submit"
        icon="check"
        [label]="mode() === 'create' ? 'Create' : 'Update'"
        [disabled]="isLoading()"
      />
      <ui-button
        appearance="outlined"
        type="button"
        icon="arrow-left"
        label="Back to list"
        [routerLink]="['/terminals']"
      />
    </ui-stack>
  </ui-stack>
</form>
