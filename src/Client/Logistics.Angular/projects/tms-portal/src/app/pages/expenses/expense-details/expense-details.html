<ui-container maxWidth="md">
  <ui-page-header title="Expense Details" backLink="/expenses">
    @if (canApproveOrReject()) {
      <ui-button intent="success" icon="check" label="Approve" (click)="onApprove()" />
      <ui-button
        intent="danger"
        appearance="outlined"
        icon="x"
        label="Reject"
        (click)="onReject()"
      />
    }
    <ui-button appearance="outlined" icon="pencil" label="Edit" (click)="onEdit()" />
  </ui-page-header>

  @if (isLoading()) {
    <div class="flex justify-center py-16">
      <ui-spinner />
    </div>
  } @else if (expense(); as e) {
    <ui-grid container spacing="6">
      <ui-grid [size]="{ xs: 12, lg: 6 }">
        <app-expense-detail-info-card [expense]="e" />
      </ui-grid>
      <ui-grid [size]="{ xs: 12, lg: 6 }">
        <app-expense-detail-extra-card [expense]="e" (viewReceipt)="viewReceipt()" />
      </ui-grid>
      <ui-grid [size]="12">
        <app-expense-detail-audit-card [expense]="e" />
      </ui-grid>
    </ui-grid>
  } @else {
    <ui-card>
      <div class="py-16 text-center">
        <ui-icon name="circle-alert" size="inherit" class="text-muted-foreground mb-4 text-4xl" />
        <ui-typography color="muted">Expense not found</ui-typography>
        <ui-button label="Back to Expenses" [routerLink]="['/expenses']" class="mt-4" />
      </div>
    </ui-card>
  }
</ui-container>

<app-reject-expense-dialog />
