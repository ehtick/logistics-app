<form [formRoot]="form" class="space-y-4 pt-4">
  <ui-grid container spacing="4">
    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Amount" for="company-amount" [required]="true">
        <ui-number-field
          id="company-amount"
          [formField]="form.amount"
          mode="currency"
          currency="USD"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Category" for="company-category" [required]="true">
        <ui-select-field
          id="company-category"
          [formField]="form.category"
          [options]="categories"
          optionLabel="label"
          optionValue="value"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Vendor Name" for="company-vendor">
        <ui-text-field id="company-vendor" [formField]="form.vendorName" />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Expense Date" for="company-date" [required]="true">
        <ui-date-field
          id="company-date"
          [formField]="form.expenseDate"
          [showIcon]="true"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>
  </ui-grid>

  <ui-form-field label="Notes" for="company-notes">
    <ui-textarea-field id="company-notes" [formField]="form.notes" [rows]="3" />
  </ui-form-field>

  <app-expense-receipt-upload
    [initialPath]="receiptPath()"
    (uploaded)="onReceiptUploaded($event)"
  />

  <ui-stack direction="row" justify="end" gap="2" class="pt-4">
    <ui-button
      appearance="outlined"
      label="Cancel"
      [routerLink]="mode() === 'edit' ? ['/expenses', initial()?.id] : ['/expenses']"
    />
    <ui-button
      type="submit"
      [label]="mode() === 'edit' ? 'Save Changes' : 'Create Expense'"
      icon="save"
      [loading]="form().submitting()"
    />
  </ui-stack>
</form>
