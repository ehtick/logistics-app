<!-- Router-aware tab bar (mimics ui-tab-list, but drives navigation) -->
<div class="border-border mb-6 flex gap-1 overflow-x-auto border-b">
  @for (tab of tabs(); track tab.route) {
    <a
      [routerLink]="tab.route"
      routerLinkActive="text-foreground border-primary"
      [routerLinkActiveOptions]="{ exact: true }"
      class="text-muted-foreground hover:text-foreground -mb-px border-b-2 border-transparent px-3 py-2 text-sm font-medium whitespace-nowrap transition-colors"
    >
      {{ tab.label }}
    </a>
  }
</div>

<router-outlet />
