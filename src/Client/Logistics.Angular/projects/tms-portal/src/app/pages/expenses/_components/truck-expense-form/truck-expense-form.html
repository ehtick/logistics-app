<form [formRoot]="form" class="space-y-4 pt-4">
  <ui-grid container spacing="4">
    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Amount" for="truck-amount" [required]="true">
        <ui-number-field
          id="truck-amount"
          [formField]="form.amount"
          mode="currency"
          currency="USD"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Category" for="truck-category" [required]="true">
        <ui-select-field
          id="truck-category"
          [formField]="form.category"
          [options]="categories"
          optionLabel="label"
          optionValue="value"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Truck" for="truck-select" [required]="true">
        <ui-select-field
          id="truck-select"
          [formField]="form.truckId"
          [options]="trucks()"
          optionLabel="number"
          optionValue="id"
          placeholder="Select a truck"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Expense Date" for="truck-date" [required]="true">
        <ui-date-field
          id="truck-date"
          [formField]="form.expenseDate"
          [showIcon]="true"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Vendor Name" for="truck-vendor">
        <ui-text-field id="truck-vendor" [formField]="form.vendorName" />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Odometer Reading" for="truck-odometer">
        <ui-number-field
          id="truck-odometer"
          [formField]="form.odometerReading"
          suffix=" mi"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    @if (model().category === "fuel") {
      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Quantity" for="truck-quantity">
          <ui-number-field
            id="truck-quantity"
            [formField]="form.quantity"
            [minFractionDigits]="0"
            [maxFractionDigits]="2"
            [fluid]="true"
          />
        </ui-form-field>
      </ui-grid>

      <ui-grid [size]="{ xs: 12, md: 6 }">
        <ui-form-field label="Quantity Unit" for="truck-quantity-unit">
          <ui-select-field
            id="truck-quantity-unit"
            [formField]="form.quantityUnit"
            [options]="volumeUnits"
            optionLabel="label"
            optionValue="value"
            [fluid]="true"
          />
        </ui-form-field>
      </ui-grid>
    }
  </ui-grid>

  <ui-form-field label="Notes" for="truck-notes">
    <ui-textarea-field id="truck-notes" [formField]="form.notes" [rows]="3" />
  </ui-form-field>

  <app-expense-receipt-upload
    [initialPath]="receiptPath()"
    (uploaded)="onReceiptUploaded($event)"
  />

  <ui-stack direction="row" justify="end" gap="2" class="pt-4">
    <ui-button
      appearance="outlined"
      label="Cancel"
      [routerLink]="mode() === 'edit' ? ['/expenses', initial()?.id] : ['/expenses']"
    />
    <ui-button
      type="submit"
      [label]="mode() === 'edit' ? 'Save Changes' : 'Create Expense'"
      icon="save"
      [loading]="form().submitting()"
    />
  </ui-stack>
</form>
