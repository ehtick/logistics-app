@if (mode() === "single") {
  <ui-autocomplete-field
    [(value)]="selectedEmployeeValue"
    class="w-full"
    [placeholder]="placeholder()"
    optionLabel="fullName"
    [minQueryLength]="2"
    [suggestions]="suggestedEmployees()"
    (completeMethod)="searchEmployee($event)"
    (optionSelected)="onEmployeeSelect($event)"
  />
} @else {
  <ui-multiselect-field
    [value]="selectedEmployeesValue()"
    (selectionChange)="onMultiSelectChange($event)"
    [options]="allEmployees()"
    optionLabel="fullName"
    [placeholder]="placeholder()"
    [filter]="true"
    filterBy="fullName"
    [showClear]="true"
    class="w-full"
    display="chip"
  />
}
