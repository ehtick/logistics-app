@if (isOpen()) {
  <div
    class="palette-backdrop"
    role="none"
    (click)="onBackdropClick($event)"
    (keydown.escape)="close()"
  >
    <div
      class="bg-elevated border-default w-140 max-w-[90vw] animate-[palette-slide-in_150ms_ease-out] overflow-hidden rounded-xl border shadow-lg"
    >
      <!-- Search input -->
      <div class="border-subtle flex items-center gap-3 border-b px-5 py-3.5">
        <ui-icon name="search" size="inherit" class="text-muted-foreground shrink-0 text-lg" />
        <input
          #searchInput
          type="text"
          class="text-foreground placeholder:text-muted-foreground flex-1 border-none bg-transparent outline-none"
          placeholder="Search pages, actions..."
          [value]="query()"
          (input)="onQueryChange($any($event.target).value)"
          autocomplete="off"
          spellcheck="false"
        />
        <kbd class="kbd">ESC</kbd>
      </div>

      <!-- Results -->
      <div class="max-h-90 overflow-y-auto p-1.5">
        @for (item of results(); track item.id; let i = $index) {
          <button
            class="text-subtle-foreground flex w-full cursor-pointer items-center justify-between rounded-md border-none bg-transparent px-3 py-2.5 text-left transition-colors"
            [class.bg-hover]="i === selectedIndex()"
            [class.bg-primary/12]="i === selectedIndex()"
            [class.text-foreground]="i === selectedIndex()"
            (click)="selectItem(item)"
            (mouseenter)="selectedIndex.set(i)"
            type="button"
          >
            <div class="flex min-w-0 items-center gap-3">
              @if (item.icon; as icon) {
                <ui-icon
                  [name]="icon"
                  class="text-muted-foreground w-6 shrink-0 justify-center"
                  [class.text-primary]="i === selectedIndex()"
                />
              }
              <div>
                <span class="block text-sm font-medium">{{ item.label }}</span>
                <span class="text-muted-foreground mt-px block text-[0.6875rem]">
                  {{ item.section }}
                </span>
              </div>
            </div>
            @if (item.type === "action") {
              <span
                class="bg-primary/12 text-primary shrink-0 rounded-lg px-2 py-0.5 text-[0.625rem] font-semibold tracking-wider uppercase"
              >
                Action
              </span>
            } @else if (item.type === "recent") {
              <span
                class="bg-muted/12 text-muted-foreground shrink-0 rounded-lg px-2 py-0.5 text-[0.625rem] font-semibold tracking-wider uppercase"
              >
                Recent
              </span>
            }
          </button>
        } @empty {
          <div class="text-muted-foreground flex flex-col items-center gap-2 py-8 text-sm">
            <ui-icon name="search" size="inherit" class="text-2xl opacity-50" />
            <span>No results found</span>
          </div>
        }
      </div>

      <!-- Footer hints -->
      <div
        class="border-subtle text-muted-foreground flex items-center gap-5 border-t px-5 py-2 text-[0.6875rem]"
      >
        <span class="flex items-center gap-1.5">
          <kbd class="kbd">&uarr;</kbd>
          <kbd class="kbd">&darr;</kbd>
          Navigate
        </span>
        <span class="flex items-center gap-1.5">
          <kbd class="kbd">Enter</kbd>
          Select
        </span>
        <span class="flex items-center gap-1.5">
          <kbd class="kbd">Esc</kbd>
          Close
        </span>
      </div>
    </div>
  </div>
}
