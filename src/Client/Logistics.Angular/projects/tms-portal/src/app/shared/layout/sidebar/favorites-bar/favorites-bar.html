@if (favoriteItems().length > 0) {
  <div
    class="border-subtle border-b"
    [class.p-2.5]="!collapsed()"
    [class.px-1]="collapsed()"
    [class.py-2]="collapsed()"
  >
    @if (!collapsed()) {
      <div class="flex items-center justify-between px-1 pb-1.5">
        <span class="text-muted-foreground text-[0.625rem] font-bold tracking-widest uppercase">
          Favorites
        </span>
        @if (!isFull()) {
          <button
            class="border-default text-muted-foreground hover:border-accent hover:text-primary hover:bg-primary/8 flex size-5.5 cursor-pointer items-center justify-center rounded-sm border border-dashed transition-all"
            (click)="addPopover.toggle($event)"
            uiTooltip="Add favorite"
            uiTooltipPosition="top"
            type="button"
            aria-label="Add favorite"
          >
            <ui-icon name="plus" size="inherit" class="text-[0.625rem]" />
          </button>
        }
      </div>
      <div class="flex flex-wrap gap-1.5">
        @for (item of favoriteItems(); track item.id) {
          <button
            class="group bg-primary/8 border-accent/20 text-subtle-foreground hover:bg-primary/15 hover:border-accent/35 hover:text-foreground inline-flex cursor-pointer items-center gap-1.5 rounded-lg border px-2 py-1 text-[0.6875rem] font-medium whitespace-nowrap transition-all"
            (click)="onFavoriteClick(item)"
            [uiTooltip]="item.label"
            uiTooltipPosition="top"
            type="button"
          >
            @if (item.icon; as icon) {
              <ui-icon [name]="icon" size="inherit" class="text-primary text-xs" />
            }
            <span class="max-w-24 truncate">{{ item.label }}</span>
            <button
              class="text-muted-foreground hover:text-danger ml-0.5 flex cursor-pointer items-center justify-center border-none bg-transparent p-0 opacity-0 transition-opacity group-hover:opacity-100"
              (click)="removeFavorite($event, item.id)"
              type="button"
              aria-label="Remove from favorites"
            >
              <ui-icon name="x" size="inherit" class="text-[0.625rem]" />
            </button>
          </button>
        }
      </div>
    } @else {
      <!-- Collapsed: vertical icon stack -->
      <div class="flex flex-col items-center gap-1">
        @for (item of favoriteItems(); track item.id) {
          <button
            class="bg-primary/8 border-accent/15 text-primary hover:bg-primary/18 hover:border-accent flex size-9 cursor-pointer items-center justify-center rounded-md border transition-all hover:scale-105"
            (click)="onFavoriteClick(item)"
            [uiTooltip]="item.label"
            uiTooltipPosition="right"
            type="button"
            [attr.aria-label]="item.label"
          >
            <ui-icon [name]="item.icon ?? 'star'" size="inherit" class="text-base" />
          </button>
        }
      </div>
    }
  </div>
}

<!-- Add favorite popover -->
<ui-popover #addPopover>
  <div class="w-55">
    <div
      class="text-muted-foreground border-subtle border-b px-3 py-2 text-[0.6875rem] font-bold tracking-wider uppercase"
    >
      Add to Favorites
    </div>
    <div class="max-h-62 overflow-y-auto p-1">
      @for (item of availableItems(); track item.id) {
        <button
          class="text-subtle-foreground hover:bg-hover hover:text-foreground flex w-full cursor-pointer items-center gap-2.5 rounded-md border-none bg-transparent px-2.5 py-2 text-left text-[0.8125rem] transition-all"
          (click)="addFavorite(item.id); addPopover.hide()"
          type="button"
        >
          @if (item.icon; as icon) {
            <ui-icon
              [name]="icon"
              size="inherit"
              class="text-muted-foreground shrink-0 text-base"
            />
          }
          <span>{{ item.label }}</span>
        </button>
      } @empty {
        <div class="text-muted-foreground p-4 text-center text-[0.8125rem]">
          No more items to add
        </div>
      }
    </div>
  </div>
</ui-popover>
