<ui-autocomplete-field
  class="w-full"
  placeholder="Type a driver name or truck number"
  optionLabel="number"
  [delay]="300"
  [minQueryLength]="2"
  [suggestions]="suggestedTrucks()"
  [(value)]="value"
  (completeMethod)="searchTruck($event)"
  (touch)="markTouched()"
  [disabled]="disabled()"
>
  <ng-template #item let-truck>
    <div class="flex items-center gap-2">
      <span class="font-bold">{{ truck.number }} -</span>
      <span class="text-muted-foreground text-sm">{{ truck.mainDriver.fullName }}</span>
      @if (truck.secondaryDriver) {
        <span class="text-muted-foreground text-sm">and {{ truck.secondaryDriver.fullName }}</span>
      }
      <span class="text-muted-foreground text-sm">({{ truck.type }})</span>
    </div>
  </ng-template>
</ui-autocomplete-field>
