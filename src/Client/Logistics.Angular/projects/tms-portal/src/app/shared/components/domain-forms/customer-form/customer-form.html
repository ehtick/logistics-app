<ui-stack gap="6">
  @if (form().submitting()) {
    <ui-spinner />
  }

  <form [formRoot]="form">
    <ui-stack gap="4">
      <ui-form-field label="Customer Name" for="name" [required]="true">
        <ui-text-field id="name" [formField]="form.name" placeholder="Customer name" />
      </ui-form-field>

      <ui-grid container spacing="4">
        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field label="Email" for="email">
            <ui-text-field
              id="email"
              [formField]="form.email"
              type="email"
              placeholder="email@example.com"
            />
          </ui-form-field>
        </ui-grid>

        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field label="Phone" for="phone">
            <ui-text-field
              id="phone"
              [formField]="form.phone"
              type="tel"
              placeholder="(555) 555-5555"
            />
          </ui-form-field>
        </ui-grid>
      </ui-grid>

      <ui-form-field label="Status" for="status">
        <ui-select-field
          [formField]="form.status"
          id="status"
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
        />
      </ui-form-field>

      <ui-form-field label="Address" [required]="true">
        <ui-address-form [formField]="form.address" [allowedCountries]="allowedCountries()" />
      </ui-form-field>

      <ui-grid container spacing="4">
        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field
            label="Tax ID / VAT number"
            for="taxId"
            [required]="customerIsEu()"
            [hint]="
              customerIsEu()
                ? 'Required for EU customers — enables cross-border B2B reverse charge.'
                : 'VAT, EIN, GSTIN, ABN, etc. (optional)'
            "
          >
            <ui-text-field id="taxId" [formField]="form.taxId" placeholder="e.g. DE123456789" />
          </ui-form-field>
        </ui-grid>

        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field label="Tax status" for="isVatExempt">
            <ui-stack direction="row" gap="2" align="center" class="pt-2">
              <ui-checkbox-field [formField]="form.isVatExempt" inputId="isVatExempt" />
              <label for="isVatExempt">VAT / sales tax exempt (charity, government, etc.)</label>
            </ui-stack>
          </ui-form-field>
        </ui-grid>
      </ui-grid>

      <ui-form-field label="Notes" for="notes">
        <ui-textarea-field
          [formField]="form.notes"
          id="notes"
          [rows]="3"
          placeholder="Additional notes about this customer..."
        />
      </ui-form-field>

      <ui-stack direction="row" gap="2" class="mt-2">
        <ui-button type="submit" icon="check" label="Save" [disabled]="form().submitting()" />

        @if (mode() === "edit") {
          <ui-button
            intent="danger"
            type="button"
            icon="trash"
            label="Delete"
            [disabled]="form().submitting()"
            (click)="askRemove()"
          />

          <ui-button
            appearance="outlined"
            type="button"
            icon="arrow-left"
            label="Back to list"
            [routerLink]="['/customers']"
          />
        }
      </ui-stack>
    </ui-stack>
  </form>
</ui-stack>
