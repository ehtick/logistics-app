<ui-grid container spacing="3">
  <ui-grid [size]="{ xs: 12, md: 6 }">
    <!-- Form Section -->
    @if (isLoading()) {
      <ui-spinner />
    }

    <form [formRoot]="form">
      <ui-stack gap="2">
        <!-- Load Information Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="box" color="secondary" />
            <ui-typography variant="overline" color="secondary">Load Information</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Name" for="name" [required]="true">
              <ui-text-field
                id="name"
                [formField]="form.name"
                type="text"
                placeholder="Load name"
              />
            </ui-form-field>
            <ui-form-field label="Load Type" for="type" [required]="true">
              <ui-select-field [formField]="form.type" [options]="loadTypes" />
            </ui-form-field>
            <ui-form-field label="Source" for="source" [required]="true" class="mb-0">
              <ui-select-field [formField]="form.source" [options]="loadSources" />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        @if (initial()?.tripNumber && initial()?.tripId) {
          <!-- Trip Section (only shown when associated with a trip) -->
          <ui-stack tag="section" gap="3">
            <ui-stack direction="row" gap="2" align="center">
              <ui-icon name="navigation" color="secondary" />
              <ui-typography variant="overline" color="secondary">Trip Association</ui-typography>
            </ui-stack>
            <ui-surface variant="elevated" [border]="true">
              <ui-form-field label="Trip" for="tripNumber" class="mb-0">
                <ui-text-field
                  id="tripNumber"
                  [value]="tripNumberText()"
                  [disabled]="true"
                  type="text"
                  placeholder="Trip"
                />
              </ui-form-field>
            </ui-surface>
          </ui-stack>
        }

        <!-- Customer Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="building-2" color="secondary" />
            <ui-typography variant="overline" color="secondary">Customer</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Customer" for="customer" [required]="true" class="mb-0">
              <app-search-customer [formField]="form.customer" />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <!-- Route Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="map-pin" color="secondary" />
            <ui-typography variant="overline" color="secondary">Route</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Origin Address" for="originAddress" [required]="true">
              <app-address-autocomplete
                field="originAddress"
                [formField]="form.originAddress"
                [forceSelection]="true"
                (selectedAddress)="updateOrigin($event)"
              />
            </ui-form-field>

            <ui-form-field
              label="Destination Address"
              for="destinationAddress"
              [required]="true"
              class="mb-0"
            >
              <app-address-autocomplete
                field="destinationAddress"
                [formField]="form.destinationAddress"
                [forceSelection]="true"
                (selectedAddress)="updateDestination($event)"
              />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <!-- Schedule Section (collapsable) -->
        <ui-collapsible legend="Schedule" [toggleable]="true" [collapsed]="true">
          <ui-grid container spacing="4">
            <ui-grid [size]="{ xs: 12, md: 6 }">
              <ui-form-field label="Requested Pickup Date" for="requestedPickupDate" class="mb-0">
                <ui-date-field
                  [formField]="form.requestedPickupDate"
                  [showIcon]="true"
                  [showTime]="true"
                  inputId="requestedPickupDate"
                />
              </ui-form-field>
            </ui-grid>
            <ui-grid [size]="{ xs: 12, md: 6 }">
              <ui-form-field
                label="Requested Delivery Date"
                for="requestedDeliveryDate"
                class="mb-0"
              >
                <ui-date-field
                  [formField]="form.requestedDeliveryDate"
                  [showIcon]="true"
                  [showTime]="true"
                  inputId="requestedDeliveryDate"
                />
              </ui-form-field>
            </ui-grid>
          </ui-grid>
        </ui-collapsible>

        <!-- Intermodal Section (collapsable) -->
        <ui-collapsible legend="Intermodal (optional)" [toggleable]="true" [collapsed]="true">
          <ui-form-field label="Container" for="container">
            <app-search-container [formField]="form.container" />
          </ui-form-field>
          <ui-form-field label="Origin Terminal" for="originTerminal">
            <app-search-terminal [formField]="form.originTerminal" />
          </ui-form-field>
          <ui-form-field label="Destination Terminal" for="destinationTerminal" class="mb-0">
            <app-search-terminal [formField]="form.destinationTerminal" />
          </ui-form-field>
        </ui-collapsible>

        <!-- Hazmat / ADR Section -->
        <ui-collapsible legend="Hazmat / ADR" [toggleable]="true" [collapsed]="!model().isHazmat">
          <ui-form-field label="Contains hazardous materials" for="isHazmat">
            <ui-checkbox-field inputId="isHazmat" [formField]="form.isHazmat" />
          </ui-form-field>

          @if (model().isHazmat) {
            <ui-form-field label="Hazmat class" for="hazmatClass" hint="UN/ADR classification">
              <ui-select-field
                id="hazmatClass"
                [formField]="form.hazmatClass"
                [options]="hazmatClasses"
                optionLabel="label"
                optionValue="value"
                placeholder="Select class"
                appendTo="body"
              />
            </ui-form-field>

            <ui-form-field
              label="UN number"
              for="unNumber"
              hint="e.g., UN1203 for petrol"
              class="mb-0"
            >
              <ui-text-field
                id="unNumber"
                [formField]="form.unNumber"
                type="text"
                [maxlength]="16"
                placeholder="UN0000"
                style="text-transform: uppercase"
              />
            </ui-form-field>
          }
        </ui-collapsible>

        <!-- Notes Section (collapsable) -->
        <ui-collapsible legend="Notes" [toggleable]="true" [collapsed]="true">
          <ui-form-field label="Notes" for="notes" hint="Max 2000 characters" class="mb-0">
            <ui-textarea-field id="notes" [formField]="form.notes" [rows]="3" [maxlength]="2000" />
          </ui-form-field>
        </ui-collapsible>

        <!-- Pricing Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="dollar-sign" color="secondary" />
            <ui-typography variant="overline" color="secondary">Pricing & Distance</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Delivery Cost" for="deliveryCost" [required]="true">
              <ui-number-field id="deliveryCost" [formField]="form.deliveryCost" prefixLabel="$$" />
            </ui-form-field>

            <ui-form-field label="Estimated Distance" for="distance" class="mb-0">
              <ui-number-field id="distance" [formField]="form.distance" prefixLabel="mi" />
            </ui-form-field>
          </ui-surface>
        </ui-stack>

        <!-- Assignment Section -->
        <ui-stack tag="section" gap="3">
          <ui-stack direction="row" gap="2" align="center">
            <ui-icon name="users" color="secondary" />
            <ui-typography variant="overline" color="secondary">Assignment</ui-typography>
          </ui-stack>
          <ui-surface variant="elevated" [border]="true">
            <ui-form-field label="Assigned Dispatcher" for="dispatcherName">
              <ui-text-field
                id="dispatcherName"
                [formField]="form.assignedDispatcherName"
                type="text"
              />
            </ui-form-field>

            @if (canChangeAssignedTruck()) {
              <ui-form-field label="Assigned Truck" for="assignedTruck">
                <app-search-truck [formField]="form.assignedTruck" [truckId]="initialTruckId()" />
              </ui-form-field>
            }

            @if (mode() === "edit") {
              <ui-form-field label="Status" for="status" class="mb-0">
                <ui-select-field [formField]="form.status" [options]="loadStatuses" />
              </ui-form-field>
            }
          </ui-surface>
        </ui-stack>

        <!-- Action Buttons -->
        <ui-stack direction="row" gap="2">
          <ui-button
            type="submit"
            icon="pencil"
            [label]="mode() === 'create' ? 'Create' : 'Update'"
            [disabled]="isLoading()"
          />

          @if (mode() === "edit") {
            <ui-button
              intent="danger"
              type="button"
              icon="trash"
              label="Delete"
              [disabled]="isLoading()"
              (click)="askRemove()"
            />

            <ui-button
              type="button"
              icon="arrow-left"
              label="Back to list"
              [routerLink]="['/loads']"
            />
          }
        </ui-stack>
      </ui-stack>
    </form>
  </ui-grid>

  <ui-grid [size]="{ xs: 12, md: 6 }">
    <!-- Map Section -->
    <app-direction-map
      [waypoints]="[originCoords(), destinationCoords()]"
      (routeChange)="updateDistance($event)"
      [height]="mapHeight()"
    />
  </ui-grid>
</ui-grid>
