<ui-drawer
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  position="left"
  width="300px"
>
  <div uiDrawerHeader class="mobile-nav-header">
    @if (companyLogoUrl()) {
      <img [src]="companyLogoUrl()" class="mobile-nav-logo" alt="Company logo" />
    } @else {
      <img src="images/logo.svg" class="mobile-nav-logo" alt="Logo" />
    }
    @if (companyName()) {
      <h4 class="mobile-nav-company">{{ companyName() }}</h4>
    }
  </div>

  <nav class="mobile-nav-menu flex h-full flex-col">
    <!-- Search trigger -->
    <button class="mobile-search-trigger" (click)="openSearch()" type="button">
      <ui-icon name="search" />
      <span class="flex-1 text-left">Search...</span>
      <kbd
        class="bg-surface border-subtle text-muted-foreground inline-flex items-center rounded-sm border px-1.5 py-0.5 text-[0.625rem]"
      >
        Ctrl+K
      </kbd>
    </button>

    <!-- Favorites -->
    <app-favorites-bar
      [sections]="fullSections()"
      [collapsed]="false"
      (navigate)="onFavoriteNavigate()"
    />

    <!-- Navigation -->
    <app-nav-menu
      [sections]="menuSections()"
      [collapsed]="false"
      (itemClick)="onNavItemClick()"
    />

    <!-- Footer -->
    <div class="border-subtle border-t px-4 py-3">
      <!-- Notifications + Theme row -->
      <div class="flex items-center gap-2 pb-2.5">
        <app-notification-bell [expanded]="false" />
        <app-theme-toggle [showLabel]="false" />
      </div>

      <!-- User profile button -->
      @if (userFullName()) {
        <button
          class="text-subtle-foreground hover:bg-hover hover:text-foreground flex w-full cursor-pointer items-center gap-3 rounded-md border-none bg-transparent px-1 py-2 text-left text-[0.9375rem] font-medium transition-all"
          (click)="mobileUserPopover.toggle($event)"
          type="button"
        >
          <div
            class="bg-primary/12 border-accent/20 flex size-9 shrink-0 items-center justify-center rounded-full border"
          >
            <ui-icon name="user" size="inherit" class="text-primary text-sm" />
          </div>
          <div class="min-w-0 flex-1">
            <span class="block truncate text-sm font-medium">{{ userFullName() }}</span>
            @if (userRole()) {
              <span
                class="text-primary block text-[0.6875rem] font-semibold tracking-wider uppercase"
              >
                {{ userRole() }}
              </span>
            }
          </div>
          <ui-icon name="ellipsis-vertical" size="inherit" class="text-muted-foreground text-xs" />
        </button>
      }
    </div>
  </nav>
</ui-drawer>

<!-- User profile popover -->
<ui-popover #mobileUserPopover>
  <div class="w-52">
    @if (userFullName()) {
      <div class="border-subtle border-b px-3.5 py-2.5">
        <div class="text-foreground text-sm font-semibold">{{ userFullName() }}</div>
        @if (userRole()) {
          <div class="text-primary text-[0.6875rem] font-medium">{{ userRole() }}</div>
        }
      </div>
    }
    <div class="p-1">
      <button
        class="text-subtle-foreground hover:bg-hover hover:text-foreground flex w-full cursor-pointer items-center gap-2.5 rounded-md border-none bg-transparent px-3 py-2 text-left text-[0.8125rem] font-medium transition-all"
        (click)="openAccountUrl(); mobileUserPopover.hide()"
        type="button"
      >
        <ui-icon name="user-pen" class="text-muted-foreground w-5 text-center" />
        <span>Manage Profile</span>
      </button>
      <button
        class="text-danger hover:bg-danger/10 flex w-full cursor-pointer items-center gap-2.5 rounded-md border-none bg-transparent px-3 py-2 text-left text-[0.8125rem] font-medium transition-all"
        (click)="logout(); mobileUserPopover.hide()"
        type="button"
      >
        <ui-icon name="log-out" class="w-5 text-center" />
        <span>Sign Out</span>
      </button>
    </div>
  </div>
</ui-popover>
