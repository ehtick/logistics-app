<header
  class="border-default bg-surface sticky top-0 z-40 flex items-center justify-between border-b px-4 py-3 md:hidden"
>
  <!-- Hamburger Menu Button. size="lg": ui-button sizes its glyph from the size variant (lg = 1.25rem). -->
  <ui-button
    [icon]="mobileMenuOpen() ? 'x' : 'menu'"
    appearance="text"
    size="lg"
    (click)="toggleMenu()"
    ariaLabel="Toggle navigation menu"
  />

  <!-- Logo and Page Title -->
  <a routerLink="/home" class="flex items-center gap-2">
    <img src="images/logo.svg" class="h-8 w-auto" alt="Logo" />
    <span class="text-foreground max-w-37.5 truncate text-lg font-semibold">
      {{ pageTitle() }}
    </span>
  </a>

  <!-- Notification Bell -->
  <app-notification-bell [expanded]="false" />
</header>
